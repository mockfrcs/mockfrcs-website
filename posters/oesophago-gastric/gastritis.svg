<svg viewBox="0 0 1000 1621.5" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
<rect x="0" y="0" width="1000" height="1621.5" fill="#F4F6F4"/>
<rect x="0" y="0" width="1000" height="108" fill="#6E1E2A"/>
<rect x="0.0" y="108" width="250.0" height="4" fill="#C77B20"/>
<rect x="250.0" y="108" width="250.0" height="4" fill="#245C8C"/>
<rect x="500.0" y="108" width="250.0" height="4" fill="#15806A"/>
<rect x="750.0" y="108" width="250.0" height="4" fill="#6D4AA3"/>
<text x="30" y="46" font-size="29" font-weight="800" fill="#FFFFFF" letter-spacing="0.3">Gastritis</text>
<text x="30" y="74" font-size="13" font-weight="500" fill="#E7BEC3">FRCS Part 1 (General Surgery)  ·  UK practice (NICE · BSG)  ·  A / B / C classification · H. pylori · Ménétrier’s</text>
<text x="30" y="140" font-size="13" font-weight="800" fill="#6E1E2A" letter-spacing="1.2">AETIOLOGICAL CLASSIFICATION  ·  THE A / B / C</text>
<rect x="30" y="154" width="302" height="322" fill="#FFFFFF" rx="11" stroke="#E0E6E3" stroke-width="1.2"/>
<path d="M 30 200 L 30 165 Q 30 154 41 154 L 321 154 Q 332 154 332 165 L 332 200 Z" fill="#15806A"/>
<text x="44" y="175" font-size="15" font-weight="800" fill="#FFFFFF" letter-spacing="0.5">TYPE A</text>
<text x="44" y="192" font-size="12" font-weight="600" fill="#FFFFFF">Autoimmune</text>
<text x="44" y="218" font-size="11" font-weight="800" fill="#15806A" letter-spacing="0.3">Cause</text>
<text x="44" y="233" font-size="11" font-weight="400" fill="#2E3C42">autoimmune loss of parietal cells;</text>
<text x="44" y="248" font-size="11" font-weight="400" fill="#2E3C42">anti-parietal-cell &amp; intrinsic-factor antibodies</text>
<text x="44" y="272" font-size="11" font-weight="800" fill="#15806A" letter-spacing="0.3">Site</text>
<text x="44" y="287" font-size="11" font-weight="400" fill="#2E3C42">body / fundus (corpus atrophy); antrum spared</text>
<text x="44" y="311" font-size="11" font-weight="800" fill="#15806A" letter-spacing="0.3">Acid</text>
<text x="44" y="326" font-size="11" font-weight="400" fill="#2E3C42">achlorhydria → high gastrin</text>
<text x="44" y="350" font-size="11" font-weight="800" fill="#15806A" letter-spacing="0.3">Histology</text>
<text x="44" y="365" font-size="11" font-weight="400" fill="#2E3C42">atrophic gastritis, intestinal metaplasia,</text>
<text x="44" y="380" font-size="11" font-weight="400" fill="#2E3C42">ECL-cell hyperplasia</text>
<text x="44" y="404" font-size="11" font-weight="800" fill="#15806A" letter-spacing="0.3">Sequelae</text>
<text x="44" y="419" font-size="11" font-weight="400" fill="#2E3C42">pernicious anaemia (B12↓), Type 1 gastric NET, ↑</text>
<text x="44" y="434" font-size="11" font-weight="400" fill="#2E3C42">adenocarcinoma; other autoimmune disease</text>
<rect x="348" y="154" width="302" height="322" fill="#FFFFFF" rx="11" stroke="#E0E6E3" stroke-width="1.2"/>
<path d="M 348 200 L 348 165 Q 348 154 359 154 L 639 154 Q 650 154 650 165 L 650 200 Z" fill="#BE3A2E"/>
<text x="362" y="175" font-size="15" font-weight="800" fill="#FFFFFF" letter-spacing="0.5">TYPE B</text>
<text x="362" y="192" font-size="12" font-weight="600" fill="#FFFFFF">Bacterial · H. pylori</text>
<text x="362" y="218" font-size="11" font-weight="800" fill="#BE3A2E" letter-spacing="0.3">Cause</text>
<text x="362" y="233" font-size="11" font-weight="400" fill="#2E3C42">H. pylori (Gram-negative, urease-positive,</text>
<text x="362" y="248" font-size="11" font-weight="400" fill="#2E3C42">spiral); commonest chronic gastritis</text>
<text x="362" y="272" font-size="11" font-weight="800" fill="#BE3A2E" letter-spacing="0.3">Site</text>
<text x="362" y="287" font-size="11" font-weight="400" fill="#2E3C42">antral-predominant, or pangastritis</text>
<text x="362" y="311" font-size="11" font-weight="800" fill="#BE3A2E" letter-spacing="0.3">Acid</text>
<text x="362" y="326" font-size="11" font-weight="400" fill="#2E3C42">antral → ↑ acid (duodenal ulcer); corpus atrophy</text>
<text x="362" y="341" font-size="11" font-weight="400" fill="#2E3C42">→ ↓ acid (gastric ulcer / cancer)</text>
<text x="362" y="365" font-size="11" font-weight="800" fill="#BE3A2E" letter-spacing="0.3">Histology</text>
<text x="362" y="380" font-size="11" font-weight="400" fill="#2E3C42">active chronic gastritis, lymphoid follicles</text>
<text x="362" y="404" font-size="11" font-weight="800" fill="#BE3A2E" letter-spacing="0.3">Sequelae</text>
<text x="362" y="419" font-size="11" font-weight="400" fill="#2E3C42">peptic ulcer, atrophy / IM, adenocarcinoma, MALT</text>
<text x="362" y="434" font-size="11" font-weight="400" fill="#2E3C42">lymphoma (WHO group 1 carcinogen)</text>
<rect x="666" y="154" width="302" height="322" fill="#FFFFFF" rx="11" stroke="#E0E6E3" stroke-width="1.2"/>
<path d="M 666 200 L 666 165 Q 666 154 677 154 L 957 154 Q 968 154 968 165 L 968 200 Z" fill="#C77B20"/>
<text x="680" y="175" font-size="15" font-weight="800" fill="#FFFFFF" letter-spacing="0.5">TYPE C</text>
<text x="680" y="192" font-size="12" font-weight="600" fill="#FFFFFF">Chemical · reflux</text>
<text x="680" y="218" font-size="11" font-weight="800" fill="#C77B20" letter-spacing="0.3">Cause</text>
<text x="680" y="233" font-size="11" font-weight="400" fill="#2E3C42">bile / duodenal reflux, NSAIDs, alcohol</text>
<text x="680" y="257" font-size="11" font-weight="800" fill="#C77B20" letter-spacing="0.3">Site</text>
<text x="680" y="272" font-size="11" font-weight="400" fill="#2E3C42">antrum / prepyloric; around a stoma after</text>
<text x="680" y="287" font-size="11" font-weight="400" fill="#2E3C42">surgery</text>
<text x="680" y="311" font-size="11" font-weight="800" fill="#C77B20" letter-spacing="0.3">Histology</text>
<text x="680" y="326" font-size="11" font-weight="400" fill="#2E3C42">foveolar hyperplasia, oedema, few inflammatory</text>
<text x="680" y="341" font-size="11" font-weight="400" fill="#2E3C42">cells (“reactive gastropathy”)</text>
<text x="680" y="365" font-size="11" font-weight="800" fill="#C77B20" letter-spacing="0.3">Sequelae</text>
<text x="680" y="380" font-size="11" font-weight="400" fill="#2E3C42">erosions, ulcers, bleeding (erosive /</text>
<text x="680" y="395" font-size="11" font-weight="400" fill="#2E3C42">haemorrhagic form)</text>
<text x="680" y="419" font-size="11" font-weight="800" fill="#C77B20" letter-spacing="0.3">Post-surgery</text>
<text x="680" y="434" font-size="11" font-weight="400" fill="#2E3C42">bile reflux after gastrectomy /</text>
<text x="680" y="449" font-size="11" font-weight="400" fill="#2E3C42">gastrojejunostomy → Roux-en-Y diversion</text>
<rect x="30" y="484" width="6" height="20" fill="#BE3A2E" rx="3"/>
<text x="46" y="500" font-size="13" font-weight="800" fill="#BE3A2E" letter-spacing="1.2">HELICOBACTER PYLORI  (TYPE B)</text>
<rect x="30" y="514" width="464" height="205.0" fill="#FFFFFF" rx="11" stroke="#E0E6E3" stroke-width="1.2"/>
<rect x="30" y="514" width="6" height="205.0" fill="#BE3A2E" rx="3"/>
<text x="54" y="542" font-size="11" font-weight="700" fill="#6B7B80" letter-spacing="1.4">test &amp; treat if uninvestigated dyspepsia, no alarm</text>
<text x="54" y="566" font-size="18" font-weight="800" fill="#38141A">Diagnosis / tests</text>
<text x="54" y="588" font-size="12" font-weight="700" fill="#BE3A2E">Non-invasive</text>
<text x="148" y="588.0" font-size="12" font-weight="400" fill="#2E3C42">¹³C-urea breath test; stool antigen; serology (cannot</text>
<text x="148" y="608.5" font-size="12" font-weight="400" fill="#2E3C42">confirm cure)</text>
<text x="54" y="629.0" font-size="12" font-weight="700" fill="#BE3A2E">Invasive (OGD)</text>
<text x="148" y="629.0" font-size="12" font-weight="400" fill="#2E3C42">rapid urease / CLO test; histology; culture +</text>
<text x="148" y="649.5" font-size="12" font-weight="400" fill="#2E3C42">sensitivity</text>
<text x="54" y="670.0" font-size="12" font-weight="700" fill="#BE3A2E">Before testing</text>
<text x="148" y="670.0" font-size="12" font-weight="400" fill="#2E3C42">stop PPI ≥2 weeks &amp; antibiotics ≥4 weeks (avoid false</text>
<text x="148" y="690.5" font-size="12" font-weight="400" fill="#2E3C42">negatives)</text>
<text x="54" y="711.0" font-size="12" font-weight="700" fill="#BE3A2E">Note</text>
<text x="148" y="711.0" font-size="12" font-weight="400" fill="#2E3C42">urease-positive underlies the breath &amp; CLO tests</text>
<rect x="506" y="514" width="464" height="225.5" fill="#FFFFFF" rx="11" stroke="#E0E6E3" stroke-width="1.2"/>
<rect x="506" y="514" width="6" height="225.5" fill="#BE3A2E" rx="3"/>
<text x="530" y="542" font-size="11" font-weight="700" fill="#6B7B80" letter-spacing="1.4">eradication (NICE / CKS)</text>
<text x="530" y="566" font-size="18" font-weight="800" fill="#38141A">Eradication</text>
<text x="530" y="588" font-size="12" font-weight="700" fill="#BE3A2E">First-line</text>
<text x="630" y="588.0" font-size="12" font-weight="400" fill="#2E3C42">7-day triple: PPI BD + amoxicillin 1 g BD +</text>
<text x="630" y="608.5" font-size="12" font-weight="400" fill="#2E3C42">clarithromycin 500 mg BD OR metronidazole 400 mg BD</text>
<text x="530" y="629.0" font-size="12" font-weight="700" fill="#BE3A2E">Penicillin allergy</text>
<text x="630" y="629.0" font-size="12" font-weight="400" fill="#2E3C42">PPI + clarithromycin + metronidazole (7 days)</text>
<text x="530" y="649.5" font-size="12" font-weight="700" fill="#BE3A2E">Second-line</text>
<text x="630" y="649.5" font-size="12" font-weight="400" fill="#2E3C42">swap in the antibiotic not used first; bismuth</text>
<text x="630" y="670.0" font-size="12" font-weight="400" fill="#2E3C42">quadruple therapy if resistant</text>
<text x="530" y="690.5" font-size="12" font-weight="700" fill="#BE3A2E">Retest / benefit</text>
<text x="630" y="690.5" font-size="12" font-weight="400" fill="#2E3C42">UBT or stool antigen ≥4 weeks after treatment; early</text>
<text x="630" y="711.0" font-size="12" font-weight="400" fill="#2E3C42">gastric MALT lymphoma regresses in ~75% after</text>
<text x="630" y="731.5" font-size="12" font-weight="400" fill="#2E3C42">eradication</text>
<rect x="30" y="745.5" width="6" height="20" fill="#6D4AA3" rx="3"/>
<text x="46" y="761.5" font-size="13" font-weight="800" fill="#6D4AA3" letter-spacing="1.2">HYPERTROPHIC &amp; ACUTE EROSIVE</text>
<rect x="30" y="775.5" width="464" height="246.0" fill="#FFFFFF" rx="11" stroke="#E0E6E3" stroke-width="1.2"/>
<rect x="30" y="775.5" width="6" height="246.0" fill="#6D4AA3" rx="3"/>
<text x="54" y="803.5" font-size="11" font-weight="700" fill="#6B7B80" letter-spacing="1.4">giant hypertrophic gastropathy</text>
<text x="54" y="827.5" font-size="18" font-weight="800" fill="#38141A">Ménétrier’s disease</text>
<text x="54" y="849.5" font-size="12" font-weight="700" fill="#6D4AA3">Features</text>
<text x="126" y="849.5" font-size="12" font-weight="400" fill="#2E3C42">giant rugal folds (body / fundus); foveolar hyperplasia</text>
<text x="126" y="870.0" font-size="12" font-weight="400" fill="#2E3C42">+ glandular atrophy; TGF-α / EGFR overexpression</text>
<text x="54" y="890.5" font-size="12" font-weight="700" fill="#6D4AA3">Effects</text>
<text x="126" y="890.5" font-size="12" font-weight="400" fill="#2E3C42">protein-losing enteropathy → hypoalbuminaemia &amp; oedema;</text>
<text x="126" y="911.0" font-size="12" font-weight="400" fill="#2E3C42">hypochlorhydria; ↑ gastric cancer risk</text>
<text x="54" y="931.5" font-size="12" font-weight="700" fill="#6D4AA3">Treatment</text>
<text x="126" y="931.5" font-size="12" font-weight="400" fill="#2E3C42">high-protein diet, PPI, cetuximab (anti-EGFR);</text>
<text x="126" y="952.0" font-size="12" font-weight="400" fill="#2E3C42">gastrectomy if severe / refractory; CMV-associated form</text>
<text x="126" y="972.5" font-size="12" font-weight="400" fill="#2E3C42">in children</text>
<text x="54" y="993.0" font-size="12" font-weight="700" fill="#6D4AA3">Beware</text>
<text x="126" y="993.0" font-size="12" font-weight="400" fill="#2E3C42">thick folds also = lymphoma, gastrinoma (ZE), cancer —</text>
<text x="126" y="1013.5" font-size="12" font-weight="400" fill="#2E3C42">biopsy</text>
<rect x="506" y="775.5" width="464" height="184.5" fill="#FFFFFF" rx="11" stroke="#E0E6E3" stroke-width="1.2"/>
<rect x="506" y="775.5" width="6" height="184.5" fill="#C77B20" rx="3"/>
<text x="530" y="803.5" font-size="11" font-weight="700" fill="#6B7B80" letter-spacing="1.4">acute mucosal injury</text>
<text x="530" y="827.5" font-size="18" font-weight="800" fill="#38141A">Erosive / haemorrhagic</text>
<text x="530" y="849.5" font-size="12" font-weight="700" fill="#C77B20">Causes</text>
<text x="610" y="849.5" font-size="12" font-weight="400" fill="#2E3C42">NSAIDs, alcohol, severe physiological stress</text>
<text x="530" y="870.0" font-size="12" font-weight="700" fill="#C77B20">Stress ulcers</text>
<text x="610" y="870.0" font-size="12" font-weight="400" fill="#2E3C42">Curling’s (burns) &amp; Cushing’s (raised ICP / head</text>
<text x="610" y="890.5" font-size="12" font-weight="400" fill="#2E3C42">injury)</text>
<text x="530" y="911.0" font-size="12" font-weight="700" fill="#C77B20">Presentation</text>
<text x="610" y="911.0" font-size="12" font-weight="400" fill="#2E3C42">erosions → upper-GI bleeding; often multiple, shallow</text>
<text x="530" y="931.5" font-size="12" font-weight="700" fill="#C77B20">Prevention</text>
<text x="610" y="931.5" font-size="12" font-weight="400" fill="#2E3C42">acid suppression (PPI) for high-risk critically-ill</text>
<text x="610" y="952.0" font-size="12" font-weight="400" fill="#2E3C42">patients</text>
<rect x="30" y="1027.5" width="6" height="20" fill="#245C8C" rx="3"/>
<text x="46" y="1043.5" font-size="13" font-weight="800" fill="#245C8C" letter-spacing="1.2">FURTHER ASPECTS  ·  GRADING, STAGING &amp; ASSOCIATIONS</text>
<rect x="30" y="1057.5" width="940" height="205.0" fill="#FFFFFF" rx="11" stroke="#E0E6E3" stroke-width="1.2"/>
<rect x="30" y="1057.5" width="6" height="205.0" fill="#245C8C" rx="3"/>
<text x="54" y="1085.5" font-size="11" font-weight="700" fill="#6B7B80" letter-spacing="1.4">how gastritis is graded, staged and where it leads</text>
<text x="54" y="1109.5" font-size="18" font-weight="800" fill="#38141A">Also examinable</text>
<text x="54" y="1131.5" font-size="12" font-weight="700" fill="#245C8C">Sydney system</text>
<text x="180" y="1131.5" font-size="12" font-weight="400" fill="#2E3C42">histological grading combining topography + morphology — graded variables: inflammation, activity, atrophy, intestinal</text>
<text x="180" y="1152.0" font-size="12" font-weight="400" fill="#2E3C42">metaplasia and H. pylori density</text>
<text x="54" y="1172.5" font-size="12" font-weight="700" fill="#245C8C">OLGA / OLGIM</text>
<text x="180" y="1172.5" font-size="12" font-weight="400" fill="#2E3C42">stage atrophy (OLGA) / intestinal metaplasia (OLGIM) from antral + corpus biopsies → stages 0–IV; stages III–IV = high</text>
<text x="180" y="1193.0" font-size="12" font-weight="400" fill="#2E3C42">gastric-cancer risk warranting endoscopic surveillance (BSG / MAPS)</text>
<text x="54" y="1213.5" font-size="12" font-weight="700" fill="#245C8C">Rarer types</text>
<text x="180" y="1213.5" font-size="12" font-weight="400" fill="#2E3C42">eosinophilic; lymphocytic; granulomatous (Crohn’s, sarcoid, TB); phlegmonous (bacterial — a surgical emergency)</text>
<text x="54" y="1234.0" font-size="12" font-weight="700" fill="#245C8C">Associated tumours</text>
<text x="180" y="1234.0" font-size="12" font-weight="400" fill="#2E3C42">adenocarcinoma via the Correa cascade (gastritis → atrophy → IM → dysplasia → cancer); MALT lymphoma (H. pylori); Type 1 NET</text>
<text x="180" y="1254.5" font-size="12" font-weight="400" fill="#2E3C42">(autoimmune)</text>
<rect x="30" y="1268.5" width="6" height="20" fill="#C77B20" rx="3"/>
<text x="46" y="1284.5" font-size="13" font-weight="800" fill="#C77B20" letter-spacing="1.2">RED FLAGS &amp; EXAM PITFALLS</text>
<rect x="30" y="1298.5" width="940" height="178.0" fill="#F6ECDD" rx="11" stroke="#EAD7B8" stroke-width="1.2"/>
<rect x="30" y="1298.5" width="6" height="178.0" fill="#C77B20" rx="3"/>
<circle cx="60" cy="1320.5" r="2.6" fill="#BE3A2E"/>
<text x="72" y="1324.5" font-size="12" font-weight="600" fill="#38141A">Dyspepsia + alarm features (dysphagia, weight loss, GI bleeding, anaemia, mass, age ≥55) → urgent OGD, not test-and-treat.</text>
<circle cx="60" cy="1342.5" r="2.6" fill="#BE3A2E"/>
<text x="72" y="1346.5" font-size="12" font-weight="600" fill="#38141A">Confirm H. pylori eradication with UBT or stool antigen — not serology (stays positive); stop PPI 2 weeks &amp; antibiotics 4 weeks before</text>
<text x="72" y="1364.5" font-size="12" font-weight="400" fill="#2E3C42">testing.</text>
<circle cx="60" cy="1382.5" r="2.6" fill="#BE3A2E"/>
<text x="72" y="1386.5" font-size="12" font-weight="600" fill="#38141A">Type A is corpus-predominant &amp; antrum-sparing — check B12 and watch for Type 1 NET and adenocarcinoma.</text>
<circle cx="60" cy="1404.5" r="2.6" fill="#BE3A2E"/>
<text x="72" y="1408.5" font-size="12" font-weight="600" fill="#38141A">Giant gastric folds are not always Ménétrier’s — exclude lymphoma, gastrinoma (ZE) and carcinoma by biopsy.</text>
<circle cx="60" cy="1426.5" r="2.6" fill="#BE3A2E"/>
<text x="72" y="1430.5" font-size="12" font-weight="600" fill="#38141A">Bile reflux gastritis after gastric surgery → consider Roux-en-Y diversion; PPIs do not treat bile.</text>
<circle cx="60" cy="1448.5" r="2.6" fill="#BE3A2E"/>
<text x="72" y="1452.5" font-size="12" font-weight="600" fill="#38141A">H. pylori is a WHO group 1 carcinogen — eradication lowers cancer risk and can regress early MALT lymphoma.</text>
<line x1="30" y1="1494.5" x2="970" y2="1494.5" stroke="#D7DEDC" stroke-width="1"/>
<text x="30" y="1513.5" font-size="10.5" font-weight="400" fill="#7C8A8E">Sources: NICE NG12 (referral) · NICE CG184 &amp; CKS (dyspepsia, H. pylori) · BSG 2019 (Banks et al., Gut) atrophy / intestinal-metaplasia surveillance. Grading: updated Sydney</text>
<text x="30" y="1527.5" font-size="10.5" font-weight="400" fill="#7C8A8E">system (Dixon et al., 1996); OLGA / OLGIM (Rugge et al.).</text>
<text x="30" y="1541.5" font-size="10.5" font-weight="400" fill="#7C8A8E">ABC classification: A = autoimmune, B = bacterial (H. pylori), C = chemical (bile / NSAIDs). Ménétrier’s is a hypertrophic gastropathy (TGF-α / EGFR).</text>
<text x="30" y="1555.5" font-size="10.5" font-weight="400" fill="#9AA6AA">Revision aid — verify against current local guidance before clinical use.</text>
<text x="822" y="42" font-size="21" font-weight="800" letter-spacing="0.2" fill="#FFFFFF">Mock<tspan fill="#6FA8DC">FRCS</tspan></text><text x="822" y="60" font-size="10.5" font-weight="500" fill="#E7BEC3">mockfrcs.co.uk</text><rect x="0" y="1575.5" width="1000" height="46" fill="#6E1E2A"/><text x="30" y="1604.5" font-size="14" font-weight="800" fill="#FFFFFF">Mock<tspan fill="#6FA8DC">FRCS</tspan></text><text x="970" y="1604.5" text-anchor="end" font-size="12.5" font-weight="600" fill="#E7BEC3">Revision resources &amp; realistic mock exams · mockfrcs.co.uk</text>
</svg>