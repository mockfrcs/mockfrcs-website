<svg viewBox="0 0 1000 848" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
<rect x="0" y="0" width="1000" height="848" fill="#F4F6F4"/>
<rect x="0" y="0" width="1000" height="108" fill="#14313A"/><rect x="0" y="108" width="250" height="4" fill="#15806A"/><rect x="250" y="108" width="250" height="4" fill="#245C8C"/><rect x="500" y="108" width="250" height="4" fill="#6D4AA3"/><rect x="750" y="108" width="250" height="4" fill="#BE3A2E"/><text x="30" y="46" font-size="29" font-weight="800" fill="#FFFFFF">Proctology 3 — anal fistula</text><text x="30" y="74" font-size="14" font-weight="500" fill="#AFC7CB">FRCS Part 1 (General Surgery) · cryptoglandular · Goodsall · Parks classification · treatment · FIAT</text><rect x="30" y="128" width="464.0" height="210" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="30" y="128" width="6" height="210" rx="3" fill="#15806A"/><text x="54" y="156" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">ORIGIN</text><text x="54" y="178" font-size="18" font-weight="800" fill="#16252B">Cryptoglandular &amp; abscess</text><text x="54" y="200.0" font-size="11.3" font-weight="400" fill="#2E3C42">Epithelialised track: internal opening at a crypt</text><text x="54" y="215.3" font-size="11.3" font-weight="400" fill="#2E3C42">(dentate line) → external opening on perianal skin.</text><text x="54" y="230.6" font-size="11.3" font-weight="400" fill="#2E3C42">CRYPTOGLANDULAR theory: infected anal gland →</text><text x="54" y="245.9" font-size="11.3" font-weight="400" fill="#2E3C42">intersphincteric abscess → tracks out.</text><text x="54" y="261.2" font-size="11.3" font-weight="400" fill="#2E3C42">~1/3–1/2 of perianal abscesses form a fistula.</text><text x="54" y="276.5" font-size="11.3" font-weight="400" fill="#2E3C42">Abscess types: perianal (commonest), ischiorectal,</text><text x="54" y="291.8" font-size="11.3" font-weight="400" fill="#2E3C42">intersphincteric, supralevator.</text><text x="54" y="307.1" font-size="11.3" font-weight="400" fill="#2E3C42">Acute abscess → incision &amp; drainage (do not probe</text><text x="54" y="322.4" font-size="11.3" font-weight="400" fill="#2E3C42">aggressively / lay open in the acute setting).</text><rect x="506.0" y="128" width="464.0" height="210" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="506.0" y="128" width="6" height="210" rx="3" fill="#245C8C"/><text x="530.0" y="156" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">PREDICTING THE TRACK</text><text x="530.0" y="178" font-size="18" font-weight="800" fill="#16252B">Goodsall’s rule</text><text x="530.0" y="202" font-size="11.4" font-weight="400" fill="#2E3C42">Anterior opening → straight, radial track.</text><text x="530.0" y="218" font-size="11.4" font-weight="400" fill="#2E3C42">Posterior opening → curved track to the</text><text x="530.0" y="233" font-size="11.4" font-weight="400" fill="#2E3C42">posterior midline.</text><circle cx="852.0" cy="248" r="54" fill="#F4F6F8" stroke="#245C8C" stroke-width="1.6"/><line x1="790.0" y1="248" x2="914.0" y2="248" stroke="#6B7B80" stroke-width="1" stroke-dasharray="4 3"/><text x="792.0" y="188" font-size="9" font-weight="400" fill="#6B7B80">anterior</text><text x="792.0" y="318" font-size="9" font-weight="400" fill="#6B7B80">posterior</text><circle cx="826.0" cy="202" r="3" fill="#BE3A2E"/><line x1="826.0" y1="202" x2="852.0" y2="248" stroke="#BE3A2E" stroke-width="1.4"/><circle cx="872.0" cy="202" r="3" fill="#BE3A2E"/><line x1="872.0" y1="202" x2="852.0" y2="248" stroke="#BE3A2E" stroke-width="1.4"/><circle cx="822.0" cy="292" r="3" fill="#6D4AA3"/><path d="M822.0 292 Q 822.0 256 852.0 294" fill="none" stroke="#6D4AA3" stroke-width="1.4"/><circle cx="878.0" cy="292" r="3" fill="#6D4AA3"/><path d="M878.0 292 Q 878.0 256 852.0 294" fill="none" stroke="#6D4AA3" stroke-width="1.4"/><circle cx="852.0" cy="294" r="3.5" fill="#6D4AA3"/><text x="530.0" y="324" font-size="10.6" font-weight="400" fill="#6B7B80">Exception: anterior openings &gt; 3 cm out may curve.</text><rect x="30" y="354" width="940" height="176" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="30" y="354" width="6" height="176" rx="3" fill="#6D4AA3"/><text x="54" y="382" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">PARKS CLASSIFICATION · RELATIVE TO THE SPHINCTER COMPLEX</text><text x="54" y="404" font-size="18" font-weight="800" fill="#16252B">Four types</text><text x="54" y="426" font-size="12" font-weight="800" fill="#6D4AA3">Intersphincteric</text><text x="222" y="426" font-size="12" font-weight="800" fill="#16252B">~70%</text><text x="284" y="426" font-size="11.3" font-weight="400" fill="#2E3C42">track stays in the intersphincteric plane down to perianal skin</text><text x="54" y="450" font-size="12" font-weight="800" fill="#6D4AA3">Transsphincteric</text><text x="222" y="450" font-size="12" font-weight="800" fill="#16252B">~25%</text><text x="284" y="450" font-size="11.3" font-weight="400" fill="#2E3C42">crosses BOTH internal &amp; external sphincter into the ischiorectal fossa</text><text x="54" y="474" font-size="12" font-weight="800" fill="#6D4AA3">Suprasphincteric</text><text x="222" y="474" font-size="12" font-weight="800" fill="#16252B">~5%</text><text x="284" y="474" font-size="11.3" font-weight="400" fill="#2E3C42">up over the puborectalis, then down through the levators</text><text x="54" y="498" font-size="12" font-weight="800" fill="#6D4AA3">Extrasphincteric</text><text x="222" y="498" font-size="12" font-weight="800" fill="#16252B">~1%</text><text x="284" y="498" font-size="11.3" font-weight="400" fill="#2E3C42">rectum → skin bypassing the sphincter complex (iatrogenic / Crohn’s / trauma)</text><text x="54" y="517" font-size="10.7" font-weight="400" fill="#6B7B80">Complex = high transsphincteric / supra- / extrasphincteric, multiple tracks, anterior in women, Crohn’s, recurrent, or pre-existing incontinence.</text><rect x="30" y="546" width="464.0" height="196" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="30" y="546" width="6" height="196" rx="3" fill="#C77B20"/><text x="54" y="574" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">PRINCIPLE: CURE WHILE PRESERVING CONTINENCE</text><text x="54" y="596" font-size="18" font-weight="800" fill="#16252B">Treatment</text><text x="54" y="616.0" font-size="11.1" font-weight="700" fill="#2E3C42">Simple / low (minimal sphincter): FISTULOTOMY (lay</text><text x="54" y="629.2" font-size="11.1" font-weight="400" fill="#2E3C42">open) — high cure, low incontinence risk.</text><text x="54" y="642.4" font-size="11.1" font-weight="700" fill="#2E3C42">Complex / high — preserve continence:</text><text x="54" y="655.6" font-size="11.1" font-weight="400" fill="#2E3C42">· draining (loose) seton — sepsis control / staged;</text><text x="54" y="668.8" font-size="11.1" font-weight="400" fill="#2E3C42">  cutting seton — gradual division</text><text x="54" y="682.0" font-size="11.1" font-weight="400" fill="#2E3C42">· LIFT (ligation of intersphincteric fistula tract)</text><text x="54" y="695.2" font-size="11.1" font-weight="400" fill="#2E3C42">· endorectal advancement flap</text><text x="54" y="708.4" font-size="11.1" font-weight="400" fill="#2E3C42">· fistula plug / fibrin glue (lower success); VAAFT, FiLaC</text><text x="54" y="721.6" font-size="11.1" font-weight="700" fill="#2E3C42">Crohn’s: anti-TNF (infliximab) + draining seton —</text><text x="54" y="734.8" font-size="11.1" font-weight="400" fill="#2E3C42">avoid fistulotomy.</text><rect x="506.0" y="546" width="464.0" height="196" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="506.0" y="546" width="6" height="196" rx="3" fill="#BE3A2E"/><text x="530.0" y="574" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">TRANSSPHINCTERIC · ANN SURG 2021</text><text x="530.0" y="596" font-size="18" font-weight="800" fill="#16252B">FIAT trial</text><text x="530.0" y="616.0" font-size="11.2" font-weight="400" fill="#2E3C42">Surgisis fistula plug vs surgeon’s preference</text><text x="530.0" y="630.5" font-size="11.2" font-weight="400" fill="#2E3C42">(fistulotomy, cutting seton, advancement flap, LIFT)</text><text x="530.0" y="645.0" font-size="11.2" font-weight="400" fill="#2E3C42">for cryptoglandular transsphincteric fistula.</text><text x="530.0" y="659.5" font-size="11.2" font-weight="700" fill="#2E3C42">Healing: plug 54% vs preference 55% — no difference.</text><text x="530.0" y="674.0" font-size="11.2" font-weight="400" fill="#2E3C42">No difference in incontinence QoL; plug costs more →</text><text x="530.0" y="688.5" font-size="11.2" font-weight="400" fill="#2E3C42">not cost-effective, so no routine use of the plug.</text><text x="530.0" y="703.0" font-size="11.2" font-weight="400" fill="#2E3C42">Also flags the POOR overall healing (~55%) of</text><text x="530.0" y="717.5" font-size="11.2" font-weight="400" fill="#2E3C42">transsphincteric fistulae — a hard problem.</text><line x1="30" y1="756" x2="970" y2="756" stroke="#D7DEDC" stroke-width="1"/><text x="30" y="775" font-size="10.3" font-weight="400" fill="#7C8A8E">Sources: Parks classification; Goodsall’s rule; FIAT (Jayne et al., Ann Surg 2021 / NIHR HTA 2019). Crohn’s per ECCO / anti-TNF practice.</text><text x="30" y="789" font-size="10.3" font-weight="400" fill="#9AA6AA">Revision aid — verify against current guidance before clinical use. Completes the proctology set (haemorrhoids · fissure · fistula).</text>
<text x="822" y="42" font-size="21" font-weight="800" letter-spacing="0.2" fill="#FFFFFF">Mock<tspan fill="#6FA8DC">FRCS</tspan></text><text x="822" y="60" font-size="10.5" font-weight="500" fill="#AFC7CB">mockfrcs.co.uk</text><rect x="0" y="802" width="1000" height="46" fill="#14313A"/><text x="30" y="831" font-size="14" font-weight="800" fill="#FFFFFF">Mock<tspan fill="#6FA8DC">FRCS</tspan></text><text x="970" y="831" text-anchor="end" font-size="12.5" font-weight="600" fill="#AFC7CB">Revision resources &amp; realistic mock exams · mockfrcs.co.uk</text>
</svg>