<svg viewBox="0 0 1000 1090" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
<rect x="0" y="0" width="1000" height="1090" fill="#F4F6F4"/>
<rect x="0" y="0" width="1000" height="108" fill="#14313A"/><rect x="0" y="108" width="250" height="4" fill="#15806A"/><rect x="250" y="108" width="250" height="4" fill="#C77B20"/><rect x="500" y="108" width="250" height="4" fill="#BE3A2E"/><rect x="750" y="108" width="250" height="4" fill="#6D4AA3"/><text x="30" y="46" font-size="29" font-weight="800" fill="#FFFFFF">Appendiceal neuroendocrine tumours (NETs)</text><text x="30" y="74" font-size="14" font-weight="500" fill="#AFC7CB">FRCS Part 1 (General Surgery) · the appendicectomy-vs-right-hemicolectomy decision · grading · follow-up</text><rect x="30" y="128" width="464.0" height="216" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="30" y="128" width="6" height="216" rx="3" fill="#15806A"/><text x="54" y="156" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">OVERVIEW</text><text x="54" y="178" font-size="18" font-weight="800" fill="#16252B">Key facts</text><text x="54" y="200.0" font-size="11.4" font-weight="400" fill="#2E3C42">One of the commonest appendiceal tumours;</text><text x="54" y="213.3" font-size="11.4" font-weight="400" fill="#2E3C42">incidence ~0.15–0.6 / 100,000</text><text x="54" y="226.6" font-size="11.4" font-weight="400" fill="#2E3C42">Usually an INCIDENTAL finding after</text><text x="54" y="239.9" font-size="11.4" font-weight="400" fill="#2E3C42">appendicectomy (often done for appendicitis)</text><text x="54" y="253.2" font-size="11.4" font-weight="400" fill="#2E3C42">~70% arise at the tip → rarely obstruct; base</text><text x="54" y="266.5" font-size="11.4" font-weight="400" fill="#2E3C42">location is more concerning for the margin</text><text x="54" y="279.8" font-size="11.4" font-weight="400" fill="#2E3C42">Excellent prognosis, especially &lt;1 cm; nodal /</text><text x="54" y="293.1" font-size="11.4" font-weight="400" fill="#2E3C42">distant spread uncommon</text><text x="54" y="306.4" font-size="11.4" font-weight="400" fill="#2E3C42">IHC: synaptophysin + , chromogranin A +</text><text x="54" y="319.7" font-size="11.4" font-weight="400" fill="#2E3C42">Carcinoid syndrome is RARE — only with liver</text><text x="54" y="333.0" font-size="11.4" font-weight="400" fill="#2E3C42">metastases (then urinary 5-HIAA, blood CgA)</text><rect x="506.0" y="128" width="464.0" height="216" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="506.0" y="128" width="6" height="216" rx="3" fill="#6D4AA3"/><text x="530.0" y="156" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">CLASSIFICATION · WHO 2022</text><text x="530.0" y="178" font-size="18" font-weight="800" fill="#16252B">Grading &amp; TNM</text><text x="530.0" y="200" font-size="11.7" font-weight="400" fill="#2E3C42">NET G1: Ki-67 &lt;3% , &lt;2 mitoses / 2 mm²</text><text x="530.0" y="216" font-size="11.7" font-weight="400" fill="#2E3C42">NET G2: Ki-67 3–20% , 2–20 mitoses</text><text x="530.0" y="232" font-size="11.7" font-weight="400" fill="#2E3C42">NET G3: Ki-67 &gt;20% , well-differentiated</text><text x="530.0" y="248" font-size="11.7" font-weight="700" fill="#2E3C42">NEC: poorly differentiated, Ki-67 &gt;20% (aggressive)</text><text x="530.0" y="268" font-size="11" font-weight="400" fill="#6B7B80">ENETS uses Ki-67 &gt;2% as a risk feature in the</text><text x="530.0" y="281" font-size="11" font-weight="400" fill="#6B7B80">appendiceal 1–2 cm group.</text><text x="530.0" y="304" font-size="11.5" font-weight="700" fill="#2E3C42">TNM (size): T1 ≤2 cm · T2 &gt;2–4 cm · T3 &gt;4 cm</text><text x="530.0" y="320" font-size="11.5" font-weight="400" fill="#2E3C42">or mesoappendix · T4 peritoneum / other organs</text><rect x="30" y="360" width="940" height="248" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="30" y="360" width="6" height="248" rx="3" fill="#14313A"/><text x="54" y="388" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">THE KEY DECISION</text><text x="54" y="410" font-size="18" font-weight="800" fill="#16252B">Appendicectomy vs completion right hemicolectomy</text><text x="54" y="432" font-size="12" font-weight="400" fill="#6B7B80">Driven by tumour SIZE and completeness of excision:</text><rect x="54.0" y="452" width="289.3333333333333" height="132" rx="9" fill="#E2F1EC" stroke="#15806A" stroke-width="1.3"/><rect x="54.0" y="452" width="289.3333333333333" height="30" rx="9" fill="#15806A"/><rect x="54.0" y="472" width="289.3333333333333" height="10" fill="#15806A"/><text x="68.0" y="472" font-size="13.5" font-weight="800" fill="#FFFFFF">&lt; 1 cm</text><text x="68.0" y="502" font-size="11.5" font-weight="400" fill="#2E3C42">G1, completely excised (R0)</text><text x="68.0" y="519" font-size="11.5" font-weight="700" fill="#2E3C42">→ APPENDICECTOMY ALONE</text><text x="68.0" y="536" font-size="11.5" font-weight="400" fill="#2E3C42">(curative) — the majority</text><rect x="355.3333333333333" y="452" width="289.3333333333333" height="132" rx="9" fill="#FBF0E0" stroke="#C77B20" stroke-width="1.3"/><rect x="355.3333333333333" y="452" width="289.3333333333333" height="30" rx="9" fill="#C77B20"/><rect x="355.3333333333333" y="472" width="289.3333333333333" height="10" fill="#C77B20"/><text x="369.3333333333333" y="472" font-size="13.5" font-weight="800" fill="#FFFFFF">1–2 cm  (grey zone)</text><text x="369.3333333333333" y="502" font-size="11.5" font-weight="400" fill="#2E3C42">No risk feature → appendicectomy</text><text x="369.3333333333333" y="519" font-size="11.5" font-weight="400" fill="#2E3C42">≥1 high-risk feature → consider</text><text x="369.3333333333333" y="536" font-size="11.5" font-weight="400" fill="#2E3C42">completion right hemicolectomy</text><text x="369.3333333333333" y="553" font-size="11.5" font-weight="400" fill="#2E3C42">(see risk features below)</text><rect x="656.6666666666666" y="452" width="289.3333333333333" height="132" rx="9" fill="#FBEAE6" stroke="#BE3A2E" stroke-width="1.3"/><rect x="656.6666666666666" y="452" width="289.3333333333333" height="30" rx="9" fill="#BE3A2E"/><rect x="656.6666666666666" y="472" width="289.3333333333333" height="10" fill="#BE3A2E"/><text x="670.6666666666666" y="472" font-size="13.5" font-weight="800" fill="#FFFFFF">&gt; 2 cm  or  R1 / R2</text><text x="670.6666666666666" y="502" font-size="11.5" font-weight="400" fill="#2E3C42">High nodal-metastasis risk</text><text x="670.6666666666666" y="519" font-size="11.5" font-weight="700" fill="#2E3C42">→ COMPLETION RIGHT</text><text x="670.6666666666666" y="536" font-size="11.5" font-weight="400" fill="#2E3C42">HEMICOLECTOMY + lymphadenectomy</text><rect x="30" y="624" width="464.0" height="176" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="30" y="624" width="6" height="176" rx="3" fill="#C77B20"/><text x="54" y="652" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">1–2 cm → FAVOUR RIGHT HEMICOLECTOMY IF:</text><text x="54" y="674" font-size="18" font-weight="800" fill="#16252B">High-risk features</text><circle cx="60" cy="691.0" r="2.6" fill="#C77B20"/><text x="70" y="695.0" font-size="11.7" font-weight="400" fill="#2E3C42">Mesoappendiceal invasion &gt; 3 mm</text><circle cx="60" cy="707.5" r="2.6" fill="#C77B20"/><text x="70" y="711.5" font-size="11.7" font-weight="400" fill="#2E3C42">Positive / close resection margin (R1)</text><circle cx="60" cy="724.0" r="2.6" fill="#C77B20"/><text x="70" y="728.0" font-size="11.7" font-weight="400" fill="#2E3C42">Grade G2 / G3 (Ki-67 &gt; 2% per ENETS)</text><circle cx="60" cy="740.5" r="2.6" fill="#C77B20"/><text x="70" y="744.5" font-size="11.7" font-weight="400" fill="#2E3C42">Lymphovascular invasion</text><circle cx="60" cy="757.0" r="2.6" fill="#C77B20"/><text x="70" y="761.0" font-size="11.7" font-weight="400" fill="#2E3C42">Perineural invasion</text><circle cx="60" cy="773.5" r="2.6" fill="#C77B20"/><text x="70" y="777.5" font-size="11.7" font-weight="400" fill="#2E3C42">Tumour at the base / base involvement</text><rect x="506.0" y="624" width="464.0" height="176" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="506.0" y="624" width="6" height="176" rx="3" fill="#245C8C"/><text x="530.0" y="652" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">CURRENT DEBATE (KNOW THIS)</text><text x="530.0" y="674" font-size="18" font-weight="800" fill="#16252B">Are we overtreating 1–2 cm?</text><text x="530.0" y="696" font-size="11.6" font-weight="400" fill="#2E3C42">ENETS 2023 + Nesti et al. (Lancet Oncol 2023,</text><text x="530.0" y="711" font-size="11.6" font-weight="400" fill="#2E3C42">Europe-wide pooled cohort): in 1–2 cm aNETs,</text><text x="530.0" y="726" font-size="11.6" font-weight="400" fill="#2E3C42">right hemicolectomy may NOT improve outcomes</text><text x="530.0" y="741" font-size="11.6" font-weight="400" fill="#2E3C42">even with ‘risk features’.</text><text x="530.0" y="756" font-size="11.6" font-weight="400" fill="#2E3C42">Nodal involvement is lower than previously thought</text><text x="530.0" y="771" font-size="11.6" font-weight="400" fill="#2E3C42">and may not affect recurrence or survival.</text><text x="530.0" y="786" font-size="11.6" font-weight="700" fill="#2E3C42">→ decision individualised at the NET MDT.</text><rect x="30" y="816" width="464.0" height="168" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="30" y="816" width="6" height="168" rx="3" fill="#BE3A2E"/><text x="54" y="844" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">DON'T BE CAUGHT OUT</text><text x="54" y="866" font-size="18" font-weight="800" fill="#16252B">Goblet cell adenocarcinoma</text><text x="54" y="888" font-size="11.5" font-weight="400" fill="#2E3C42">Formerly ‘goblet cell carcinoid’. A mixed</text><text x="54" y="902" font-size="11.5" font-weight="400" fill="#2E3C42">neuroendocrine–glandular tumour that behaves</text><text x="54" y="916" font-size="11.5" font-weight="400" fill="#2E3C42">like an ADENOCARCINOMA, not a NET.</text><text x="54" y="930" font-size="11.5" font-weight="700" fill="#2E3C42">→ manage as adenocarcinoma: right hemicolectomy,</text><text x="54" y="944" font-size="11.5" font-weight="400" fill="#2E3C42">adenocarcinoma staging, consider adjuvant chemo.</text><text x="54" y="958" font-size="11.5" font-weight="400" fill="#2E3C42">Do not undertreat as a simple carcinoid.</text><text x="54" y="972" font-size="11.5" font-weight="400" fill="#2E3C42">(MiNEN is likewise aggressive.)</text><rect x="506.0" y="816" width="464.0" height="168" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="506.0" y="816" width="6" height="168" rx="3" fill="#15806A"/><text x="530.0" y="844" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">SURVEILLANCE &amp; MARKERS</text><text x="530.0" y="866" font-size="18" font-weight="800" fill="#16252B">Follow-up</text><text x="530.0" y="888" font-size="11.5" font-weight="400" fill="#2E3C42">No routine surveillance if: &lt;1 cm; or 1–2 cm R0</text><text x="530.0" y="902" font-size="11.5" font-weight="400" fill="#2E3C42">without risk features; or node-negative after RHC.</text><text x="530.0" y="916" font-size="11.5" font-weight="400" fill="#2E3C42">Higher-risk (1–2 cm with features not resected,</text><text x="530.0" y="930" font-size="11.5" font-weight="400" fill="#2E3C42">or &gt;2 cm): chromogranin A ± imaging — 3–6 monthly</text><text x="530.0" y="944" font-size="11.5" font-weight="400" fill="#2E3C42">in year 1, then 6–12 monthly for several years.</text><text x="530.0" y="958" font-size="11.5" font-weight="400" fill="#2E3C42">Urinary 5-HIAA only if carcinoid syndrome</text><text x="530.0" y="972" font-size="11.5" font-weight="400" fill="#2E3C42">(i.e. liver metastases).</text><line x1="30" y1="998" x2="970" y2="998" stroke="#D7DEDC" stroke-width="1"/><text x="30" y="1017" font-size="10.3" font-weight="400" fill="#7C8A8E">Sources: ENETS 2023 (Kaltsas et al.) &amp; UKINETS guidance; WHO 2022 classification; Nesti et al. Lancet Oncol 2023 (1–2 cm cohort).</text><text x="30" y="1031" font-size="10.3" font-weight="400" fill="#9AA6AA">Revision aid — verify against current guidance before clinical use.</text>
<text x="822" y="42" font-size="21" font-weight="800" letter-spacing="0.2" fill="#FFFFFF">Mock<tspan fill="#6FA8DC">FRCS</tspan></text><text x="822" y="60" font-size="10.5" font-weight="500" fill="#AFC7CB">mockfrcs.co.uk</text><rect x="0" y="1044" width="1000" height="46" fill="#14313A"/><text x="30" y="1073" font-size="14" font-weight="800" fill="#FFFFFF">Mock<tspan fill="#6FA8DC">FRCS</tspan></text><text x="970" y="1073" text-anchor="end" font-size="12.5" font-weight="600" fill="#AFC7CB">Revision resources &amp; realistic mock exams · mockfrcs.co.uk</text>
</svg>