<svg viewBox="0 0 1000 1080" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
<rect x="0" y="0" width="1000" height="1080" fill="#F4F6F4"/>
<rect x="0" y="0" width="1000" height="108" fill="#14313A"/><rect x="0" y="108" width="250" height="4" fill="#245C8C"/><rect x="250" y="108" width="250" height="4" fill="#6D4AA3"/><rect x="500" y="108" width="250" height="4" fill="#15806A"/><rect x="750" y="108" width="250" height="4" fill="#C77B20"/><text x="30" y="46" font-size="29" font-weight="800" fill="#FFFFFF">Colorectal cancer 3 — molecular, surgery &amp; margins</text><text x="30" y="74" font-size="14" font-weight="500" fill="#AFC7CB">FRCS Part 1 · biomarker-directed therapy · resections by site · CRM &amp; resection margins</text><rect x="30" y="128" width="940" height="276" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="30" y="128" width="6" height="276" rx="3" fill="#6D4AA3"/><text x="54" y="156" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">BIOMARKER-DIRECTED THERAPY</text><text x="54" y="178" font-size="18" font-weight="800" fill="#16252B">Test every metastatic CRC: RAS, BRAF, MMR/MSI (± HER2)</text><rect x="54" y="187" width="6" height="40" rx="3" fill="#245C8C"/><text x="70" y="200" font-size="13" font-weight="800" fill="#245C8C">RAS  (KRAS / NRAS)</text><text x="70" y="217" font-size="11.7" font-weight="400" fill="#2E3C42">Wild-type → anti-EGFR works (cetuximab / panitumumab) — benefit mainly LEFT-sided primaries</text><text x="70" y="232" font-size="11.7" font-weight="400" fill="#2E3C42">Mutant → anti-EGFR ineffective → use bevacizumab-based chemotherapy</text><rect x="54" y="244" width="6" height="40" rx="3" fill="#BE3A2E"/><text x="70" y="257" font-size="13" font-weight="800" fill="#BE3A2E">BRAF V600E  (~8–12%)</text><text x="70" y="274" font-size="11.7" font-weight="400" fill="#2E3C42">Poor prognosis; BRAF-inhibitor monotherapy fails (feedback EGFR reactivation)</text><text x="70" y="289" font-size="11.7" font-weight="400" fill="#2E3C42">→ encorafenib + cetuximab (BEACON) after first-line</text><rect x="54" y="301" width="6" height="40" rx="3" fill="#15806A"/><text x="70" y="314" font-size="13" font-weight="800" fill="#15806A">dMMR / MSI-H  (~15% early, ~5% metastatic)</text><text x="70" y="331" font-size="11.7" font-weight="400" fill="#2E3C42">Immunotherapy (anti-PD-1): pembrolizumab 1st-line metastatic; neoadjuvant dostarlimab in dMMR rectal</text><text x="70" y="346" font-size="11.7" font-weight="400" fill="#2E3C42">Also: better prognosis · Lynch trigger · no benefit from single-agent 5-FU (stage II) · poor chemo response</text><rect x="54" y="358" width="6" height="40" rx="3" fill="#C77B20"/><text x="70" y="371" font-size="13" font-weight="800" fill="#C77B20">VEGF / HER2</text><text x="70" y="388" font-size="11.7" font-weight="400" fill="#2E3C42">Bevacizumab (anti-VEGF): added to chemo, any RAS status, no predictive biomarker</text><text x="70" y="403" font-size="11.7" font-weight="400" fill="#2E3C42">HER2-amplified (RAS-WT): emerging target — trastuzumab + tucatinib (MOUNTAINEER)</text><rect x="30" y="418" width="940" height="128" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="30" y="418" width="6" height="128" rx="3" fill="#245C8C"/><text x="54" y="446" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">KEY BIOLOGIC-THERAPY TRIALS</text><text x="54" y="468" font-size="18" font-weight="800" fill="#16252B">KEYNOTE-177 · dostarlimab · BEACON · New EPOC</text><text x="54.0" y="492" font-size="12.5" font-weight="800" fill="#245C8C">KEYNOTE-177</text><text x="54.0" y="510" font-size="11" font-weight="400" fill="#2E3C42">pembrolizumab &gt; chemo</text><text x="54.0" y="525" font-size="11" font-weight="400" fill="#2E3C42">1st-line dMMR mCRC</text><text x="54.0" y="540" font-size="11" font-weight="400" fill="#2E3C42">(PFS 16.5 vs 8.2 mo)</text><text x="280.0" y="492" font-size="12.5" font-weight="800" fill="#245C8C">Dostarlimab</text><text x="280.0" y="510" font-size="11" font-weight="400" fill="#2E3C42">neoadjuvant PD-1 in dMMR</text><text x="280.0" y="525" font-size="11" font-weight="400" fill="#2E3C42">rectal → 100% clinical CR,</text><text x="280.0" y="540" font-size="11" font-weight="400" fill="#2E3C42">organ preservation (2022)</text><text x="506.0" y="492" font-size="12.5" font-weight="800" fill="#245C8C">BEACON</text><text x="506.0" y="510" font-size="11" font-weight="400" fill="#2E3C42">encorafenib + cetuximab</text><text x="506.0" y="525" font-size="11" font-weight="400" fill="#2E3C42">improves OS in</text><text x="506.0" y="540" font-size="11" font-weight="400" fill="#2E3C42">BRAF V600E mCRC</text><text x="732.0" y="492" font-size="12.5" font-weight="800" fill="#245C8C">New EPOC</text><text x="732.0" y="510" font-size="11" font-weight="400" fill="#2E3C42">cetuximab added to periop</text><text x="732.0" y="525" font-size="11" font-weight="400" fill="#2E3C42">chemo for resectable liver</text><text x="732.0" y="540" font-size="11" font-weight="400" fill="#2E3C42">mets → WORSE survival</text><rect x="30" y="560" width="464.0" height="250" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="30" y="560" width="6" height="250" rx="3" fill="#15806A"/><text x="54" y="588" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">OPERATIVE ONCOLOGY</text><text x="54" y="610" font-size="18" font-weight="800" fill="#16252B">Surgical principles</text><text x="54" y="634" font-size="11.7" font-weight="400" fill="#2E3C42">TME (Heald): sharp excision of the intact</text><text x="54" y="650" font-size="11.7" font-weight="400" fill="#2E3C42">mesorectal envelope — rectal cancer</text><text x="54" y="666" font-size="11.7" font-weight="400" fill="#2E3C42">CME + central vascular ligation (Hohenberger):</text><text x="54" y="682" font-size="11.7" font-weight="400" fill="#2E3C42">the colon equivalent</text><text x="54" y="698" font-size="11.7" font-weight="400" fill="#2E3C42">Adequate lymphadenectomy: ≥12 nodes to stage</text><text x="54" y="714" font-size="11.7" font-weight="400" fill="#2E3C42">High vascular tie · no-touch isolation</text><text x="54" y="730" font-size="11.7" font-weight="400" fill="#2E3C42">Early rectal (T1): local excision — TEM / TAMIS</text><text x="54" y="746" font-size="11.7" font-weight="400" fill="#2E3C42">Low anastomosis: defunctioning loop ileostomy</text><rect x="506.0" y="560" width="464.0" height="250" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="506.0" y="560" width="6" height="250" rx="3" fill="#15806A"/><text x="530.0" y="588" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">RESECTION BY TUMOUR SITE</text><text x="530.0" y="610" font-size="18" font-weight="800" fill="#16252B">Which operation?</text><text x="530.0" y="632" font-size="11.5" font-weight="700" fill="#16252B">Caecum / ascending</text><text x="730.0" y="632" font-size="11.5" font-weight="400" fill="#2E3C42">right hemicolectomy</text><text x="530.0" y="652.5" font-size="11.5" font-weight="700" fill="#16252B">Hepatic flexure / transverse</text><text x="730.0" y="652.5" font-size="11.5" font-weight="400" fill="#2E3C42">extended right hemi</text><text x="530.0" y="673.0" font-size="11.5" font-weight="700" fill="#16252B">Descending</text><text x="730.0" y="673.0" font-size="11.5" font-weight="400" fill="#2E3C42">left hemicolectomy</text><text x="530.0" y="693.5" font-size="11.5" font-weight="700" fill="#16252B">Sigmoid</text><text x="730.0" y="693.5" font-size="11.5" font-weight="400" fill="#2E3C42">sigmoid colectomy / high AR</text><text x="530.0" y="714.0" font-size="11.5" font-weight="700" fill="#16252B">Upper–mid rectum</text><text x="730.0" y="714.0" font-size="11.5" font-weight="400" fill="#2E3C42">anterior resection (TME)</text><text x="530.0" y="734.5" font-size="11.5" font-weight="700" fill="#16252B">Low rectum</text><text x="730.0" y="734.5" font-size="11.5" font-weight="400" fill="#2E3C42">low / ultralow AR ± stoma</text><text x="530.0" y="755.0" font-size="11.5" font-weight="700" fill="#16252B">Very low / sphincter</text><text x="730.0" y="755.0" font-size="11.5" font-weight="400" fill="#2E3C42">APER (end colostomy)</text><text x="530.0" y="775.5" font-size="11.5" font-weight="700" fill="#16252B">Emergency / unprepped</text><text x="730.0" y="775.5" font-size="11.5" font-weight="400" fill="#2E3C42">Hartmann’s or subtotal colectomy</text><rect x="30" y="824" width="940" height="150" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="30" y="824" width="6" height="150" rx="3" fill="#C77B20"/><text x="54" y="852" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">RESECTION MARGINS</text><text x="54" y="874" font-size="18" font-weight="800" fill="#16252B">CRM, distal margin &amp; completeness</text><text x="54" y="898" font-size="11.7" font-weight="700" fill="#C77B20">CRM (circumferential):</text><text x="204" y="898.0" font-size="11.7" font-weight="400" fill="#2E3C42">tumour / node / deposit ≤1 mm = involved (R1) — the strongest predictor of local recurrence, especially rectal</text><text x="54" y="915.5" font-size="11.7" font-weight="700" fill="#C77B20">Distal margin:</text><text x="204" y="915.5" font-size="11.7" font-weight="400" fill="#2E3C42">rectal ≥1 cm acceptable (esp. post-neoadjuvant), 2 cm ideal; colon — clear longitudinal margin + lymphadenectomy</text><text x="54" y="933.0" font-size="11.7" font-weight="700" fill="#C77B20">Completeness:</text><text x="204" y="933.0" font-size="11.7" font-weight="400" fill="#2E3C42">R0 = clear · R1 = microscopic (≤1 mm) · R2 = macroscopic residual</text><text x="54" y="950.5" font-size="11.7" font-weight="700" fill="#C77B20">After neoadjuvant:</text><text x="204" y="950.5" font-size="11.7" font-weight="400" fill="#2E3C42">tumour regression grade (Mandard / Dworak / modified Ryan) — prognostic</text><line x1="30" y1="988" x2="970" y2="988" stroke="#D7DEDC" stroke-width="1"/><text x="30" y="1007" font-size="10.3" font-weight="400" fill="#7C8A8E">Trials: KEYNOTE-177 (NEJM 2020) · dostarlimab (Cercek, NEJM 2022) · BEACON (NEJM 2019) · New EPOC (Lancet Oncol 2014/2020). CRM/margins per RCPath dataset.</text><text x="30" y="1021" font-size="10.3" font-weight="400" fill="#9AA6AA">Revision aid — verify against current guidance before clinical use. Completes the CRC set (staging → treatment → molecular/surgery).</text>
<text x="822" y="42" font-size="21" font-weight="800" letter-spacing="0.2" fill="#FFFFFF">Mock<tspan fill="#6FA8DC">FRCS</tspan></text><text x="822" y="60" font-size="10.5" font-weight="500" fill="#AFC7CB">mockfrcs.co.uk</text><rect x="0" y="1034" width="1000" height="46" fill="#14313A"/><text x="30" y="1063" font-size="14" font-weight="800" fill="#FFFFFF">Mock<tspan fill="#6FA8DC">FRCS</tspan></text><text x="970" y="1063" text-anchor="end" font-size="12.5" font-weight="600" fill="#AFC7CB">Revision resources &amp; realistic mock exams · mockfrcs.co.uk</text>
</svg>