<svg viewBox="0 0 1000 1010" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
<rect x="0" y="0" width="1000" height="1010" fill="#F4F6F4"/>
<rect x="0" y="0" width="1000" height="108" fill="#14313A"/><rect x="0" y="108" width="250" height="4" fill="#C77B20"/><rect x="250" y="108" width="250" height="4" fill="#BE3A2E"/><rect x="500" y="108" width="250" height="4" fill="#15806A"/><rect x="750" y="108" width="250" height="4" fill="#245C8C"/><text x="30" y="46" font-size="26" font-weight="800" fill="#FFFFFF">Pelvic floor 1 — obstructed defecation vs incontinence</text><text x="30" y="74" font-size="14" font-weight="500" fill="#AFC7CB">FRCS Part 1 (General Surgery) · ODS vs faecal incontinence · shared work-up · treatments</text><rect x="30" y="128" width="464.0" height="256" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="30" y="128" width="6" height="256" rx="3" fill="#C77B20"/><text x="54" y="156" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">OBSTRUCTED DEFECATION (ODS)</text><text x="54" y="178" font-size="18" font-weight="800" fill="#16252B">Difficult evacuation</text><text x="54" y="200" font-size="11.5" font-weight="400" fill="#2E3C42">Difficulty emptying the rectum despite the urge.</text><text x="54" y="222" font-size="11.5" font-weight="700" fill="#C77B20">Functional:</text><text x="54" y="236.5" font-size="11.5" font-weight="400" fill="#2E3C42">dyssynergia / anismus (paradoxical puborectalis), rectal</text><text x="54" y="251.0" font-size="11.5" font-weight="400" fill="#2E3C42">hyposensitivity, poor propulsion</text><text x="54" y="271.5" font-size="11.5" font-weight="700" fill="#C77B20">Structural:</text><text x="54" y="286.0" font-size="11.5" font-weight="400" fill="#2E3C42">rectocele, internal rectal intussusception, enterocele, sigmoidocele,</text><text x="54" y="300.5" font-size="11.5" font-weight="400" fill="#2E3C42">descending perineum</text><text x="54" y="321.0" font-size="11.5" font-weight="700" fill="#C77B20">Symptoms:</text><text x="54" y="335.5" font-size="11.5" font-weight="400" fill="#2E3C42">straining, incomplete evacuation, sense of blockage, digitation</text><text x="54" y="350.0" font-size="11.5" font-weight="400" fill="#2E3C42">(vaginal / perineal / anal), prolonged or repeated toileting, enema</text><text x="54" y="364.5" font-size="11.5" font-weight="400" fill="#2E3C42">use</text><rect x="506.0" y="128" width="464.0" height="256" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="506.0" y="128" width="6" height="256" rx="3" fill="#BE3A2E"/><text x="530.0" y="156" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">FAECAL INCONTINENCE (FI)</text><text x="530.0" y="178" font-size="18" font-weight="800" fill="#16252B">Involuntary loss of stool</text><text x="530.0" y="200" font-size="11.5" font-weight="400" fill="#2E3C42">Recurrent involuntary loss of flatus / liquid / solid.</text><text x="530.0" y="222" font-size="11.5" font-weight="700" fill="#BE3A2E">Types:</text><text x="530.0" y="236.5" font-size="11.5" font-weight="400" fill="#2E3C42">passive (unaware — IAS / rectal sensation) · urge (can’t defer — EAS /</text><text x="530.0" y="251.0" font-size="11.5" font-weight="400" fill="#2E3C42">low capacity) · mixed</text><text x="530.0" y="271.5" font-size="11.5" font-weight="700" fill="#BE3A2E">Causes:</text><text x="530.0" y="286.0" font-size="11.5" font-weight="400" fill="#2E3C42">obstetric injury (commonest — sphincter tear, pudendal neuropathy),</text><text x="530.0" y="300.5" font-size="11.5" font-weight="400" fill="#2E3C42">iatrogenic (sphincterotomy, fistulotomy, haemorrhoidectomy),</text><text x="530.0" y="315.0" font-size="11.5" font-weight="400" fill="#2E3C42">neurological, rectal prolapse, overflow, IBD / radiation, degeneration</text><rect x="30" y="400" width="940" height="182" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="30" y="400" width="6" height="182" rx="3" fill="#245C8C"/><text x="54" y="428" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">SHARED PELVIC-FLOOR WORK-UP</text><text x="54" y="450" font-size="18" font-weight="800" fill="#16252B">Investigations</text><text x="54" y="472" font-size="11.6" font-weight="700" fill="#245C8C">History + DRE</text><text x="264" y="472.0" font-size="11.5" font-weight="400" fill="#2E3C42">resting / squeeze tone, prolapse, rectocele, perineal descent; bowel diary</text><text x="54" y="490.5" font-size="11.6" font-weight="700" fill="#245C8C">Endoanal ultrasound</text><text x="264" y="490.5" font-size="11.5" font-weight="400" fill="#2E3C42">sphincter integrity — IAS / EAS defects (key for FI, esp. obstetric)</text><text x="54" y="509.0" font-size="11.6" font-weight="700" fill="#245C8C">Anorectal manometry</text><text x="264" y="509.0" font-size="11.5" font-weight="400" fill="#2E3C42">resting (IAS) &amp; squeeze (EAS) pressures, RAIR, rectal sensation &amp; compliance, balloon expulsion</text><text x="54" y="527.5" font-size="11.6" font-weight="700" fill="#245C8C">Defecating / MR proctography</text><text x="264" y="527.5" font-size="11.5" font-weight="400" fill="#2E3C42">ODS structure — rectocele, intussusception, enterocele, anismus, perineal descent</text><text x="54" y="546.0" font-size="11.6" font-weight="700" fill="#245C8C">Colonic transit study</text><text x="264" y="546.0" font-size="11.5" font-weight="400" fill="#2E3C42">if slow-transit constipation is suspected</text><rect x="30" y="598" width="464.0" height="206" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="30" y="598" width="6" height="206" rx="3" fill="#C77B20"/><text x="54" y="626" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">STEPWISE</text><text x="54" y="648" font-size="18" font-weight="800" fill="#16252B">ODS treatment</text><text x="54" y="670.0" font-size="11.4" font-weight="400" fill="#2E3C42">Conservative (1st): fibre / fluids, laxatives, bowel</text><text x="54" y="684.5" font-size="11.4" font-weight="400" fill="#2E3C42">retraining, BIOFEEDBACK (esp. dyssynergia),</text><text x="54" y="699.0" font-size="11.4" font-weight="400" fill="#2E3C42">rectal irrigation</text><text x="54" y="713.5" font-size="11.4" font-weight="700" fill="#2E3C42">Treat dyssynergia with biofeedback FIRST — surgery</text><text x="54" y="728.0" font-size="11.4" font-weight="400" fill="#2E3C42">will not fix a functional problem</text><text x="54" y="742.5" font-size="11.4" font-weight="400" fill="#2E3C42">Structural disease: STARR (stapled transanal rectal</text><text x="54" y="757.0" font-size="11.4" font-weight="400" fill="#2E3C42">resection) for rectocele / intussusception; ventral</text><text x="54" y="771.5" font-size="11.4" font-weight="400" fill="#2E3C42">mesh rectopexy; rectocele repair; Delorme’s for</text><text x="54" y="786.0" font-size="11.4" font-weight="400" fill="#2E3C42">internal prolapse</text><rect x="506.0" y="598" width="464.0" height="206" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="506.0" y="598" width="6" height="206" rx="3" fill="#BE3A2E"/><text x="530.0" y="626" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">NICE STEPWISE (CG49)</text><text x="530.0" y="648" font-size="18" font-weight="800" fill="#16252B">FI treatment</text><text x="530.0" y="670.0" font-size="11.2" font-weight="400" fill="#2E3C42">Conservative (1st): diet, loperamide, bowel-habit</text><text x="530.0" y="683.3" font-size="11.2" font-weight="400" fill="#2E3C42">regulation, skin care, pelvic-floor exercises +</text><text x="530.0" y="696.6" font-size="11.2" font-weight="400" fill="#2E3C42">biofeedback, rectal irrigation, anal plugs</text><text x="530.0" y="709.9" font-size="11.2" font-weight="700" fill="#2E3C42">Sacral nerve stimulation (neuromodulation) — the</text><text x="530.0" y="723.2" font-size="11.2" font-weight="400" fill="#2E3C42">key intervention for urge &amp; passive FI</text><text x="530.0" y="736.5" font-size="11.2" font-weight="400" fill="#2E3C42">Sphincter repair: overlapping sphincteroplasty for a</text><text x="530.0" y="749.8" font-size="11.2" font-weight="400" fill="#2E3C42">defined (obstetric) defect</text><text x="530.0" y="763.1" font-size="11.2" font-weight="400" fill="#2E3C42">Also: PTNS, injectable bulking agents (passive / IAS)</text><text x="530.0" y="776.4" font-size="11.2" font-weight="400" fill="#2E3C42">Last resort: artificial sphincter, graciloplasty,</text><text x="530.0" y="789.7" font-size="11.2" font-weight="400" fill="#2E3C42">antegrade continence enema (ACE), stoma</text><rect x="30" y="820" width="940" height="84" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="30" y="820" width="6" height="84" rx="3" fill="#6D4AA3"/><text x="54" y="848" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">SCORING SYSTEMS</text><text x="54" y="870" font-size="16" font-weight="800" fill="#16252B">Quantify severity</text><text x="54" y="892" font-size="11.7" font-weight="400" fill="#2E3C42">Incontinence: Wexner (Cleveland Clinic) &amp; St Mark’s (Vaizey).   Constipation / ODS: Wexner constipation score, ODS (Longo) score.</text><line x1="30" y1="918" x2="970" y2="918" stroke="#D7DEDC" stroke-width="1"/><text x="30" y="937" font-size="10.3" font-weight="400" fill="#7C8A8E">Sources: NICE CG49 (faecal incontinence); ACPGBI / pelvic-floor society guidance; standard coloproctology texts. Investigations per anorectal physiology practice.</text><text x="30" y="951" font-size="10.3" font-weight="400" fill="#9AA6AA">Revision aid — verify against current guidance before clinical use. Rectal prolapse → poster 2 · IBS → poster 3.</text>
<text x="822" y="42" font-size="21" font-weight="800" letter-spacing="0.2" fill="#FFFFFF">Mock<tspan fill="#6FA8DC">FRCS</tspan></text><text x="822" y="60" font-size="10.5" font-weight="500" fill="#AFC7CB">mockfrcs.co.uk</text><rect x="0" y="964" width="1000" height="46" fill="#14313A"/><text x="30" y="993" font-size="14" font-weight="800" fill="#FFFFFF">Mock<tspan fill="#6FA8DC">FRCS</tspan></text><text x="970" y="993" text-anchor="end" font-size="12.5" font-weight="600" fill="#AFC7CB">Revision resources &amp; realistic mock exams · mockfrcs.co.uk</text>
</svg>