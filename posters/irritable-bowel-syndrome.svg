<svg viewBox="0 0 1000 898" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
<rect x="0" y="0" width="1000" height="898" fill="#F4F6F4"/>
<rect x="0" y="0" width="1000" height="108" fill="#14313A"/><rect x="0" y="108" width="250" height="4" fill="#245C8C"/><rect x="250" y="108" width="250" height="4" fill="#15806A"/><rect x="500" y="108" width="250" height="4" fill="#C77B20"/><rect x="750" y="108" width="250" height="4" fill="#6D4AA3"/><text x="30" y="46" font-size="29" font-weight="800" fill="#FFFFFF">Irritable bowel syndrome (IBS)</text><text x="30" y="74" font-size="14" font-weight="500" fill="#AFC7CB">FRCS Part 1 (General Surgery) · Rome IV criteria · subtypes · red flags · NICE treatment (CG61)</text><rect x="30" y="128" width="464.0" height="210" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="30" y="128" width="6" height="210" rx="3" fill="#245C8C"/><text x="54" y="156" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">DIAGNOSIS · ROME IV (2016)</text><text x="54" y="178" font-size="18" font-weight="800" fill="#16252B">Rome IV criteria</text><text x="54" y="200" font-size="11.6" font-weight="600" fill="#2E3C42">Recurrent abdominal PAIN, on average ≥1 day/week in</text><text x="54" y="215" font-size="11.6" font-weight="600" fill="#2E3C42">the last 3 months, associated with ≥2 of:</text><circle cx="64" cy="232" r="9" fill="#245C8C"/><text x="64" y="236" font-size="11.5" font-weight="800" fill="#FFFFFF">1</text><text x="64" y="236" text-anchor="middle" font-size="11.5" font-weight="800" fill="#FFFFFF">1</text><text x="82" y="236" font-size="12" font-weight="400" fill="#2E3C42">Related to defecation</text><circle cx="64" cy="252" r="9" fill="#245C8C"/><text x="64" y="256" font-size="11.5" font-weight="800" fill="#FFFFFF">2</text><text x="64" y="256" text-anchor="middle" font-size="11.5" font-weight="800" fill="#FFFFFF">2</text><text x="82" y="256" font-size="12" font-weight="400" fill="#2E3C42">Change in stool frequency</text><circle cx="64" cy="272" r="9" fill="#245C8C"/><text x="64" y="276" font-size="11.5" font-weight="800" fill="#FFFFFF">3</text><text x="64" y="276" text-anchor="middle" font-size="11.5" font-weight="800" fill="#FFFFFF">3</text><text x="82" y="276" font-size="12" font-weight="400" fill="#2E3C42">Change in stool form (appearance)</text><text x="54" y="308" font-size="10.9" font-weight="400" fill="#6B7B80">Onset ≥6 months before diagnosis. IBS is a POSITIVE</text><text x="54" y="322" font-size="10.9" font-weight="400" fill="#6B7B80">clinical diagnosis — not one of exclusion.</text><rect x="506.0" y="128" width="464.0" height="210" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="506.0" y="128" width="6" height="210" rx="3" fill="#15806A"/><text x="530.0" y="156" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">SUBTYPES · BRISTOL STOOL FORM</text><text x="530.0" y="178" font-size="18" font-weight="800" fill="#16252B">Classify by stool</text><text x="530.0" y="200" font-size="10.9" font-weight="400" fill="#6B7B80">By stool form on days with ABNORMAL bowel movements</text><text x="530.0" y="213" font-size="10.9" font-weight="400" fill="#6B7B80">(&gt;25% threshold):</text><text x="530.0" y="236" font-size="12.5" font-weight="800" fill="#15806A">IBS-C</text><text x="596.0" y="236" font-size="11.2" font-weight="400" fill="#2E3C42">(constipation)  &gt;25% hard (BSFS 1–2), &lt;25% loose</text><text x="530.0" y="258" font-size="12.5" font-weight="800" fill="#C77B20">IBS-D</text><text x="596.0" y="258" font-size="11.2" font-weight="400" fill="#2E3C42">(diarrhoea)  &gt;25% loose (BSFS 6–7), &lt;25% hard</text><text x="530.0" y="280" font-size="12.5" font-weight="800" fill="#6D4AA3">IBS-M</text><text x="596.0" y="280" font-size="11.2" font-weight="400" fill="#2E3C42">(mixed)  &gt;25% both hard and loose</text><text x="530.0" y="302" font-size="12.5" font-weight="800" fill="#6B7B80">IBS-U</text><text x="596.0" y="302" font-size="11.2" font-weight="400" fill="#2E3C42">(unclassified)  meets IBS but not C/D/M</text><text x="530.0" y="328" font-size="10.6" font-weight="400" fill="#6B7B80">Rome III change: subtype uses symptomatic stools only.</text><rect x="30" y="354" width="464.0" height="176" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="30" y="354" width="6" height="176" rx="3" fill="#BE3A2E"/><text x="54" y="382" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">EXCLUDE ORGANIC DISEASE</text><text x="54" y="404" font-size="18" font-weight="800" fill="#16252B">Red flags → investigate</text><circle cx="60" cy="421.0" r="2.6" fill="#BE3A2E"/><text x="70" y="425.0" font-size="11.5" font-weight="400" fill="#2E3C42">Unexplained weight loss</text><circle cx="60" cy="435.5" r="2.6" fill="#BE3A2E"/><text x="70" y="439.5" font-size="11.5" font-weight="400" fill="#2E3C42">Rectal bleeding</text><circle cx="60" cy="450.0" r="2.6" fill="#BE3A2E"/><text x="70" y="454.0" font-size="11.5" font-weight="400" fill="#2E3C42">Iron-deficiency anaemia</text><circle cx="60" cy="464.5" r="2.6" fill="#BE3A2E"/><text x="70" y="468.5" font-size="11.5" font-weight="400" fill="#2E3C42">New-onset symptoms age ≥50–60</text><circle cx="60" cy="479.0" r="2.6" fill="#BE3A2E"/><text x="70" y="483.0" font-size="11.5" font-weight="400" fill="#2E3C42">Nocturnal / waking symptoms</text><circle cx="60" cy="493.5" r="2.6" fill="#BE3A2E"/><text x="70" y="497.5" font-size="11.5" font-weight="400" fill="#2E3C42">FHx bowel / ovarian cancer or IBD</text><circle cx="60" cy="508.0" r="2.6" fill="#BE3A2E"/><text x="70" y="512.0" font-size="11.5" font-weight="400" fill="#2E3C42">Abdominal or rectal mass, fever</text><rect x="506.0" y="354" width="464.0" height="176" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="506.0" y="354" width="6" height="176" rx="3" fill="#245C8C"/><text x="530.0" y="382" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">DIAGNOSIS IS CLINICAL — TEST TO EXCLUDE</text><text x="530.0" y="404" font-size="18" font-weight="800" fill="#16252B">Investigations</text><text x="530.0" y="426.0" font-size="11.4" font-weight="400" fill="#2E3C42">FBC · CRP / ESR</text><text x="530.0" y="440.5" font-size="11.4" font-weight="400" fill="#2E3C42">Coeliac serology (anti-tTG + total IgA) — esp. IBS-D / M</text><text x="530.0" y="455.0" font-size="11.4" font-weight="400" fill="#2E3C42">Faecal calprotectin — exclude IBD</text><text x="530.0" y="469.5" font-size="11.4" font-weight="400" fill="#2E3C42">CA125 if ovarian cancer suspected (NICE)</text><text x="530.0" y="484.0" font-size="11.4" font-weight="400" fill="#2E3C42">FIT / colonoscopy if red flags or age</text><text x="530.0" y="498.5" font-size="11.4" font-weight="400" fill="#6B7B80">Not routinely needed: TFTs, imaging, H2 breath test,</text><text x="530.0" y="513.0" font-size="11.4" font-weight="400" fill="#6B7B80">stool ova &amp; parasites (unless indicated)</text><rect x="30" y="546" width="940" height="246" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="30" y="546" width="6" height="246" rx="3" fill="#6D4AA3"/><text x="54" y="574" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">NICE CG61 · STEPWISE</text><text x="54" y="596" font-size="18" font-weight="800" fill="#16252B">Treatment</text><rect x="54" y="612" width="892" height="52" rx="8" fill="#EFEAF6"/><text x="66" y="631" font-size="12.5" font-weight="800" fill="#6D4AA3">1 · Diet &amp; lifestyle (first-line)</text><text x="66" y="649" font-size="11.3" font-weight="400" fill="#2E3C42">Regular meals; adjust fibre (↓ insoluble bran, soluble ispaghula for IBS-C); limit caffeine / alcohol / fizzy / fatty foods; fluids;</text><text x="66" y="662" font-size="11.3" font-weight="400" fill="#2E3C42">activity. If it persists → low-FODMAP diet (dietitian-led) and a 4-week trial of probiotics.</text><text x="54" y="686" font-size="12.5" font-weight="800" fill="#6D4AA3">2 · Pharmacological — by predominant symptom</text><rect x="54.0" y="696" width="289.3333333333333" height="60" rx="7" fill="#FFFFFF" stroke="#C77B20" stroke-width="1.2"/><text x="66.0" y="714" font-size="11.6" font-weight="800" fill="#C77B20">Pain / spasm</text><text x="66.0" y="730" font-size="10.8" font-weight="400" fill="#2E3C42">Antispasmodics:</text><text x="66.0" y="743" font-size="10.8" font-weight="400" fill="#2E3C42">mebeverine, hyoscine,</text><text x="66.0" y="756" font-size="10.8" font-weight="400" fill="#2E3C42">peppermint oil</text><rect x="355.3333333333333" y="696" width="289.3333333333333" height="60" rx="7" fill="#FFFFFF" stroke="#15806A" stroke-width="1.2"/><text x="367.3333333333333" y="714" font-size="11.6" font-weight="800" fill="#15806A">IBS-C (constipation)</text><text x="367.3333333333333" y="730" font-size="10.8" font-weight="400" fill="#2E3C42">Laxatives — AVOID</text><text x="367.3333333333333" y="743" font-size="10.8" font-weight="400" fill="#2E3C42">lactulose (bloating);</text><text x="367.3333333333333" y="756" font-size="10.8" font-weight="400" fill="#2E3C42">linaclotide if laxatives fail</text><rect x="656.6666666666666" y="696" width="289.3333333333333" height="60" rx="7" fill="#FFFFFF" stroke="#BE3A2E" stroke-width="1.2"/><text x="668.6666666666666" y="714" font-size="11.6" font-weight="800" fill="#BE3A2E">IBS-D (diarrhoea)</text><text x="668.6666666666666" y="730" font-size="10.8" font-weight="400" fill="#2E3C42">Loperamide (first-line</text><text x="668.6666666666666" y="743" font-size="10.8" font-weight="400" fill="#2E3C42">antimotility)</text><text x="54" y="776" font-size="11.3" font-weight="600" fill="#2E3C42">2nd-line pain: low-dose TCA (amitriptyline) then SSRI.    3 · Refractory ≥12 months → CBT / gut-directed hypnotherapy.</text><line x1="30" y1="806" x2="970" y2="806" stroke="#D7DEDC" stroke-width="1"/><text x="30" y="825" font-size="10.3" font-weight="400" fill="#7C8A8E">Sources: Rome IV criteria (2016); NICE CG61 (irritable bowel syndrome in adults). Subtypes per Bristol Stool Form Scale.</text><text x="30" y="839" font-size="10.3" font-weight="400" fill="#9AA6AA">Revision aid — verify against current guidance before clinical use. Completes the pelvic-floor set (ODS/incontinence · prolapse · IBS).</text>
<text x="822" y="42" font-size="21" font-weight="800" letter-spacing="0.2" fill="#FFFFFF">Mock<tspan fill="#6FA8DC">FRCS</tspan></text><text x="822" y="60" font-size="10.5" font-weight="500" fill="#AFC7CB">mockfrcs.co.uk</text><rect x="0" y="852" width="1000" height="46" fill="#14313A"/><text x="30" y="881" font-size="14" font-weight="800" fill="#FFFFFF">Mock<tspan fill="#6FA8DC">FRCS</tspan></text><text x="970" y="881" text-anchor="end" font-size="12.5" font-weight="600" fill="#AFC7CB">Revision resources &amp; realistic mock exams · mockfrcs.co.uk</text>
</svg>