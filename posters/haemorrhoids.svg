<svg viewBox="0 0 1000 822" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
<rect x="0" y="0" width="1000" height="822" fill="#F4F6F4"/>
<rect x="0" y="0" width="1000" height="108" fill="#14313A"/><rect x="0" y="108" width="250" height="4" fill="#BE3A2E"/><rect x="250" y="108" width="250" height="4" fill="#6D4AA3"/><rect x="500" y="108" width="250" height="4" fill="#15806A"/><rect x="750" y="108" width="250" height="4" fill="#C77B20"/><text x="30" y="46" font-size="29" font-weight="800" fill="#FFFFFF">Proctology 1 — haemorrhoids</text><text x="30" y="74" font-size="14" font-weight="500" fill="#AFC7CB">FRCS Part 1 (General Surgery) · anatomy · Goligher grades · treatment ladder · HubBLe &amp; eTHoS</text><rect x="30" y="128" width="464.0" height="196" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="30" y="128" width="6" height="196" rx="3" fill="#6D4AA3"/><text x="54" y="156" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">ANATOMY</text><text x="54" y="178" font-size="18" font-weight="800" fill="#16252B">Anal cushions</text><text x="54" y="200.0" font-size="11.4" font-weight="400" fill="#2E3C42">Submucosal vascular cushions at 3, 7, 11 o’clock</text><text x="54" y="215.5" font-size="11.4" font-weight="400" fill="#2E3C42">(left lateral, right anterior, right posterior)</text><text x="54" y="231.0" font-size="11.4" font-weight="400" fill="#2E3C42">INTERNAL (above dentate line): insensate, columnar</text><text x="54" y="246.5" font-size="11.4" font-weight="400" fill="#2E3C42">— bleed / prolapse, painless</text><text x="54" y="262.0" font-size="11.4" font-weight="400" fill="#2E3C42">EXTERNAL (below dentate line): sensate, squamous</text><text x="54" y="277.5" font-size="11.4" font-weight="400" fill="#2E3C42">— painful if thrombosed</text><text x="54" y="293.0" font-size="11.4" font-weight="400" fill="#2E3C42">Not varices — they are normal structures that</text><text x="54" y="308.5" font-size="11.4" font-weight="400" fill="#2E3C42">become symptomatic</text><rect x="506.0" y="128" width="464.0" height="196" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="506.0" y="128" width="6" height="196" rx="3" fill="#245C8C"/><text x="530.0" y="156" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">CLASSIFICATION · GOLIGHER (INTERNAL)</text><text x="530.0" y="178" font-size="18" font-weight="800" fill="#16252B">Grades</text><circle cx="540.0" cy="206" r="12" fill="#245C8C"/><text x="540.0" y="210" text-anchor="middle" font-size="12" font-weight="800" fill="#FFFFFF">I</text><text x="562.0" y="210" font-size="11.8" font-weight="400" fill="#2E3C42">bleed, no prolapse</text><circle cx="540.0" cy="230" r="12" fill="#245C8C"/><text x="540.0" y="234" text-anchor="middle" font-size="12" font-weight="800" fill="#FFFFFF">II</text><text x="562.0" y="234" font-size="11.8" font-weight="400" fill="#2E3C42">prolapse on straining, reduce spontaneously</text><circle cx="540.0" cy="254" r="12" fill="#245C8C"/><text x="540.0" y="258" text-anchor="middle" font-size="12" font-weight="800" fill="#FFFFFF">III</text><text x="562.0" y="258" font-size="11.8" font-weight="400" fill="#2E3C42">prolapse, need manual reduction</text><circle cx="540.0" cy="278" r="12" fill="#245C8C"/><text x="540.0" y="282" text-anchor="middle" font-size="12" font-weight="800" fill="#FFFFFF">IV</text><text x="562.0" y="282" font-size="11.8" font-weight="400" fill="#2E3C42">irreducible / permanently prolapsed</text><text x="530.0" y="314" font-size="10.8" font-weight="400" fill="#6B7B80">Bright red painless bleeding · prolapse · mucus · pruritus.</text><rect x="30" y="340" width="940" height="210" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="30" y="340" width="6" height="210" rx="3" fill="#15806A"/><text x="54" y="368" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">TREATMENT — ESCALATE BY GRADE / RESPONSE</text><text x="54" y="390" font-size="18" font-weight="800" fill="#16252B">Management ladder</text><text x="54" y="412" font-size="11.8" font-weight="700" fill="#15806A">Conservative (all grades)</text><text x="264" y="412.0" font-size="11.4" font-weight="400" fill="#2E3C42">fibre, fluids, avoid straining, topical agents — first-line for grade I and initial for all</text><text x="54" y="434.5" font-size="11.8" font-weight="700" fill="#15806A">Outpatient / office</text><text x="264" y="434.5" font-size="11.4" font-weight="400" fill="#2E3C42">rubber band ligation (grade I–III) · injection sclerotherapy (I–II) · infrared coagulation</text><text x="54" y="457.0" font-size="11.8" font-weight="700" fill="#15806A">Surgical (grade III–IV)</text><text x="264" y="457.0" font-size="11.4" font-weight="400" fill="#2E3C42">excisional haemorrhoidectomy (Milligan–Morgan open / Ferguson closed) — most effective, most painful; stapled</text><text x="264" y="471.5" font-size="11.4" font-weight="400" fill="#2E3C42">haemorrhoidopexy (Longo); haemorrhoidal artery ligation (HAL / THD) ± mucopexy</text><text x="54" y="494.0" font-size="11.8" font-weight="700" fill="#15806A">Thrombosed external pile</text><text x="264" y="494.0" font-size="11.4" font-weight="400" fill="#2E3C42">conservative if presenting late; excise if within ~48–72 h of severe pain</text><rect x="30" y="566" width="464.0" height="150" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="30" y="566" width="6" height="150" rx="3" fill="#C77B20"/><text x="54" y="594" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">GRADE II–III · LANCET 2016</text><text x="54" y="616" font-size="18" font-weight="800" fill="#16252B">HubBLe</text><text x="54" y="638.0" font-size="11.3" font-weight="400" fill="#2E3C42">HAL vs rubber band ligation (RBL).</text><text x="54" y="652.5" font-size="11.3" font-weight="400" fill="#2E3C42">1-yr recurrence lower after HAL, BUT RBL is cheaper</text><text x="54" y="667.0" font-size="11.3" font-weight="400" fill="#2E3C42">and easily repeated — so RBL is more cost-effective.</text><text x="54" y="681.5" font-size="11.3" font-weight="700" fill="#2E3C42">→ RBL remains first-line; HAL not justified as the</text><text x="54" y="696.0" font-size="11.3" font-weight="400" fill="#2E3C42">initial procedure.</text><rect x="506.0" y="566" width="464.0" height="150" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="506.0" y="566" width="6" height="150" rx="3" fill="#BE3A2E"/><text x="530.0" y="594" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">GRADE III–IV · LANCET 2016</text><text x="530.0" y="616" font-size="18" font-weight="800" fill="#16252B">eTHoS</text><text x="530.0" y="638.0" font-size="11.3" font-weight="400" fill="#2E3C42">Stapled haemorrhoidopexy vs traditional excisional</text><text x="530.0" y="652.5" font-size="11.3" font-weight="400" fill="#2E3C42">haemorrhoidectomy.</text><text x="530.0" y="667.0" font-size="11.3" font-weight="700" fill="#2E3C42">Traditional excisional surgery gave better quality of</text><text x="530.0" y="681.5" font-size="11.3" font-weight="400" fill="#2E3C42">life, fewer recurrences / symptoms, and was more</text><text x="530.0" y="696.0" font-size="11.3" font-weight="700" fill="#2E3C42">cost-effective. → excisional haemorrhoidectomy is superior.</text><line x1="30" y1="730" x2="970" y2="730" stroke="#D7DEDC" stroke-width="1"/><text x="30" y="749" font-size="10.3" font-weight="400" fill="#7C8A8E">Sources: Goligher grading; HubBLe (Brown et al., Lancet 2016) &amp; eTHoS (Watson et al., Lancet 2016) NIHR trials.</text><text x="30" y="763" font-size="10.3" font-weight="400" fill="#9AA6AA">Revision aid — verify against current guidance before clinical use. Fissure → poster 2 · fistula → poster 3.</text>
<text x="822" y="42" font-size="21" font-weight="800" letter-spacing="0.2" fill="#FFFFFF">Mock<tspan fill="#6FA8DC">FRCS</tspan></text><text x="822" y="60" font-size="10.5" font-weight="500" fill="#AFC7CB">mockfrcs.co.uk</text><rect x="0" y="776" width="1000" height="46" fill="#14313A"/><text x="30" y="805" font-size="14" font-weight="800" fill="#FFFFFF">Mock<tspan fill="#6FA8DC">FRCS</tspan></text><text x="970" y="805" text-anchor="end" font-size="12.5" font-weight="600" fill="#AFC7CB">Revision resources &amp; realistic mock exams · mockfrcs.co.uk</text>
</svg>