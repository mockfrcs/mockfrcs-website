<svg viewBox="0 0 1000 696" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
<rect x="0" y="0" width="1000" height="696" fill="#F4F6F4"/>
<rect x="0" y="0" width="1000" height="108" fill="#14313A"/><rect x="0" y="108" width="250" height="4" fill="#C77B20"/><rect x="250" y="108" width="250" height="4" fill="#15806A"/><rect x="500" y="108" width="250" height="4" fill="#245C8C"/><rect x="750" y="108" width="250" height="4" fill="#BE3A2E"/><text x="30" y="46" font-size="29" font-weight="800" fill="#FFFFFF">Proctology 2 — anal fissure</text><text x="30" y="74" font-size="14" font-weight="500" fill="#AFC7CB">FRCS Part 1 (General Surgery) · pathophysiology · chronic features · atypical red flags · treatment algorithm</text><rect x="30" y="128" width="464.0" height="214" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="30" y="128" width="6" height="214" rx="3" fill="#245C8C"/><text x="54" y="156" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">DEFINITION &amp; MECHANISM</text><text x="54" y="178" font-size="18" font-weight="800" fill="#16252B">What &amp; why</text><text x="54" y="200.0" font-size="11.4" font-weight="400" fill="#2E3C42">Longitudinal tear in the anoderm, distal to the</text><text x="54" y="215.5" font-size="11.4" font-weight="400" fill="#2E3C42">dentate line. POSTERIOR midline in ~90%</text><text x="54" y="231.0" font-size="11.4" font-weight="400" fill="#2E3C42">(anterior ~10%, commoner in women / postpartum).</text><text x="54" y="246.5" font-size="11.4" font-weight="400" fill="#2E3C42">Mechanism: internal anal sphincter HYPERTONIA →</text><text x="54" y="262.0" font-size="11.4" font-weight="400" fill="#2E3C42">high resting pressure → reduced blood flow</text><text x="54" y="277.5" font-size="11.4" font-weight="400" fill="#2E3C42">(posterior midline is a watershed) → ISCHAEMIA →</text><text x="54" y="293.0" font-size="11.4" font-weight="400" fill="#2E3C42">poor healing — a vicious cycle.</text><text x="54" y="308.5" font-size="11.4" font-weight="400" fill="#2E3C42">Symptoms: severe tearing pain on defecation (lasts</text><text x="54" y="324.0" font-size="11.4" font-weight="400" fill="#2E3C42">hours), bright red bleeding, spasm, fear of stooling.</text><rect x="506.0" y="128" width="464.0" height="214" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="506.0" y="128" width="6" height="214" rx="3" fill="#BE3A2E"/><text x="530.0" y="156" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">CHRONICITY &amp; THE TRAP</text><text x="530.0" y="178" font-size="18" font-weight="800" fill="#16252B">Chronic &amp; atypical</text><text x="530.0" y="200" font-size="11.5" font-weight="700" fill="#16252B">Chronic if &gt; 6 weeks. Chronic features:</text><circle cx="536.0" cy="215" r="2.4" fill="#BE3A2E"/><text x="546.0" y="219" font-size="11.3" font-weight="400" fill="#2E3C42">sentinel skin tag (pile)</text><circle cx="536.0" cy="230" r="2.4" fill="#BE3A2E"/><text x="546.0" y="234" font-size="11.3" font-weight="400" fill="#2E3C42">hypertrophied anal papilla</text><circle cx="536.0" cy="245" r="2.4" fill="#BE3A2E"/><text x="546.0" y="249" font-size="11.3" font-weight="400" fill="#2E3C42">visible internal sphincter fibres at the base</text><circle cx="536.0" cy="260" r="2.4" fill="#BE3A2E"/><text x="546.0" y="264" font-size="11.3" font-weight="400" fill="#2E3C42">indurated edges</text><rect x="530.0" y="284" width="416.0" height="46" rx="7" fill="#FBEAE6"/><text x="540.0" y="302" font-size="11.2" font-weight="700" fill="#16252B">ATYPICAL (lateral / multiple / painless / non-healing)</text><text x="540.0" y="320" font-size="11.2" font-weight="400" fill="#2E3C42">→ Crohn’s, TB, HIV, syphilis, anal SCC, leukaemia — biopsy.</text><rect x="30" y="358" width="940" height="232" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="30" y="358" width="6" height="232" rx="3" fill="#15806A"/><text x="54" y="386" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">STEPWISE — ESCALATE IF UNHEALED</text><text x="54" y="408" font-size="18" font-weight="800" fill="#16252B">Treatment algorithm</text><rect x="54" y="415" width="6" height="29.5" rx="3" fill="#15806A"/><text x="70" y="428" font-size="11.9" font-weight="800" fill="#15806A">1  Conservative (first-line)</text><text x="70" y="443.0" font-size="11.2" font-weight="400" fill="#2E3C42">fibre, fluids, stool softeners, warm / sitz baths, analgesia — most ACUTE fissures heal</text><rect x="54" y="450.5" width="6" height="29.5" rx="3" fill="#245C8C"/><text x="70" y="463.5" font-size="11.9" font-weight="800" fill="#245C8C">2  Topical chemical sphincterotomy</text><text x="70" y="478.5" font-size="11.2" font-weight="400" fill="#2E3C42">calcium-channel blocker (diltiazem / nifedipine) — better tolerated, often first-line; or GTN 0.4% (headache limits use); 6–8 weeks</text><rect x="54" y="486.0" width="6" height="29.5" rx="3" fill="#C77B20"/><text x="70" y="499.0" font-size="11.9" font-weight="800" fill="#C77B20">3  Botulinum toxin</text><text x="70" y="514.0" font-size="11.2" font-weight="400" fill="#2E3C42">injected into the internal sphincter — temporary chemical sphincterotomy if topical therapy fails</text><rect x="54" y="521.5" width="6" height="43.0" rx="3" fill="#BE3A2E"/><text x="70" y="534.5" font-size="11.9" font-weight="800" fill="#BE3A2E">4  Surgery — lateral internal sphincterotomy (LIS)</text><text x="70" y="549.5" font-size="11.2" font-weight="400" fill="#2E3C42">gold standard for chronic / refractory; RISK of faecal incontinence (esp. flatus) — caution in women / obstetric history. Alternative: anal advancement</text><text x="70" y="563.0" font-size="11.2" font-weight="400" fill="#2E3C42">flap (if incontinence risk / low-pressure); fissurectomy</text><line x1="30" y1="604" x2="970" y2="604" stroke="#D7DEDC" stroke-width="1"/><text x="30" y="623" font-size="10.3" font-weight="400" fill="#7C8A8E">Sources: ACPGBI / standard coloproctology practice; CCB vs GTN evidence; LIS as surgical gold standard.</text><text x="30" y="637" font-size="10.3" font-weight="400" fill="#9AA6AA">Revision aid — verify against current guidance before clinical use. Haemorrhoids → poster 1 · fistula → poster 3.</text>
<text x="822" y="42" font-size="21" font-weight="800" letter-spacing="0.2" fill="#FFFFFF">Mock<tspan fill="#6FA8DC">FRCS</tspan></text><text x="822" y="60" font-size="10.5" font-weight="500" fill="#AFC7CB">mockfrcs.co.uk</text><rect x="0" y="650" width="1000" height="46" fill="#14313A"/><text x="30" y="679" font-size="14" font-weight="800" fill="#FFFFFF">Mock<tspan fill="#6FA8DC">FRCS</tspan></text><text x="970" y="679" text-anchor="end" font-size="12.5" font-weight="600" fill="#AFC7CB">Revision resources &amp; realistic mock exams · mockfrcs.co.uk</text>
</svg>