<svg viewBox="0 0 1000 1126" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
<rect x="0" y="0" width="1000" height="1126" fill="#F4F6F4"/>
<rect x="0" y="0" width="1000" height="108" fill="#14313A"/><rect x="0" y="108" width="250" height="4" fill="#245C8C"/><rect x="250" y="108" width="250" height="4" fill="#15806A"/><rect x="500" y="108" width="250" height="4" fill="#6D4AA3"/><rect x="750" y="108" width="250" height="4" fill="#BE3A2E"/><text x="30" y="46" font-size="29" font-weight="800" letter-spacing="0.3" fill="#FFFFFF">Colorectal cancer 1 — staging &amp; rectal MRI</text><text x="30" y="74" font-size="14" font-weight="500" fill="#AFC7CB">FRCS Part 1 (General Surgery) · TNM8 · CRM · height &amp; sphincter · EMVI · MERCURY</text><rect x="30" y="128" width="940" height="230" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="30" y="128" width="6" height="230" rx="3" fill="#245C8C"/><text x="54" y="156" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">STAGING</text><text x="54" y="178" font-size="18" font-weight="800" fill="#16252B">TNM 8 · Dukes · stage groups</text><text x="54" y="202" font-size="12.5" font-weight="800" fill="#245C8C">T — depth</text><text x="54" y="220" font-size="11.6" fill="#2E3C42">Tis  intramucosal (in situ)</text><text x="54" y="236" font-size="11.6" fill="#2E3C42">T1  submucosa</text><text x="54" y="252" font-size="11.6" fill="#2E3C42">T2  muscularis propria</text><text x="54" y="268" font-size="11.6" fill="#2E3C42">T3  through MP into mesorectum / pericolic fat</text><text x="54" y="284" font-size="11.6" fill="#2E3C42">T4a  through visceral peritoneum</text><text x="54" y="300" font-size="11.6" fill="#2E3C42">T4b  invades adjacent organ / structure</text><text x="390" y="202" font-size="12.5" font-weight="800" fill="#245C8C">N — nodes</text><text x="390" y="220" font-size="11.6" fill="#2E3C42">N0  none</text><text x="390" y="236" font-size="11.6" fill="#2E3C42">N1  1–3 nodes</text><text x="390" y="252" font-size="11.6" fill="#2E3C42">   N1a 1 · N1b 2–3</text><text x="390" y="268" font-size="11.6" fill="#2E3C42">   N1c  tumour deposit(s), node-neg</text><text x="390" y="284" font-size="11.6" fill="#2E3C42">N2  ≥4 nodes</text><text x="390" y="300" font-size="11.6" fill="#2E3C42">   N2a 4–6 · N2b ≥7</text><text x="680" y="202" font-size="12.5" font-weight="800" fill="#245C8C">M — metastasis</text><text x="680" y="220" font-size="11.6" fill="#2E3C42">M1a  one organ / site</text><text x="680" y="236" font-size="11.6" fill="#2E3C42">M1b  &gt;1 organ / site</text><text x="680" y="252" font-size="11.6" fill="#2E3C42">M1c  peritoneum (± organs)</text><rect x="48" y="318" width="904" height="2" fill="#E0E6E3"/><text x="54" y="334" font-size="11.6" fill="#2E3C42"><tspan font-weight="800" fill="#14313A">Dukes:</tspan> A wall-confined (T1–2N0) · B through wall (T3–4N0) · C node+ · D mets</text><text x="54" y="352" font-size="11.6" fill="#2E3C42"><tspan font-weight="800" fill="#14313A">Stage:</tspan> I = T1–2N0 · II = T3–4N0 · III = any N+ · IV = M1</text><rect x="30" y="372" width="464.0" height="312" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="30" y="372" width="6" height="312" rx="3" fill="#15806A"/><text x="54" y="400" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">ANATOMY (SAGITTAL)</text><text x="54" y="422" font-size="18" font-weight="800" fill="#16252B">Height &amp; sphincter</text><rect x="90" y="442.0" width="46" height="50.666666666666664" fill="#D8CCE6" stroke="#FFFFFF" stroke-width="1"/><text x="148" y="465.3333333333333" font-size="12.5" font-weight="700" fill="#16252B">High</text><text x="148" y="481.3333333333333" font-size="11" fill="#6B7B80">10–15 cm from verge</text><rect x="90" y="492.6666666666667" width="46" height="50.666666666666664" fill="#BFE0DA" stroke="#FFFFFF" stroke-width="1"/><text x="148" y="516.0" font-size="12.5" font-weight="700" fill="#16252B">Mid</text><text x="148" y="532.0" font-size="11" fill="#6B7B80">5–10 cm from verge</text><rect x="90" y="543.3333333333334" width="46" height="50.666666666666664" fill="#CDE8C8" stroke="#FFFFFF" stroke-width="1"/><text x="148" y="566.6666666666667" font-size="12.5" font-weight="700" fill="#16252B">Low</text><text x="148" y="582.6666666666667" font-size="11" fill="#6B7B80">0–5 cm from verge</text><rect x="98" y="594" width="30" height="26" fill="#A9C3DC" opacity="0.0"/><rect x="100" y="594" width="26" height="26" fill="#7FA8C9"/><path d="M88 596 Q 113.0 628 138 596" fill="none" stroke="#15806A" stroke-width="3"/><text x="148" y="604" font-size="11" font-weight="700" fill="#15806A">Anal verge (0)</text><text x="148" y="620" font-size="11" fill="#6B7B80">sphincters / levators</text><text x="80" y="446" text-anchor="end" font-size="10" fill="#6B7B80">15</text><line x1="84" y1="442" x2="90" y2="442" stroke="#6B7B80" stroke-width="1"/><text x="80" y="496.6666666666667" text-anchor="end" font-size="10" fill="#6B7B80">10</text><line x1="84" y1="492.6666666666667" x2="90" y2="492.6666666666667" stroke="#6B7B80" stroke-width="1"/><text x="80" y="547.3333333333334" text-anchor="end" font-size="10" fill="#6B7B80">5</text><line x1="84" y1="543.3333333333334" x2="90" y2="543.3333333333334" stroke="#6B7B80" stroke-width="1"/><text x="80" y="598" text-anchor="end" font-size="10" fill="#6B7B80">0</text><line x1="84" y1="594" x2="90" y2="594" stroke="#6B7B80" stroke-width="1"/><line x1="86" y1="487.6" x2="140" y2="487.6" stroke="#BE3A2E" stroke-width="1.5" stroke-dasharray="4 3"/><text x="54" y="634" font-size="11.3" fill="#2E3C42"><tspan font-weight="700" fill="#BE3A2E">- - -</tspan>  peritoneal reflection: above intraperitoneal,</text><text x="54" y="649" font-size="11.3" fill="#2E3C42">below extraperitoneal. Low tumours: sphincter /</text><text x="54" y="664" font-size="11.3" fill="#2E3C42">levator relation decides <tspan font-weight="700">LAR/ULAR vs APER</tspan>.</text><rect x="506.0" y="372" width="464.0" height="312" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="506.0" y="372" width="6" height="312" rx="3" fill="#6D4AA3"/><text x="530.0" y="400" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">WALL &amp; MARGIN (AXIAL)</text><text x="530.0" y="422" font-size="18" font-weight="800" fill="#16252B">Layers, T-stage &amp; CRM</text><rect x="536.0" y="444" width="200" height="16" fill="#F4F4F2" stroke="#FFFFFF" stroke-width="0.8"/><text x="744.0" y="456.0" font-size="10.5" fill="#6B7B80">lumen</text><rect x="536.0" y="460" width="200" height="12" fill="#EAD9EE" stroke="#FFFFFF" stroke-width="0.8"/><text x="744.0" y="470.0" font-size="10.5" fill="#6B7B80">mucosa</text><rect x="536.0" y="472" width="200" height="12" fill="#DFC8E6" stroke="#FFFFFF" stroke-width="0.8"/><text x="744.0" y="482.0" font-size="10.5" fill="#6B7B80">submucosa</text><rect x="536.0" y="484" width="200" height="16" fill="#9C7EBE" stroke="#FFFFFF" stroke-width="0.8"/><text x="744.0" y="496.0" font-size="10.5" fill="#6B7B80">muscularis propria</text><rect x="536.0" y="500" width="200" height="34" fill="#F1E7C9" stroke="#FFFFFF" stroke-width="0.8"/><text x="744.0" y="521.0" font-size="10.5" fill="#6B7B80">mesorectum (fat)</text><rect x="536.0" y="534" width="200" height="3" fill="#BE3A2E"/><text x="744.0" y="539" font-size="10.5" font-weight="700" fill="#BE3A2E">MRF = CRM</text><line x1="558.0" y1="448" x2="558.0" y2="482" stroke="#6D4AA3" stroke-width="2.5"/><path d="M558.0 487 l-4 -6 l8 0 z" fill="#6D4AA3"/><text x="558.0" y="440" text-anchor="middle" font-size="10.5" font-weight="700" fill="#6D4AA3">T1</text><line x1="598.0" y1="448" x2="598.0" y2="496" stroke="#6D4AA3" stroke-width="2.5"/><path d="M598.0 501 l-4 -6 l8 0 z" fill="#6D4AA3"/><text x="598.0" y="440" text-anchor="middle" font-size="10.5" font-weight="700" fill="#6D4AA3">T2</text><line x1="638.0" y1="448" x2="638.0" y2="522" stroke="#6D4AA3" stroke-width="2.5"/><path d="M638.0 527 l-4 -6 l8 0 z" fill="#6D4AA3"/><text x="638.0" y="440" text-anchor="middle" font-size="10.5" font-weight="700" fill="#6D4AA3">T3</text><line x1="686.0" y1="448" x2="686.0" y2="542" stroke="#BE3A2E" stroke-width="2.5"/><path d="M686.0 547 l-4 -6 l8 0 z" fill="#BE3A2E"/><text x="686.0" y="440" text-anchor="middle" font-size="10.5" font-weight="700" fill="#BE3A2E">T4</text><rect x="528.0" y="550" width="420.0" height="46" rx="7" fill="#FBEAE6"/><text x="540.0" y="569" font-size="11.6" font-weight="700" fill="#16252B">CRM positive = tumour / node / deposit ≤1 mm from MRF</text><text x="540.0" y="587" font-size="11.3" fill="#2E3C42">(spiculation alone doesn’t count; report distance for ≥T3)</text><text x="530.0" y="614" font-size="11.3" fill="#2E3C42"><tspan font-weight="700" fill="#6D4AA3">T3 by extramural depth (EMD):</tspan> a &lt;1 · b 1–5 · c 5–15 · d &gt;15 mm</text><rect x="30" y="698" width="464.0" height="140" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="30" y="698" width="6" height="140" rx="3" fill="#C77B20"/><text x="54" y="726" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">PROGNOSTIC MRI FEATURES</text><text x="54" y="748" font-size="18" font-weight="800" fill="#16252B">EMVI &amp; tumour deposits</text><text x="54" y="770" font-size="11.6" fill="#2E3C42">EMVI = tumour in mesorectal veins (vessel expansion,</text><text x="54" y="785" font-size="11.6" fill="#2E3C42">irregular contour, tumour signal replacing flow void).</text><text x="54" y="800" font-size="11.6" fill="#2E3C42">Independent predictor of recurrence &amp; distant mets;</text><text x="54" y="815" font-size="11.6" fill="#2E3C42">if within 1 mm of MRF → threatens the CRM.</text><text x="54" y="830" font-size="11.6" fill="#2E3C42">Tumour deposits (no nodal architecture) = N1c.</text><rect x="506.0" y="698" width="464.0" height="140" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="506.0" y="698" width="6" height="140" rx="3" fill="#245C8C"/><text x="530.0" y="726" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">RESPONSE AFTER NEOADJUVANT</text><text x="530.0" y="748" font-size="18" font-weight="800" fill="#16252B">mrTRG (MERCURY)</text><text x="530.0" y="770" font-size="11.6" font-weight="400" fill="#2E3C42">MRI tumour regression grade after chemo/RT:</text><text x="530.0" y="785" font-size="11.6" font-weight="700" fill="#2E3C42">mrTRG 1  complete radiological response</text><text x="530.0" y="800" font-size="11.6" font-weight="400" fill="#2E3C42">mrTRG 2–4  intermediate (fibrosis vs residual tumour)</text><text x="530.0" y="815" font-size="11.6" font-weight="700" fill="#2E3C42">mrTRG 5  no response</text><text x="530.0" y="830" font-size="11.6" font-weight="400" fill="#2E3C42">Predicts outcome; informs watch-and-wait selection.</text><rect x="30" y="852" width="464.0" height="168" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="30" y="852" width="6" height="168" rx="3" fill="#6D4AA3"/><text x="54" y="880" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">LANDMARK EVIDENCE</text><text x="54" y="902" font-size="18" font-weight="800" fill="#16252B">MERCURY</text><text x="54" y="924" font-size="11.6" fill="#2E3C42">Prospective multicentre study: MRI reliably predicts</text><text x="54" y="939" font-size="11.6" fill="#2E3C42">CRM involvement and extramural depth versus</text><text x="54" y="954" font-size="11.6" fill="#2E3C42">histopathology — within ~0.5 mm.</text><text x="54" y="969" font-size="11.6" fill="#2E3C42">Established MRI as the standard rectal staging tool</text><text x="54" y="984" font-size="11.6" fill="#2E3C42">and the basis for MRI-led risk stratification.</text><rect x="506.0" y="852" width="464.0" height="168" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="506.0" y="852" width="6" height="168" rx="3" fill="#BE3A2E"/><text x="530.0" y="880" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">DRIVES THE MDT (→ poster 2)</text><text x="530.0" y="902" font-size="18" font-weight="800" fill="#16252B">‘Poor-risk’ MRI features</text><circle cx="536.0" cy="917" r="2.6" fill="#BE3A2E"/><text x="546.0" y="921" font-size="11.6" fill="#2E3C42">CRM threatened / involved (≤1 mm)</text><circle cx="536.0" cy="932" r="2.6" fill="#BE3A2E"/><text x="546.0" y="936" font-size="11.6" fill="#2E3C42">cT3c–d or T4</text><circle cx="536.0" cy="947" r="2.6" fill="#BE3A2E"/><text x="546.0" y="951" font-size="11.6" fill="#2E3C42">EMVI positive  ·  N2 nodes</text><circle cx="536.0" cy="962" r="2.6" fill="#BE3A2E"/><text x="546.0" y="966" font-size="11.6" fill="#2E3C42">Low tumour with sphincter / levator involvement</text><circle cx="536.0" cy="977" r="2.6" fill="#BE3A2E"/><text x="546.0" y="981" font-size="11.6" fill="#2E3C42">Lateral pelvic (extramesorectal) nodes</text><text x="530.0" y="1008" font-size="11" fill="#6B7B80">Plus CEA at baseline &amp; for surveillance.</text><line x1="30" y1="1034" x2="970" y2="1034" stroke="#D7DEDC" stroke-width="1"/><text x="30" y="1053" font-size="10.5" fill="#7C8A8E">TNM 8th edition (AJCC/UICC 2017). Rectal MRI conventions &amp; CRM ≤1 mm: MERCURY (Brown et al.). EMD T3 substaging &amp; mrTRG per MERCURY reporting.</text><text x="30" y="1067" font-size="10.5" fill="#9AA6AA">Revision aid — verify against current guidance before clinical use. Treatment by stage &amp; trials → poster 2.</text>
<text x="822" y="42" font-size="21" font-weight="800" letter-spacing="0.2" fill="#FFFFFF">Mock<tspan fill="#6FA8DC">FRCS</tspan></text><text x="822" y="60" font-size="10.5" font-weight="500" fill="#AFC7CB">mockfrcs.co.uk</text><rect x="0" y="1080" width="1000" height="46" fill="#14313A"/><text x="30" y="1109" font-size="14" font-weight="800" fill="#FFFFFF">Mock<tspan fill="#6FA8DC">FRCS</tspan></text><text x="970" y="1109" text-anchor="end" font-size="12.5" font-weight="600" fill="#AFC7CB">Revision resources &amp; realistic mock exams · mockfrcs.co.uk</text>
</svg>