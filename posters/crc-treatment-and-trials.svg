<svg viewBox="0 0 1000 1408" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
<rect x="0" y="0" width="1000" height="1408" fill="#F4F6F4"/>
<rect x="0" y="0" width="1000" height="108" fill="#14313A"/><rect x="0" y="108" width="250" height="4" fill="#C77B20"/><rect x="250" y="108" width="250" height="4" fill="#245C8C"/><rect x="500" y="108" width="250" height="4" fill="#15806A"/><rect x="750" y="108" width="250" height="4" fill="#6D4AA3"/><text x="30" y="46" font-size="29" font-weight="800" letter-spacing="0.3" fill="#FFFFFF">Colorectal cancer 2 — treatment &amp; trials</text><text x="30" y="74" font-size="14" font-weight="500" fill="#AFC7CB">FRCS Part 1 · MDT pathway by site &amp; stage · neoadjuvant RT · TNT · the landmark trials</text><rect x="30" y="128" width="940" height="276" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="30" y="128" width="6" height="276" rx="3" fill="#14313A"/><text x="54" y="156" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">MDT PATHWAY</text><text x="54" y="178" font-size="18" font-weight="800" fill="#16252B">Treatment by site &amp; stage</text><rect x="54.0" y="194" width="289.3333333333333" height="26" rx="6" fill="#C77B20"/><text x="66.0" y="212" font-size="12.5" font-weight="800" letter-spacing="0.6" fill="#FFFFFF">COLON</text><text x="64.0" y="236" font-size="11.4" fill="#2E3C42">Surgery first: resection +</text><text x="64.0" y="251.5" font-size="11.4" fill="#2E3C42">CME / high vascular tie, ≥12 nodes</text><text x="64.0" y="267.0" font-size="11.4" fill="#2E3C42">Adjuvant chemo if stage III or</text><text x="64.0" y="282.5" font-size="11.4" fill="#2E3C42">high-risk stage II</text><text x="64.0" y="298.0" font-size="11.4" fill="#2E3C42">Locally advanced (cT4 / bulky):</text><text x="64.0" y="313.5" font-size="11.4" fill="#2E3C42">neoadjuvant FOLFOX (FOxTROT)</text><text x="64.0" y="329.0" font-size="11.4" fill="#2E3C42">Obstruction → stent as bridge</text><text x="64.0" y="344.5" font-size="11.4" fill="#2E3C42">to surgery (ESCO / CREST)</text><rect x="355.3333333333333" y="194" width="289.3333333333333" height="26" rx="6" fill="#245C8C"/><text x="367.3333333333333" y="212" font-size="12.5" font-weight="800" letter-spacing="0.6" fill="#FFFFFF">RECTAL  (MRI-stratified)</text><text x="365.3333333333333" y="236" font-size="11.4" fill="#2E3C42">Early T1–2 N0, CRM clear:</text><text x="365.3333333333333" y="251.5" font-size="11.4" fill="#2E3C42">TME alone (T1 → local excision/TEM)</text><text x="365.3333333333333" y="267.0" font-size="11.4" fill="#2E3C42">Intermediate: ± neoadjuvant;</text><text x="365.3333333333333" y="282.5" font-size="11.4" fill="#2E3C42">RT may be omitted (PROSPECT)</text><text x="365.3333333333333" y="298.0" font-size="11.4" fill="#2E3C42">Advanced / CRM threatened / EMVI+</text><text x="365.3333333333333" y="313.5" font-size="11.4" fill="#2E3C42">/ N2: neoadjuvant SCRT, LCCRT or</text><text x="365.3333333333333" y="329.0" font-size="11.4" fill="#2E3C42">TNT → TME</text><text x="365.3333333333333" y="344.5" font-size="11.4" fill="#2E3C42">cCR → watch-and-wait (OPRA)</text><rect x="656.6666666666666" y="194" width="289.3333333333333" height="26" rx="6" fill="#6D4AA3"/><text x="668.6666666666666" y="212" font-size="12.5" font-weight="800" letter-spacing="0.6" fill="#FFFFFF">METASTATIC</text><text x="666.6666666666666" y="236" font-size="11.4" fill="#2E3C42">Systemic chemo ± biologics</text><text x="666.6666666666666" y="251.5" font-size="11.4" fill="#2E3C42">(agents → poster 3)</text><text x="666.6666666666666" y="267.0" font-size="11.4" fill="#2E3C42">Resectable liver / lung mets →</text><text x="666.6666666666666" y="282.5" font-size="11.4" fill="#2E3C42">metastasectomy ± periop chemo</text><text x="666.6666666666666" y="298.0" font-size="11.4" fill="#2E3C42">Conversion chemo to downsize</text><text x="666.6666666666666" y="313.5" font-size="11.4" fill="#2E3C42">to resectable</text><text x="666.6666666666666" y="329.0" font-size="11.4" fill="#2E3C42">MDT-led, individualised</text><rect x="30" y="418" width="940" height="150" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="30" y="418" width="6" height="150" rx="3" fill="#15806A"/><text x="54" y="446" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">NEOADJUVANT RADIOTHERAPY FOR RECTAL CANCER</text><text x="54" y="468" font-size="18" font-weight="800" fill="#16252B">Short course vs long course · TNT</text><text x="54" y="492" font-size="12.5" font-weight="800" fill="#15806A">Short course (SCRT)</text><text x="54" y="510" font-size="11.6" fill="#2E3C42">25 Gy in 5# (5×5 Gy)</text><text x="54" y="526" font-size="11.6" fill="#2E3C42">surgery early (or delayed, Stockholm III)</text><text x="500.0" y="492" font-size="12.5" font-weight="800" fill="#15806A">Long course (LCCRT)</text><text x="500.0" y="510" font-size="11.6" fill="#2E3C42">~45–50.4 Gy / 25–28# + capecitabine</text><text x="500.0" y="526" font-size="11.6" fill="#2E3C42">surgery ≥6–8 wks later (allows downstaging)</text><text x="54" y="536" font-size="11.4" fill="#6B7B80">Equivalent survival / toxicity; LCCRT favoured when downstaging is needed.</text><text x="54" y="552" font-size="11.4" fill="#6B7B80"><tspan font-weight="700" fill="#15806A">TNT</tspan> = all chemo + RT before surgery → better compliance, treats micromets, ↑ pCR / organ preservation.</text><text x="30" y="586" font-size="13" font-weight="800" letter-spacing="1.2" fill="#14313A">THE LANDMARK TRIALS</text><rect x="30" y="598" width="464.0" height="164.5" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="30" y="598" width="6" height="164.5" rx="3" fill="#C77B20"/><text x="54" y="625" font-size="10.5" font-weight="700" letter-spacing="1.2" fill="#6B7B80">NEOADJUVANT CHEMO · COLON</text><text x="54" y="648" font-size="17" font-weight="800" fill="#16252B">FOxTROT</text><text x="54" y="668" font-size="11.5" font-weight="700" fill="#C77B20">Who</text><text x="112" y="668.0" font-size="11.5" fill="#2E3C42">CT-staged T3–4 N0–2 M0 colon (1053 pts)</text><text x="54" y="686.5" font-size="11.5" font-weight="700" fill="#C77B20">Design</text><text x="112" y="686.5" font-size="11.5" fill="#2E3C42">6 wks neoadjuvant FOLFOX + adjuvant vs surgery-first</text><text x="54" y="705.0" font-size="11.5" font-weight="700" fill="#C77B20">Result</text><text x="112" y="705.0" font-size="11.5" fill="#2E3C42">↓ incomplete (R1/R2) resections 4.8 vs 9.1%, T/N</text><text x="112" y="719.5" font-size="11.5" fill="#2E3C42">downstaging, fewer leaks, trend ↓ 2-yr recurrence; dMMR</text><text x="112" y="734.0" font-size="11.5" fill="#2E3C42">responds poorly</text><rect x="506.0" y="598" width="464.0" height="164.5" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="506.0" y="598" width="6" height="164.5" rx="3" fill="#BE3A2E"/><text x="530.0" y="625" font-size="10.5" font-weight="700" letter-spacing="1.2" fill="#6B7B80">MALIGNANT OBSTRUCTION</text><text x="530.0" y="648" font-size="17" font-weight="800" fill="#16252B">ESCO &amp; CREST</text><text x="530.0" y="668" font-size="11.5" font-weight="700" fill="#BE3A2E">ESCO</text><text x="588.0" y="668.0" font-size="11.5" fill="#2E3C42">European RCT, left-sided malignant obstruction: stent as</text><text x="588.0" y="682.5" font-size="11.5" fill="#2E3C42">bridge vs emergency surgery</text><text x="530.0" y="701.0" font-size="11.5" font-weight="700" fill="#BE3A2E">CREST</text><text x="588.0" y="701.0" font-size="11.5" fill="#2E3C42">UK RCT, same question</text><text x="530.0" y="719.5" font-size="11.5" font-weight="700" fill="#BE3A2E">Result</text><text x="588.0" y="719.5" font-size="11.5" fill="#2E3C42">both: ↓ stoma rate &amp; morbidity, equivalent long-term</text><text x="588.0" y="734.0" font-size="11.5" fill="#2E3C42">survival → stenting a valid bridge to surgery</text><rect x="30" y="774.5" width="464.0" height="164.5" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="30" y="774.5" width="6" height="164.5" rx="3" fill="#245C8C"/><text x="54" y="801.5" font-size="10.5" font-weight="700" letter-spacing="1.2" fill="#6B7B80">TOTAL NEOADJUVANT THERAPY</text><text x="54" y="824.5" font-size="17" font-weight="800" fill="#16252B">RAPIDO</text><text x="54" y="844.5" font-size="11.5" font-weight="700" fill="#245C8C">Who</text><text x="112" y="844.5" font-size="11.5" fill="#2E3C42">high-risk locally advanced rectal cancer</text><text x="54" y="863.0" font-size="11.5" font-weight="700" fill="#245C8C">Design</text><text x="112" y="863.0" font-size="11.5" fill="#2E3C42">SCRT (5×5) → CAPOX/FOLFOX ×6 → TME, vs standard LCCRT →</text><text x="112" y="877.5" font-size="11.5" fill="#2E3C42">surgery</text><text x="54" y="896.0" font-size="11.5" font-weight="700" fill="#245C8C">Result</text><text x="112" y="896.0" font-size="11.5" fill="#2E3C42">↓ distant mets &amp; disease-related failure, ↑ pCR; BUT</text><text x="112" y="910.5" font-size="11.5" fill="#2E3C42">5-yr ↑ local recurrence (11.7 vs 8.1%), no OS gain</text><rect x="506.0" y="774.5" width="464.0" height="150.0" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="506.0" y="774.5" width="6" height="150.0" rx="3" fill="#245C8C"/><text x="530.0" y="801.5" font-size="10.5" font-weight="700" letter-spacing="1.2" fill="#6B7B80">TOTAL NEOADJUVANT THERAPY</text><text x="530.0" y="824.5" font-size="17" font-weight="800" fill="#16252B">PRODIGE 23</text><text x="530.0" y="844.5" font-size="11.5" font-weight="700" fill="#245C8C">Who</text><text x="588.0" y="844.5" font-size="11.5" fill="#2E3C42">T3 / T4 locally advanced rectal cancer</text><text x="530.0" y="863.0" font-size="11.5" font-weight="700" fill="#245C8C">Design</text><text x="588.0" y="863.0" font-size="11.5" fill="#2E3C42">induction mFOLFIRINOX ×6 → LCCRT → surgery → 3 mo adjuvant,</text><text x="588.0" y="877.5" font-size="11.5" fill="#2E3C42">vs standard CRT → surgery → 6 mo</text><text x="530.0" y="896.0" font-size="11.5" font-weight="700" fill="#245C8C">Result</text><text x="588.0" y="896.0" font-size="11.5" fill="#2E3C42">↑ DFS, MFS, pCR and OS; no ↑ local relapse</text><rect x="30" y="951.0" width="464.0" height="179.0" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="30" y="951.0" width="6" height="179.0" rx="3" fill="#15806A"/><text x="54" y="978.0" font-size="10.5" font-weight="700" letter-spacing="1.2" fill="#6B7B80">RADIOTHERAPY OMISSION</text><text x="54" y="1001.0" font-size="17" font-weight="800" fill="#16252B">PROSPECT</text><text x="54" y="1021.0" font-size="11.5" font-weight="700" fill="#15806A">Who</text><text x="112" y="1021.0" font-size="11.5" fill="#2E3C42">intermediate-risk LARC, CRM not threatened,</text><text x="112" y="1035.5" font-size="11.5" fill="#2E3C42">sphincter-sparing candidates</text><text x="54" y="1054.0" font-size="11.5" font-weight="700" fill="#15806A">Design</text><text x="112" y="1054.0" font-size="11.5" fill="#2E3C42">FOLFOX ×6 first; CRT only if poor response (&lt;20%</text><text x="112" y="1068.5" font-size="11.5" fill="#2E3C42">shrinkage) — most omit RT</text><text x="54" y="1087.0" font-size="11.5" font-weight="700" fill="#15806A">Result</text><text x="112" y="1087.0" font-size="11.5" fill="#2E3C42">non-inferior DFS vs standard CRT → RT can be safely omitted</text><text x="112" y="1101.5" font-size="11.5" fill="#2E3C42">in selected pts</text><rect x="506.0" y="951.0" width="464.0" height="164.5" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="506.0" y="951.0" width="6" height="164.5" rx="3" fill="#15806A"/><text x="530.0" y="978.0" font-size="10.5" font-weight="700" letter-spacing="1.2" fill="#6B7B80">ORGAN PRESERVATION</text><text x="530.0" y="1001.0" font-size="17" font-weight="800" fill="#16252B">OPRA</text><text x="530.0" y="1021.0" font-size="11.5" font-weight="700" fill="#15806A">Who</text><text x="588.0" y="1021.0" font-size="11.5" fill="#2E3C42">stage II / III rectal cancer</text><text x="530.0" y="1039.5" font-size="11.5" font-weight="700" fill="#15806A">Design</text><text x="588.0" y="1039.5" font-size="11.5" fill="#2E3C42">TNT: induction-CRT vs CRT-consolidation; cCR →</text><text x="588.0" y="1054.0" font-size="11.5" fill="#2E3C42">watch-and-wait, incomplete → TME</text><text x="530.0" y="1072.5" font-size="11.5" font-weight="700" fill="#15806A">Result</text><text x="588.0" y="1072.5" font-size="11.5" fill="#2E3C42">~50% organ preservation; consolidation > induction (53% 3-yr</text><text x="588.0" y="1087.0" font-size="11.5" fill="#2E3C42">TME-free); DFS not compromised</text><rect x="30" y="1142.0" width="940" height="160" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="30" y="1142.0" width="6" height="160" rx="3" fill="#6D4AA3"/><text x="54" y="1170.0" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">ADJUVANT CHEMOTHERAPY</text><text x="54" y="1192.0" font-size="18" font-weight="800" fill="#16252B">MOSAIC · IDEA / SCOT · QUASAR</text><text x="54.0" y="1216.0" font-size="12.5" font-weight="800" fill="#6D4AA3">MOSAIC</text><text x="54.0" y="1234.0" font-size="10.8" fill="#2E3C42">Adding oxaliplatin to 5-FU/LV</text><text x="54.0" y="1248.0" font-size="10.8" fill="#2E3C42">(FOLFOX) improves DFS &amp; OS in</text><text x="54.0" y="1262.0" font-size="10.8" fill="#2E3C42">stage III → FOLFOX = standard</text><text x="54.0" y="1276.0" font-size="10.8" fill="#2E3C42">adjuvant for stage III.</text><text x="355.3333333333333" y="1216.0" font-size="12.5" font-weight="800" fill="#6D4AA3">IDEA / SCOT</text><text x="355.3333333333333" y="1234.0" font-size="10.8" fill="#2E3C42">3 vs 6 mo oxaliplatin doublet; 3 mo</text><text x="355.3333333333333" y="1248.0" font-size="10.8" fill="#2E3C42">non-inferior overall, less neuropathy.</text><text x="355.3333333333333" y="1262.0" font-size="10.8" fill="#2E3C42">3 mo CAPOX ≈ 6 mo; 3 mo FOLFOX worse.</text><text x="355.3333333333333" y="1276.0" font-size="10.8" fill="#2E3C42">Low-risk III (T1–3N1) → 3 mo;</text><text x="355.3333333333333" y="1290.0" font-size="10.8" fill="#2E3C42">high-risk (T4/N2) → 6 mo. SCOT: rectal.</text><text x="656.6666666666666" y="1216.0" font-size="12.5" font-weight="800" fill="#6D4AA3">QUASAR</text><text x="656.6666666666666" y="1234.0" font-size="10.8" fill="#2E3C42">Adjuvant 5-FU/LV gives a small</text><text x="656.6666666666666" y="1248.0" font-size="10.8" fill="#2E3C42">absolute survival benefit (~3–4%)</text><text x="656.6666666666666" y="1262.0" font-size="10.8" fill="#2E3C42">in stage II → used for high-risk</text><text x="656.6666666666666" y="1276.0" font-size="10.8" fill="#2E3C42">stage II disease.</text><line x1="30" y1="1316.0" x2="970" y2="1316.0" stroke="#D7DEDC" stroke-width="1"/><text x="30" y="1335.0" font-size="10.3" fill="#7C8A8E">Trials: FOxTROT (Lancet Oncol 2022) · ESCO (Arezzo 2017) · CREST (BJS 2022) · RAPIDO &amp; PRODIGE 23 · PROSPECT (NEJM 2023) · OPRA (JCO 2022) · MOSAIC · IDEA/SCOT · QUASAR.</text><text x="30" y="1349.0" font-size="10.3" fill="#9AA6AA">Revision aid — verify against current guidance before clinical use. Molecular markers, targeted agents, surgery &amp; margins → poster 3.</text>
<text x="822" y="42" font-size="21" font-weight="800" letter-spacing="0.2" fill="#FFFFFF">Mock<tspan fill="#6FA8DC">FRCS</tspan></text><text x="822" y="60" font-size="10.5" font-weight="500" fill="#AFC7CB">mockfrcs.co.uk</text><rect x="0" y="1362" width="1000" height="46" fill="#14313A"/><text x="30" y="1391" font-size="14" font-weight="800" fill="#FFFFFF">Mock<tspan fill="#6FA8DC">FRCS</tspan></text><text x="970" y="1391" text-anchor="end" font-size="12.5" font-weight="600" fill="#AFC7CB">Revision resources &amp; realistic mock exams · mockfrcs.co.uk</text>
</svg>