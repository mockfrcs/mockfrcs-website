<svg viewBox="0 0 1000 1244" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
<rect x="0" y="0" width="1000" height="1244" fill="#F4F6F4"/>
<rect x="0" y="0" width="1000" height="108" fill="#14313A"/><rect x="0" y="108" width="250" height="4" fill="#6D4AA3"/><rect x="250" y="108" width="250" height="4" fill="#15806A"/><rect x="500" y="108" width="250" height="4" fill="#C77B20"/><rect x="750" y="108" width="250" height="4" fill="#BE3A2E"/><text x="30" y="46" font-size="29" font-weight="800" fill="#FFFFFF">Presacral (retrorectal) tumours</text><text x="30" y="74" font-size="14" font-weight="500" fill="#AFC7CB">FRCS Part 1 (General Surgery) · anatomy · classification · the biopsy rule · surgical approach by S3</text><rect x="30" y="128" width="464.0" height="214" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="30" y="128" width="6" height="214" rx="3" fill="#6D4AA3"/><text x="54" y="156" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">THE RETRORECTAL SPACE</text><text x="54" y="178" font-size="18" font-weight="800" fill="#16252B">Boundaries</text><text x="54" y="202" font-size="11.6" font-weight="700" fill="#6D4AA3">Anterior</text><text x="132" y="202" font-size="11.6" font-weight="400" fill="#2E3C42">rectum (mesorectal fascia)</text><text x="54" y="219" font-size="11.6" font-weight="700" fill="#6D4AA3">Posterior</text><text x="132" y="219" font-size="11.6" font-weight="400" fill="#2E3C42">presacral fascia, sacrum &amp; coccyx</text><text x="54" y="236" font-size="11.6" font-weight="700" fill="#6D4AA3">Superior</text><text x="132" y="236" font-size="11.6" font-weight="400" fill="#2E3C42">peritoneal reflection</text><text x="54" y="253" font-size="11.6" font-weight="700" fill="#6D4AA3">Inferior</text><text x="132" y="253" font-size="11.6" font-weight="400" fill="#2E3C42">retrosacral fascia, levators</text><text x="54" y="270" font-size="11.6" font-weight="700" fill="#6D4AA3">Lateral</text><text x="132" y="270" font-size="11.6" font-weight="400" fill="#2E3C42">ureters, iliac vessels</text><text x="54" y="320" font-size="10.8" font-weight="400" fill="#6B7B80">Contains embryonic remnants (all germ layers)</text><text x="54" y="333" font-size="10.8" font-weight="400" fill="#6B7B80">+ presacral venous plexus — major bleeding risk.</text><path d="M458.0 198 C 434.0 232 434.0 262 458.0 296" fill="none" stroke="#6D4AA3" stroke-width="5"/><ellipse cx="412.0" cy="247.0" rx="15" ry="42" fill="none" stroke="#2E3C42" stroke-width="2"/><path d="M426.0 204 L454.0 208 L454.0 286 L426.0 290 Z" fill="#EFEAF6" opacity="0.8"/><line x1="390.0" y1="247.0" x2="468.0" y2="247.0" stroke="#BE3A2E" stroke-width="1.4" stroke-dasharray="4 3"/><text x="472.0" y="251.0" font-size="10" font-weight="700" fill="#BE3A2E">S3</text><text x="390.0" y="192" font-size="9" font-weight="400" fill="#6B7B80">rectum</text><text x="442.0" y="310" font-size="9" font-weight="400" fill="#6B7B80">sacrum</text><rect x="506.0" y="128" width="464.0" height="214" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="506.0" y="128" width="6" height="214" rx="3" fill="#15806A"/><text x="530.0" y="156" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">EPIDEMIOLOGY &amp; PRESENTATION</text><text x="530.0" y="178" font-size="18" font-weight="800" fill="#16252B">Who &amp; how</text><text x="530.0" y="200.0" font-size="11.4" font-weight="400" fill="#2E3C42">Rare; median age ~45 y; roughly two-thirds benign</text><text x="530.0" y="215.5" font-size="11.4" font-weight="400" fill="#2E3C42">Congenital cysts commonest overall; chordoma =</text><text x="530.0" y="231.0" font-size="11.4" font-weight="400" fill="#2E3C42">commonest malignant. Benign cysts F&gt;M; chordoma M&gt;F</text><text x="530.0" y="246.5" font-size="11.4" font-weight="400" fill="#2E3C42">Most present as an ASYMPTOMATIC mass found on</text><text x="530.0" y="262.0" font-size="11.4" font-weight="400" fill="#2E3C42">digital rectal exam (palpable postrectal mass — key)</text><text x="530.0" y="277.5" font-size="11.4" font-weight="400" fill="#2E3C42">Symptoms: low back / perineal pain, altered bowel</text><text x="530.0" y="293.0" font-size="11.4" font-weight="400" fill="#2E3C42">habit, neurological or urinary compression</text><text x="530.0" y="308.5" font-size="11.4" font-weight="400" fill="#2E3C42">Recurrent perianal abscess / fistula — an infected</text><text x="530.0" y="324.0" font-size="11.4" font-weight="400" fill="#2E3C42">tailgut cyst is often misdiagnosed as fistula-in-ano</text><rect x="30" y="358" width="940" height="214" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="30" y="358" width="6" height="214" rx="3" fill="#245C8C"/><text x="54" y="386" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">CLASSIFICATION · UHLIG–JOHNSON (MODIFIED DOZOIS)</text><text x="54" y="408" font-size="18" font-weight="800" fill="#16252B">Five categories — also think benign/malignant &amp; cystic/solid</text><rect x="54" y="420" width="6" height="36" rx="3" fill="#15806A"/><text x="68" y="432" font-size="11.8" font-weight="800" fill="#15806A">Congenital  (~2/3, commonest)</text><text x="264" y="432" font-size="11.4" font-weight="400" fill="#2E3C42">developmental cysts (epidermoid, dermoid, tailgut / retrorectal cystic hamartoma, duplication), anterior sacral</text><text x="264" y="447" font-size="11.4" font-weight="400" fill="#2E3C42">meningocele, teratoma, chordoma, adrenal rest</text><rect x="54" y="458" width="6" height="21" rx="3" fill="#6D4AA3"/><text x="68" y="470" font-size="11.8" font-weight="800" fill="#6D4AA3">Neurogenic</text><text x="264" y="470" font-size="11.4" font-weight="400" fill="#2E3C42">schwannoma, neurofibroma, ganglioneuroma, neuroblastoma, ependymoma, MPNST</text><rect x="54" y="481" width="6" height="21" rx="3" fill="#C77B20"/><text x="68" y="493" font-size="11.8" font-weight="800" fill="#C77B20">Osseous</text><text x="264" y="493" font-size="11.4" font-weight="400" fill="#2E3C42">osteoma, osteosarcoma, Ewing sarcoma, giant cell tumour, aneurysmal bone cyst</text><rect x="54" y="504" width="6" height="21" rx="3" fill="#BE3A2E"/><text x="68" y="516" font-size="11.8" font-weight="800" fill="#BE3A2E">Inflammatory</text><text x="264" y="516" font-size="11.4" font-weight="400" fill="#2E3C42">abscess, granuloma, fistula, foreign-body reaction</text><rect x="54" y="527" width="6" height="21" rx="3" fill="#245C8C"/><text x="68" y="539" font-size="11.8" font-weight="800" fill="#245C8C">Miscellaneous</text><text x="264" y="539" font-size="11.4" font-weight="400" fill="#2E3C42">lipoma, sarcoma, GIST, lymphoma, desmoid, metastasis</text><text x="54" y="559" font-size="11" font-weight="400" fill="#6B7B80">Solid masses are more likely to be malignant.</text><rect x="30" y="588" width="464.0" height="176" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="30" y="588" width="6" height="176" rx="3" fill="#BE3A2E"/><text x="54" y="616" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">THE EXAM TRAP</text><text x="54" y="638" font-size="18" font-weight="800" fill="#16252B">The biopsy rule</text><text x="54" y="658.0" font-size="11.2" font-weight="700" fill="#2E3C42">AVOID transrectal / transvaginal / transperitoneal</text><text x="54" y="671.5" font-size="11.2" font-weight="400" fill="#2E3C42">biopsy of a presacral mass.</text><text x="54" y="685.0" font-size="11.2" font-weight="400" fill="#2E3C42">Risks: tumour seeding (esp. chordoma along the tract),</text><text x="54" y="698.5" font-size="11.2" font-weight="400" fill="#2E3C42">infection of a cyst, faecal fistula, meningitis.</text><text x="54" y="712.0" font-size="11.2" font-weight="400" fill="#2E3C42">If biopsy is essential (solid, suspected malignancy</text><text x="54" y="725.5" font-size="11.2" font-weight="400" fill="#2E3C42">needing neoadjuvant Rx) — only by a route that can be</text><text x="54" y="739.0" font-size="11.2" font-weight="400" fill="#2E3C42">excised EN BLOC (image-guided transperineal / posterior).</text><text x="54" y="752.5" font-size="11.2" font-weight="400" fill="#2E3C42">Always exclude anterior sacral meningocele first.</text><rect x="506.0" y="588" width="464.0" height="176" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="506.0" y="588" width="6" height="176" rx="3" fill="#15806A"/><text x="530.0" y="616" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">WORK-UP</text><text x="530.0" y="638" font-size="18" font-weight="800" fill="#16252B">Investigations</text><text x="530.0" y="660" font-size="11.4" font-weight="400" fill="#2E3C42">DRE — palpable in nearly all cases</text><text x="530.0" y="675" font-size="11.4" font-weight="400" fill="#2E3C42">MRI pelvis = imaging of CHOICE: cystic vs solid,</text><text x="530.0" y="690" font-size="11.4" font-weight="400" fill="#2E3C42">sacral / neural / organ involvement, surgical planning</text><text x="530.0" y="705" font-size="11.4" font-weight="400" fill="#2E3C42">CT — bone involvement, calcification</text><text x="530.0" y="720" font-size="11.4" font-weight="400" fill="#2E3C42">Sacral X-ray — ‘scimitar sacrum’ (curved defect)</text><text x="530.0" y="735" font-size="11.4" font-weight="400" fill="#2E3C42">suggests anterior meningocele / Currarino</text><text x="530.0" y="750" font-size="11.4" font-weight="400" fill="#2E3C42">Bloods: AFP / β-hCG if teratoma suspected</text><rect x="30" y="780" width="940" height="150" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="30" y="780" width="6" height="150" rx="3" fill="#C77B20"/><text x="54" y="808" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">RESECTION — APPROACH BY LEVEL RELATIVE TO S3</text><text x="54" y="830" font-size="18" font-weight="800" fill="#16252B">Surgical approach</text><rect x="54.0" y="848" width="289.3333333333333" height="52" rx="8" fill="#FFFFFF" stroke="#15806A" stroke-width="1.3"/><text x="66.0" y="867" font-size="12.5" font-weight="800" fill="#15806A">Below S3</text><text x="66.0" y="883" font-size="10.8" font-weight="400" fill="#2E3C42">Posterior / transsacral (Kraske), prone</text><text x="66.0" y="896" font-size="10.8" font-weight="400" fill="#2E3C42">jackknife ± coccygectomy / lower sacrectomy</text><rect x="355.3333333333333" y="848" width="289.3333333333333" height="52" rx="8" fill="#FFFFFF" stroke="#245C8C" stroke-width="1.3"/><text x="367.3333333333333" y="867" font-size="12.5" font-weight="800" fill="#245C8C">Above S3</text><text x="367.3333333333333" y="883" font-size="10.8" font-weight="400" fill="#2E3C42">Anterior / abdominal (open or laparoscopic)</text><rect x="656.6666666666666" y="848" width="289.3333333333333" height="52" rx="8" fill="#FFFFFF" stroke="#C77B20" stroke-width="1.3"/><text x="668.6666666666666" y="867" font-size="12.5" font-weight="800" fill="#C77B20">Spanning / large</text><text x="668.6666666666666" y="883" font-size="10.8" font-weight="400" fill="#2E3C42">Combined abdominosacral (abdominoperineal)</text><text x="54" y="918" font-size="10.6" font-weight="400" fill="#6B7B80">Complete EN-BLOC excision; excise coccyx for congenital cysts (attach to it — leaving it causes recurrence); avoid rupture; beware presacral venous plexus.</text><rect x="30" y="946" width="940" height="192" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="30" y="946" width="6" height="192" rx="3" fill="#6D4AA3"/><text x="54" y="974" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">KNOW THESE FOUR</text><text x="54" y="996" font-size="18" font-weight="800" fill="#16252B">Key entities</text><text x="54.0" y="1020" font-size="13" font-weight="800" fill="#6D4AA3">Tailgut cyst</text><text x="54.0" y="1038" font-size="11" font-weight="400" fill="#2E3C42">= retrorectal cystic</text><text x="54.0" y="1052" font-size="11" font-weight="400" fill="#2E3C42">hamartoma. Commonest</text><text x="54.0" y="1066" font-size="11" font-weight="400" fill="#2E3C42">cystic lesion; risk of</text><text x="54.0" y="1080" font-size="11" font-weight="400" fill="#2E3C42">malignant change</text><text x="54.0" y="1094" font-size="11" font-weight="400" fill="#2E3C42">(adenocarcinoma / NET).</text><text x="54.0" y="1108" font-size="11" font-weight="400" fill="#2E3C42">Excise WITH the coccyx.</text><text x="355.3333333333333" y="1020" font-size="13" font-weight="800" fill="#6D4AA3">Chordoma</text><text x="355.3333333333333" y="1038" font-size="11" font-weight="400" fill="#2E3C42">Commonest MALIGNANT.</text><text x="355.3333333333333" y="1052" font-size="11" font-weight="400" fill="#2E3C42">Notochord remnant,</text><text x="355.3333333333333" y="1066" font-size="11" font-weight="400" fill="#2E3C42">midline; physaliphorous</text><text x="355.3333333333333" y="1080" font-size="11" font-weight="400" fill="#2E3C42">cells. RadioRESISTANT —</text><text x="355.3333333333333" y="1094" font-size="11" font-weight="400" fill="#2E3C42">en-bloc sacrectomy; high</text><text x="355.3333333333333" y="1108" font-size="11" font-weight="400" fill="#2E3C42">local recurrence.</text><text x="656.6666666666666" y="1020" font-size="13" font-weight="800" fill="#6D4AA3">Ant. sacral meningocele</text><text x="656.6666666666666" y="1038" font-size="11" font-weight="400" fill="#2E3C42">NEVER aspirate / biopsy</text><text x="656.6666666666666" y="1052" font-size="11" font-weight="700" fill="#2E3C42">→ meningitis. ‘Scimitar</text><text x="656.6666666666666" y="1066" font-size="11" font-weight="400" fill="#2E3C42">sacrum’ on X-ray; CSF</text><text x="656.6666666666666" y="1080" font-size="11" font-weight="400" fill="#2E3C42">continuity on MRI.</text><text x="656.6666666666666" y="1094" font-size="11" font-weight="400" fill="#2E3C42">Part of the Currarino</text><text x="656.6666666666666" y="1108" font-size="11" font-weight="400" fill="#2E3C42">triad.</text><text x="54" y="1126" font-size="10.8" font-weight="400" fill="#6B7B80">Currarino triad: anorectal malformation + sacral bony defect (scimitar) + presacral mass — gene MNX1 / HLXB9.</text><line x1="30" y1="1152" x2="970" y2="1152" stroke="#D7DEDC" stroke-width="1"/><text x="30" y="1171" font-size="10.3" font-weight="400" fill="#7C8A8E">Sources: Uhlig &amp; Johnson / Dozois classification; Mayo Clinic series; standard coloproctology texts (Kraske approach; S3 threshold).</text><text x="30" y="1185" font-size="10.3" font-weight="400" fill="#9AA6AA">Revision aid — verify against current guidance before clinical use.</text>
<text x="822" y="42" font-size="21" font-weight="800" letter-spacing="0.2" fill="#FFFFFF">Mock<tspan fill="#6FA8DC">FRCS</tspan></text><text x="822" y="60" font-size="10.5" font-weight="500" fill="#AFC7CB">mockfrcs.co.uk</text><rect x="0" y="1198" width="1000" height="46" fill="#14313A"/><text x="30" y="1227" font-size="14" font-weight="800" fill="#FFFFFF">Mock<tspan fill="#6FA8DC">FRCS</tspan></text><text x="970" y="1227" text-anchor="end" font-size="12.5" font-weight="600" fill="#AFC7CB">Revision resources &amp; realistic mock exams · mockfrcs.co.uk</text>
</svg>