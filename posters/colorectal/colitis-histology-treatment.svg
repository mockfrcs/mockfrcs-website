<svg viewBox="0 0 1414 1093" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
<rect x="0" y="0" width="1414" height="1093" fill="#FFFFFF"/>

<rect x="0" y="0" width="1414" height="74" fill="#14313A"/>
<rect x="0" y="70" width="1414" height="4" fill="#15806A"/>
<rect x="471" y="70" width="472" height="4" fill="#BE3A2E"/>
<rect x="943" y="70" width="471" height="4" fill="#3C6E91"/>
<text x="30" y="38" font-size="27" font-weight="800" letter-spacing="0.3" fill="#FFFFFF">Colitis — histology &amp; treatment at a glance</text>
<text x="30" y="60" font-size="14" font-weight="500" fill="#AFC7CB">FRCS Part 1 (General Surgery) · UK practice · excludes UC &amp; ischaemic colitis</text>

<rect x="30" y="100" width="1354" height="26" rx="5" fill="#14313A"/><text x="42" y="118" font-size="12" font-weight="700" letter-spacing="0.6" fill="#FFFFFF">CONDITION</text><text x="300" y="118" font-size="12" font-weight="700" letter-spacing="0.6" fill="#FFFFFF">CLASSIC HISTOLOGY</text><text x="822" y="118" font-size="12" font-weight="700" letter-spacing="0.6" fill="#FFFFFF">TREATMENT (UK)</text><rect x="30" y="132" width="1354" height="24" rx="4" fill="#15806A"/><text x="42" y="149" font-size="12.5" font-weight="800" letter-spacing="1" fill="#FFFFFF">MICROSCOPIC COLITIS<tspan font-size="11" font-weight="500" letter-spacing="0" fill="#FFFFFF" opacity="0.85">   —   normal endoscopy — diagnosis on biopsy</tspan></text><rect x="30" y="160" width="1354" height="44" fill="#E2F1EC" opacity="0.5"/><rect x="30" y="160" width="4" height="44" fill="#15806A"/><text x="42" y="173" font-size="12.5" font-weight="700" fill="#16252B">Collagenous colitis</text><text x="300" y="173" font-size="12.5" fill="#2E3C42">Thickened subepithelial collagen band (&gt;10 μm); surface epithelial damage;</text><text x="300" y="188" font-size="12.5" fill="#2E3C42">lamina propria lymphoplasmacytic infiltrate</text><text x="822" y="173" font-size="12.5" fill="#2E3C42">Stop NSAIDs / PPIs; budesonide (1st-line); antidiarrhoeals</text><rect x="30" y="204" width="4" height="44" fill="#15806A"/><text x="42" y="217" font-size="12.5" font-weight="700" fill="#16252B">Lymphocytic colitis</text><text x="300" y="217" font-size="12.5" fill="#2E3C42">↑ Intraepithelial lymphocytes (&gt;20 per 100 epithelial cells); normal collagen</text><text x="300" y="232" font-size="12.5" fill="#2E3C42">band</text><text x="822" y="217" font-size="12.5" fill="#2E3C42">Stop NSAIDs / PPIs; budesonide (1st-line)</text><rect x="30" y="254" width="1354" height="24" rx="4" fill="#BE3A2E"/><text x="42" y="271" font-size="12.5" font-weight="800" letter-spacing="1" fill="#FFFFFF">INFECTIVE COLITIS<tspan font-size="11" font-weight="500" letter-spacing="0" fill="#FFFFFF" opacity="0.85"></tspan></text><rect x="30" y="282" width="1354" height="59" fill="#FBEAE6" opacity="0.5"/><rect x="30" y="282" width="4" height="59" fill="#BE3A2E"/><text x="42" y="295" font-size="12.5" font-weight="700" fill="#16252B">C. difficile (pseudomembranous)</text><text x="300" y="295" font-size="12.5" fill="#2E3C42">Pseudomembranes — “volcano / summit” lesions: fibrinopurulent exudate</text><text x="300" y="310" font-size="12.5" fill="#2E3C42">erupting from crypts</text><text x="822" y="295" font-size="12.5" fill="#2E3C42">Stop causative antibiotic; oral vancomycin 1st-line, fidaxomicin 2nd-line / relapse;</text><text x="822" y="310" font-size="12.5" fill="#2E3C42">severe → high-dose vancomycin + IV metronidazole; FMT if recurrent; colectomy if</text><text x="822" y="325" font-size="12.5" fill="#2E3C42">fulminant</text><rect x="30" y="341" width="4" height="44" fill="#BE3A2E"/><text x="42" y="354" font-size="12.5" font-weight="700" fill="#16252B">CMV colitis</text><text x="300" y="354" font-size="12.5" fill="#2E3C42">Enlarged cells with intranuclear “owl-eye” inclusions ± cytoplasmic</text><text x="300" y="369" font-size="12.5" fill="#2E3C42">inclusions; confirm on immunohistochemistry</text><text x="822" y="354" font-size="12.5" fill="#2E3C42">Ganciclovir / valganciclovir; reduce immunosuppression</text><rect x="30" y="385" width="1354" height="44" fill="#FBEAE6" opacity="0.5"/><rect x="30" y="385" width="4" height="44" fill="#BE3A2E"/><text x="42" y="398" font-size="12.5" font-weight="700" fill="#16252B">Amoebic (E. histolytica)</text><text x="300" y="398" font-size="12.5" fill="#2E3C42">Flask-shaped ulcers; trophozoites with ingested RBCs (erythrophagocytosis),</text><text x="300" y="413" font-size="12.5" fill="#2E3C42">PAS-positive</text><text x="822" y="398" font-size="12.5" fill="#2E3C42">Metronidazole + luminal agent (paromomycin / diloxanide). Avoid steroids</text><rect x="30" y="429" width="4" height="29" fill="#BE3A2E"/><text x="42" y="442" font-size="12.5" font-weight="700" fill="#16252B">Intestinal / ileocaecal TB</text><text x="300" y="442" font-size="12.5" fill="#2E3C42">Confluent caseating granulomas; transverse ulcers (Crohn’s mimic)</text><text x="822" y="442" font-size="12.5" fill="#2E3C42">Anti-TB: rifampicin, isoniazid, pyrazinamide, ethambutol (RIPE)</text><rect x="30" y="458" width="1354" height="44" fill="#FBEAE6" opacity="0.5"/><rect x="30" y="458" width="4" height="44" fill="#BE3A2E"/><text x="42" y="471" font-size="12.5" font-weight="700" fill="#16252B">Yersinia enterocolitica</text><text x="300" y="471" font-size="12.5" fill="#2E3C42">Epithelioid granulomas + lymphoid hyperplasia; terminal ileitis (Crohn’s</text><text x="300" y="486" font-size="12.5" fill="#2E3C42">mimic)</text><text x="822" y="471" font-size="12.5" fill="#2E3C42">Usually self-limiting; antibiotics (fluoroquinolone / doxycycline) if severe or</text><text x="822" y="486" font-size="12.5" fill="#2E3C42">immunocompromised</text><rect x="30" y="502" width="4" height="44" fill="#BE3A2E"/><text x="42" y="515" font-size="12.5" font-weight="700" fill="#16252B">Acute bacterial (Campylobacter,</text><text x="42" y="530" font-size="12.5" font-weight="700" fill="#16252B">Salmonella, Shigella, E. coli)</text><text x="300" y="515" font-size="12.5" fill="#2E3C42">Acute inflammation with preserved crypt architecture (no branching /</text><text x="300" y="530" font-size="12.5" fill="#2E3C42">chronicity)</text><text x="822" y="515" font-size="12.5" fill="#2E3C42">Supportive (fluids); antibiotics only if severe / systemic. Avoid antimotility in EHEC</text><text x="822" y="530" font-size="12.5" fill="#2E3C42">(HUS risk)</text><rect x="30" y="552" width="1354" height="24" rx="4" fill="#C77B20"/><text x="42" y="569" font-size="12.5" font-weight="800" letter-spacing="1" fill="#FFFFFF">DRUG / IATROGENIC<tspan font-size="11" font-weight="500" letter-spacing="0" fill="#FFFFFF" opacity="0.85"></tspan></text><rect x="30" y="580" width="1354" height="59" fill="#FBF0E0" opacity="0.5"/><rect x="30" y="580" width="4" height="59" fill="#C77B20"/><text x="42" y="593" font-size="12.5" font-weight="700" fill="#16252B">Radiation colitis / proctitis</text><text x="300" y="593" font-size="12.5" fill="#2E3C42">Acute: crypt apoptosis, eosinophilic crypt abscesses. Chronic: mucosal</text><text x="300" y="608" font-size="12.5" fill="#2E3C42">telangiectasia, submucosal fibrosis, “bizarre” radiation fibroblasts,</text><text x="300" y="623" font-size="12.5" fill="#2E3C42">endarteritis obliterans</text><text x="822" y="593" font-size="12.5" fill="#2E3C42">Acute: supportive. Chronic bleeding: argon plasma coagulation, sucralfate enemas,</text><text x="822" y="608" font-size="12.5" fill="#2E3C42">hyperbaric O2; surgery for stricture / fistula</text><rect x="30" y="639" width="4" height="44" fill="#C77B20"/><text x="42" y="652" font-size="12.5" font-weight="700" fill="#16252B">Neutropenic enterocolitis</text><text x="42" y="667" font-size="12.5" font-weight="700" fill="#16252B">(typhlitis)</text><text x="300" y="652" font-size="12.5" fill="#2E3C42">Caecal mucosal oedema, necrosis, haemorrhage with paucity of neutrophils</text><text x="300" y="667" font-size="12.5" fill="#2E3C42">(neutropenic) ± microbial invasion</text><text x="822" y="652" font-size="12.5" fill="#2E3C42">Bowel rest, IV fluids, broad-spectrum antibiotics, G-CSF; surgery if perforation /</text><text x="822" y="667" font-size="12.5" fill="#2E3C42">necrosis / bleeding</text><rect x="30" y="683" width="1354" height="44" fill="#FBF0E0" opacity="0.5"/><rect x="30" y="683" width="4" height="44" fill="#C77B20"/><text x="42" y="696" font-size="12.5" font-weight="700" fill="#16252B">Checkpoint inhibitor colitis</text><text x="300" y="696" font-size="12.5" fill="#2E3C42">Acute colitis pattern: lamina propria expansion, neutrophilic cryptitis /</text><text x="300" y="711" font-size="12.5" fill="#2E3C42">crypt abscesses, ↑ crypt apoptosis, IELs (mimics IBD / GVHD)</text><text x="822" y="696" font-size="12.5" fill="#2E3C42">Hold / stop drug; corticosteroids; infliximab or vedolizumab if steroid-refractory</text><rect x="30" y="733" width="1354" height="24" rx="4" fill="#3C6E91"/><text x="42" y="750" font-size="12.5" font-weight="800" letter-spacing="1" fill="#FFFFFF">STRUCTURAL / OTHER<tspan font-size="11" font-weight="500" letter-spacing="0" fill="#FFFFFF" opacity="0.85"></tspan></text><rect x="30" y="761" width="4" height="44" fill="#3C6E91"/><text x="42" y="774" font-size="12.5" font-weight="700" fill="#16252B">Diversion colitis</text><text x="300" y="774" font-size="12.5" fill="#2E3C42">Lymphoid follicular hyperplasia; diffuse lymphoid aggregates; mild crypt</text><text x="300" y="789" font-size="12.5" fill="#2E3C42">distortion / cryptitis</text><text x="822" y="774" font-size="12.5" fill="#2E3C42">Short-chain fatty acid (SCFA) enemas; definitive = restore intestinal continuity</text><rect x="30" y="805" width="1354" height="44" fill="#E7EFF6" opacity="0.5"/><rect x="30" y="805" width="4" height="44" fill="#3C6E91"/><text x="42" y="818" font-size="12.5" font-weight="700" fill="#16252B">SCAD (segmental colitis +</text><text x="42" y="833" font-size="12.5" font-weight="700" fill="#16252B">diverticulosis)</text><text x="300" y="818" font-size="12.5" fill="#2E3C42">IBD-like chronic inflammation confined to a diverticular (sigmoid) segment;</text><text x="300" y="833" font-size="12.5" fill="#2E3C42">rectum spared</text><text x="822" y="818" font-size="12.5" fill="#2E3C42">5-ASA, antibiotics; segmental resection if refractory</text><rect x="30" y="849" width="4" height="44" fill="#3C6E91"/><text x="42" y="862" font-size="12.5" font-weight="700" fill="#16252B">GVHD colitis</text><text x="300" y="862" font-size="12.5" fill="#2E3C42">Crypt epithelial apoptosis (apoptotic bodies at crypt base); crypt dropout</text><text x="300" y="877" font-size="12.5" fill="#2E3C42">(“exploding crypts”)</text><text x="822" y="862" font-size="12.5" fill="#2E3C42">Systemic immunosuppression — corticosteroids ± ciclosporin / biologics</text><rect x="30" y="893" width="1354" height="44" fill="#E7EFF6" opacity="0.5"/><rect x="30" y="893" width="4" height="44" fill="#3C6E91"/><text x="42" y="906" font-size="12.5" font-weight="700" fill="#16252B">SRUS (solitary rectal ulcer) —</text><text x="42" y="921" font-size="12.5" font-weight="700" fill="#16252B">not a true colitis</text><text x="300" y="906" font-size="12.5" fill="#2E3C42">Fibromuscular obliteration of lamina propria; smooth-muscle ingrowth; surface</text><text x="300" y="921" font-size="12.5" fill="#2E3C42">ulceration; distorted / “diamond” crypts</text><text x="822" y="906" font-size="12.5" fill="#2E3C42">Conservative: fibre, stop straining, biofeedback; topical sucralfate / 5-ASA;</text><text x="822" y="921" font-size="12.5" fill="#2E3C42">rectopexy if associated prolapse</text><rect x="30" y="937" width="4" height="29" fill="#3C6E91"/><text x="42" y="950" font-size="12.5" font-weight="700" fill="#16252B">Eosinophilic colitis</text><text x="300" y="950" font-size="12.5" fill="#2E3C42">Dense mucosal eosinophilic infiltrate (other causes excluded)</text><text x="822" y="950" font-size="12.5" fill="#2E3C42">Dietary modification; corticosteroids</text><rect x="30" y="966" width="1354" height="29" fill="#E7EFF6" opacity="0.5"/><rect x="30" y="966" width="4" height="29" fill="#3C6E91"/><text x="42" y="979" font-size="12.5" font-weight="700" fill="#16252B">Behçet’s colitis</text><text x="300" y="979" font-size="12.5" fill="#2E3C42">Deep “punched-out” round / oval ulcers (ileocaecal); vasculitis</text><text x="822" y="979" font-size="12.5" fill="#2E3C42">Corticosteroids; azathioprine; anti-TNF biologics; colchicine</text>

<line x1="30" y1="1007" x2="1384" y2="1007" stroke="#D7DEDC" stroke-width="1"/>
<text x="30" y="1025" font-size="10.5" fill="#7C8A8E">C. difficile treatment per NICE NG199 (vancomycin 1st-line, fidaxomicin 2nd-line / relapse). SRUS is a mucosal-prolapse / trauma entity, not a primary colitis.</text>
<text x="30" y="1039" font-size="10.5" fill="#9AA6AA">Revision aid — verify against current guidance before clinical use.</text>

<text x="1236" y="42" font-size="21" font-weight="800" letter-spacing="0.2" fill="#FFFFFF">Mock<tspan fill="#6FA8DC">FRCS</tspan></text><text x="1236" y="60" font-size="10.5" font-weight="500" fill="#AFC7CB">mockfrcs.co.uk</text><rect x="0" y="1047" width="1414" height="46" fill="#14313A"/><text x="30" y="1076" font-size="14" font-weight="800" fill="#FFFFFF">Mock<tspan fill="#6FA8DC">FRCS</tspan></text><text x="1384" y="1076" text-anchor="end" font-size="12.5" font-weight="600" fill="#AFC7CB">Revision resources &amp; realistic mock exams · mockfrcs.co.uk</text>
</svg>