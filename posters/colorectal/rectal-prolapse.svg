<svg viewBox="0 0 1000 996" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
<rect x="0" y="0" width="1000" height="996" fill="#F4F6F4"/>
<rect x="0" y="0" width="1000" height="108" fill="#14313A"/><rect x="0" y="108" width="250" height="4" fill="#15806A"/><rect x="250" y="108" width="250" height="4" fill="#245C8C"/><rect x="500" y="108" width="250" height="4" fill="#C77B20"/><rect x="750" y="108" width="250" height="4" fill="#BE3A2E"/><text x="30" y="46" font-size="29" font-weight="800" fill="#FFFFFF">External rectal prolapse</text><text x="30" y="74" font-size="14" font-weight="500" fill="#AFC7CB">FRCS Part 1 (General Surgery) · partial vs full-thickness · abdominal vs perineal repair · PROSPER</text><rect x="30" y="128" width="464.0" height="228" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="30" y="128" width="6" height="228" rx="3" fill="#15806A"/><text x="54" y="156" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">CLASSIFICATION</text><text x="54" y="178" font-size="18" font-weight="800" fill="#16252B">Types</text><text x="54" y="200" font-size="11.8" font-weight="700" fill="#15806A">Full-thickness (procidentia)</text><text x="54" y="215" font-size="11.4" font-weight="400" fill="#2E3C42">all rectal layers protrude through the anus — CONCENTRIC mucosal rings</text><text x="54" y="237" font-size="11.8" font-weight="700" fill="#C77B20">Partial / mucosal</text><text x="54" y="252" font-size="11.4" font-weight="400" fill="#2E3C42">mucosa only; RADIAL folds / grooves; linked with haemorrhoids</text><text x="54" y="274" font-size="11.8" font-weight="700" fill="#245C8C">Internal (occult) intussusception</text><text x="54" y="289" font-size="11.4" font-weight="400" fill="#2E3C42">does not protrude → part of ODS (poster 1)</text><rect x="54" y="305" width="416.0" height="34" rx="7" fill="#E2F1EC"/><text x="64" y="323" font-size="11.2" font-weight="700" fill="#16252B">Key sign: concentric rings = full-thickness;</text><text x="64" y="337" font-size="11.2" font-weight="400" fill="#2E3C42">radial grooves = prolapsing haemorrhoids.</text><rect x="506.0" y="128" width="464.0" height="228" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="506.0" y="128" width="6" height="228" rx="3" fill="#BE3A2E"/><text x="530.0" y="156" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">WHO &amp; HOW</text><text x="530.0" y="178" font-size="18" font-weight="800" fill="#16252B">Presentation</text><text x="530.0" y="200.0" font-size="11.4" font-weight="400" fill="#2E3C42">Predominantly older, multiparous women (also young</text><text x="530.0" y="215.5" font-size="11.4" font-weight="400" fill="#2E3C42">adults who strain)</text><text x="530.0" y="231.0" font-size="11.4" font-weight="400" fill="#2E3C42">Associations: pelvic-floor weakness, chronic straining,</text><text x="530.0" y="246.5" font-size="11.4" font-weight="400" fill="#2E3C42">deep pouch of Douglas, redundant sigmoid, poor rectal</text><text x="530.0" y="262.0" font-size="11.4" font-weight="400" fill="#2E3C42">fixation, connective-tissue laxity, patulous anus</text><text x="530.0" y="277.5" font-size="11.4" font-weight="400" fill="#2E3C42">Symptoms: prolapsing mass, mucus, bleeding, tenesmus,</text><text x="530.0" y="293.0" font-size="11.4" font-weight="400" fill="#2E3C42">obstructed defecation, ulceration (SRUS)</text><text x="530.0" y="308.5" font-size="11.4" font-weight="700" fill="#2E3C42">FAECAL INCONTINENCE is very common (~50–75%) —</text><text x="530.0" y="324.0" font-size="11.4" font-weight="400" fill="#2E3C42">chronic sphincter stretch / pudendal neuropathy</text><rect x="30" y="372" width="940" height="110" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="30" y="372" width="6" height="110" rx="3" fill="#245C8C"/><text x="54" y="400" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">WORK-UP</text><text x="54" y="422" font-size="18" font-weight="800" fill="#16252B">Investigations</text><text x="54" y="444" font-size="11.6" font-weight="700" fill="#245C8C">Demonstrate the prolapse</text><text x="314" y="444" font-size="11.4" font-weight="400" fill="#2E3C42">ask the patient to strain / squat on a commode (look for concentric rings)</text><text x="54" y="461" font-size="11.6" font-weight="700" fill="#245C8C">Colonoscopy</text><text x="314" y="461" font-size="11.4" font-weight="400" fill="#2E3C42">exclude a lead-point tumour</text><text x="54" y="478" font-size="11.6" font-weight="700" fill="#245C8C">Manometry + endoanal US · proctography</text><text x="314" y="478" font-size="11.4" font-weight="400" fill="#2E3C42">continence / sphincter assessment; proctography if internal or associated ODS</text><rect x="30" y="498" width="464.0" height="248" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="30" y="498" width="6" height="248" rx="3" fill="#6D4AA3"/><text x="54" y="526" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">LOWER RECURRENCE · FITTER PATIENTS</text><text x="54" y="548" font-size="18" font-weight="800" fill="#16252B">Abdominal approach</text><text x="54" y="570" font-size="11.8" font-weight="800" fill="#6D4AA3">Ventral mesh rectopexy (VMR, D’Hoore) — preferred</text><text x="54" y="586" font-size="11.4" font-weight="400" fill="#2E3C42">laparoscopic / robotic; ANTERIOR-only dissection spares autonomic</text><text x="54" y="600" font-size="11.4" font-weight="400" fill="#2E3C42">nerves (less new constipation); also corrects rectocele / enterocele;</text><text x="54" y="614" font-size="11.4" font-weight="400" fill="#2E3C42">mesh-complication risk</text><text x="54" y="635" font-size="11.8" font-weight="800" fill="#6D4AA3">Resection rectopexy (Frykman–Goldberg)</text><text x="54" y="651" font-size="11.4" font-weight="400" fill="#2E3C42">rectopexy + sigmoid resection — less post-op constipation</text><text x="54" y="672" font-size="11.8" font-weight="800" fill="#6D4AA3">Suture / posterior mesh (Wells)</text><text x="54" y="688" font-size="11.4" font-weight="400" fill="#2E3C42">older; more constipation</text><rect x="54" y="705" width="416.0" height="24" rx="6" fill="#EFEAF6"/><text x="64" y="721" font-size="11.4" font-weight="700" fill="#16252B">Recurrence ~10% (meta-analysis 9.8%)</text><rect x="506.0" y="498" width="464.0" height="248" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="506.0" y="498" width="6" height="248" rx="3" fill="#C77B20"/><text x="530.0" y="526" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">FRAIL / HIGH-RISK · AVOIDS ABDOMEN</text><text x="530.0" y="548" font-size="18" font-weight="800" fill="#16252B">Perineal approach</text><text x="530.0" y="570" font-size="11.8" font-weight="800" fill="#C77B20">Altemeier (perineal rectosigmoidectomy)</text><text x="530.0" y="586" font-size="11.4" font-weight="400" fill="#2E3C42">full-thickness resection of the prolapse ± levatorplasty; low</text><text x="530.0" y="600" font-size="11.4" font-weight="400" fill="#2E3C42">morbidity, repeatable</text><text x="530.0" y="621" font-size="11.8" font-weight="800" fill="#C77B20">Delorme (mucosal sleeve + plication)</text><text x="530.0" y="637" font-size="11.4" font-weight="400" fill="#2E3C42">short full-thickness / mucosal prolapse; good for the frail</text><text x="530.0" y="658" font-size="11.8" font-weight="800" fill="#C77B20">Thiersch anal encirclement</text><text x="530.0" y="674" font-size="11.4" font-weight="400" fill="#2E3C42">historical; only the very unfit</text><rect x="530.0" y="691" width="416.0" height="24" rx="6" fill="#FBF0E0"/><text x="540.0" y="707" font-size="11.4" font-weight="700" fill="#16252B">Recurrence ~16% (VMR vs Delorme RCT: 8 vs 16%)</text><rect x="30" y="762" width="940" height="128" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="30" y="762" width="6" height="128" rx="3" fill="#BE3A2E"/><text x="54" y="790" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">EVIDENCE &amp; DECISION</text><text x="54" y="812" font-size="18" font-weight="800" fill="#16252B">PROSPER trial</text><text x="54" y="834" font-size="11.3" font-weight="400" fill="#2E3C42">PROSPER (UK RCT): abdominal vs perineal, Delorme vs Altemeier, and resection vs suture rectopexy —</text><text x="54" y="849" font-size="11.3" font-weight="400" fill="#2E3C42">no significant difference in recurrence or quality of life, recurrence high overall, and underpowered → no clear winner.</text><text x="54" y="864" font-size="11.3" font-weight="400" fill="#2E3C42">Meta-analysis: abdominal recurrence (~10%) &lt; perineal (~16%). Cochrane: resection rectopexy → less constipation.</text><text x="54" y="879" font-size="11.3" font-weight="700" fill="#2E3C42">Decision: fit patient / first presentation → abdominal (VMR); frail / high anaesthetic risk → perineal (Altemeier / Delorme). Individualise.</text><line x1="30" y1="904" x2="970" y2="904" stroke="#D7DEDC" stroke-width="1"/><text x="30" y="923" font-size="10.3" font-weight="400" fill="#7C8A8E">Sources: PROSPER (Senapati et al., Colorectal Dis 2013 / BJS Open 2022); abdominal-vs-perineal meta-analysis; ASCRS practice; VMR = D’Hoore technique.</text><text x="30" y="937" font-size="10.3" font-weight="400" fill="#9AA6AA">Revision aid — verify against current guidance before clinical use. ODS / incontinence → poster 1 · IBS → poster 3.</text>
<text x="822" y="42" font-size="21" font-weight="800" letter-spacing="0.2" fill="#FFFFFF">Mock<tspan fill="#6FA8DC">FRCS</tspan></text><text x="822" y="60" font-size="10.5" font-weight="500" fill="#AFC7CB">mockfrcs.co.uk</text><rect x="0" y="950" width="1000" height="46" fill="#14313A"/><text x="30" y="979" font-size="14" font-weight="800" fill="#FFFFFF">Mock<tspan fill="#6FA8DC">FRCS</tspan></text><text x="970" y="979" text-anchor="end" font-size="12.5" font-weight="600" fill="#AFC7CB">Revision resources &amp; realistic mock exams · mockfrcs.co.uk</text>
</svg>