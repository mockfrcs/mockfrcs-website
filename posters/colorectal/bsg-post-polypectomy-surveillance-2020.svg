<svg viewBox="0 0 1000 1149" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
<rect x="0" y="0" width="1000" height="1149" fill="#F4F6F4"/>
<rect x="0" y="0" width="1000" height="108" fill="#14313A"/><rect x="0" y="108" width="250" height="4" fill="#BE3A2E"/><rect x="250" y="108" width="250" height="4" fill="#C77B20"/><rect x="500" y="108" width="250" height="4" fill="#15806A"/><rect x="750" y="108" width="250" height="4" fill="#245C8C"/><text x="30" y="46" font-size="29" font-weight="800" letter-spacing="0.3" fill="#FFFFFF">BSG post-polypectomy surveillance</text><text x="30" y="74" font-size="14" font-weight="500" fill="#AFC7CB">BSG / ACPGBI / PHE 2020 (Rutter et al.) · post-polypectomy &amp; post-CRC resection · FRCS Part 1 · UK practice</text><rect x="30" y="128" width="940" height="155.0" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="30" y="128" width="6" height="155.0" rx="3" fill="#245C8C"/><text x="54" y="156" font-size="11" font-weight="700" letter-spacing="1.5" fill="#6B7B80">WHY IT CHANGED</text><text x="54" y="180" font-size="18" font-weight="800" fill="#16252B">What 2020 changed</text><text x="54" y="202" font-size="12.5" font-weight="700" fill="#245C8C">4 → 2 categories</text><text x="204" y="202.0" font-size="12" fill="#2E3C42">old high / intermediate / low / no-risk replaced by just high-risk vs no high-risk findings</text><text x="54" y="222.5" font-size="12.5" font-weight="700" fill="#245C8C">Low-risk → screening</text><text x="204" y="222.5" font-size="12" fill="#2E3C42">patients without high-risk findings return to FIT bowel screening (their CRC risk ≈ population), not colonoscopy</text><text x="54" y="243.0" font-size="12.5" font-weight="700" fill="#245C8C">Firsts</text><text x="204" y="243.0" font-size="12" fill="#2E3C42">first UK guideline to integrate national bowel cancer screening, and to cover serrated-polyp &amp; post-CRC resection</text><text x="204" y="258.5" font-size="12" fill="#2E3C42">surveillance</text><rect x="30" y="297.0" width="940" height="176" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="30" y="297.0" width="6" height="176" rx="3" fill="#BE3A2E"/><text x="54" y="325.0" font-size="11" font-weight="700" letter-spacing="1.5" fill="#BE3A2E">THE CORE DEFINITION — MEMORISE THIS</text><text x="54" y="349.0" font-size="19" font-weight="800" fill="#16252B">High-risk findings — ANY one of:</text><circle cx="68" cy="371.0" r="11" fill="#BE3A2E"/><text x="68" y="375.0" text-anchor="middle" font-size="13" font-weight="800" fill="#FFFFFF">1</text><text x="88" y="375.0" font-size="14.5" font-weight="600" fill="#16252B">≥2 premalignant polyps, including ≥1 advanced</text><circle cx="68" cy="397.0" r="11" fill="#BE3A2E"/><text x="68" y="401.0" text-anchor="middle" font-size="13" font-weight="800" fill="#FFFFFF">2</text><text x="88" y="401.0" font-size="14.5" font-weight="600" fill="#16252B">≥5 premalignant polyps</text><circle cx="68" cy="423.0" r="11" fill="#BE3A2E"/><text x="68" y="427.0" text-anchor="middle" font-size="13" font-weight="800" fill="#FFFFFF">3</text><text x="88" y="427.0" font-size="14.5" font-weight="600" fill="#16252B">≥1 non-pedunculated polyp ≥20 mm</text><rect x="590" y="367.0" width="362" height="92" rx="8" fill="#FBEAE6"/><text x="604" y="387.0" font-size="12" font-weight="700" fill="#16252B">Premalignant polyp =</text><text x="604" y="403.0" font-size="12" fill="#2E3C42">adenoma or serrated polyp</text><text x="604" y="425.0" font-size="12" font-weight="700" fill="#16252B">Advanced =</text><text x="604" y="441.0" font-size="12" fill="#2E3C42">≥10 mm or high-grade dysplasia</text><text x="604" y="455.0" font-size="11" fill="#6B7B80">(serrated: ≥10 mm or any dysplasia)</text><rect x="30" y="487.0" width="940" height="300" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="30" y="487.0" width="6" height="300" rx="3" fill="#14313A"/><text x="54" y="515.0" font-size="11" font-weight="700" letter-spacing="1.5" fill="#6B7B80">PATHWAY</text><text x="54" y="539.0" font-size="18" font-weight="800" fill="#16252B">Surveillance algorithm</text><rect x="270.0" y="553.0" width="460" height="40" rx="8" fill="#14313A"/><text x="500.0" y="571.0" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">INDEX (baseline) COLONOSCOPY</text><text x="500.0" y="586.0" text-anchor="middle" font-size="11" fill="#AFC7CB">high quality · complete to caecum · all polyps cleared</text><line x1="500.0" y1="593.0" x2="500.0" y2="611.0" stroke="#9AA6AA" stroke-width="2"/><path d="M500.0 611.0 L504.1893050087277 616.6080053088285 L495.8106949912723 616.6080053088285 Z" fill="#9AA6AA"/><rect x="320.0" y="611.0" width="360" height="34" rx="17" fill="#FFFFFF" stroke="#BE3A2E" stroke-width="2"/><text x="500.0" y="633.0" text-anchor="middle" font-size="13.5" font-weight="800" fill="#BE3A2E">Any high-risk finding?</text><line x1="500.0" y1="645.0" x2="500.0" y2="655.0" stroke="#9AA6AA" stroke-width="2"/><path d="M500.0 655.0 L504.1893050087277 660.6080053088285 L495.8106949912723 660.6080053088285 Z" fill="#9AA6AA"/><line x1="150" y1="655.0" x2="850" y2="655.0" stroke="#9AA6AA" stroke-width="2"/><line x1="150" y1="655.0" x2="150" y2="669.0" stroke="#15806A" stroke-width="2"/><path d="M150 669.0 L154.1893050087277 674.6080053088285 L145.8106949912723 674.6080053088285 Z" fill="#15806A"/><line x1="850" y1="655.0" x2="850" y2="669.0" stroke="#BE3A2E" stroke-width="2"/><path d="M850 669.0 L854.1893050087277 674.6080053088285 L845.8106949912723 674.6080053088285 Z" fill="#BE3A2E"/><text x="142" y="651.0" text-anchor="end" font-size="12" font-weight="800" fill="#15806A">NO</text><text x="858" y="651.0" font-size="12" font-weight="800" fill="#BE3A2E">YES</text><rect x="44" y="671.0" width="400" height="88" rx="9" fill="#E2F1EC" stroke="#15806A" stroke-width="1.2"/><text x="60" y="695.0" font-size="13.5" font-weight="800" fill="#15806A">Return to bowel screening</text><text x="60" y="715.0" font-size="12" fill="#2E3C42">No colonoscopic surveillance — invite to</text><text x="60" y="730.0" font-size="12" fill="#2E3C42">national FIT screening programme.</text><text x="60" y="749.0" font-size="11" fill="#6B7B80">If &gt;10 y below screening age → one-off scope at 5–10 y.</text><rect x="556" y="671.0" width="400" height="88" rx="9" fill="#FBEAE6" stroke="#BE3A2E" stroke-width="1.2"/><text x="572" y="695.0" font-size="13.5" font-weight="800" fill="#BE3A2E">Surveillance colonoscopy at 3 years</text><text x="572" y="715.0" font-size="12" fill="#2E3C42">At each surveillance, reassess with the</text><text x="572" y="730.0" font-size="12" fill="#2E3C42">SAME high-risk criteria:</text><text x="572" y="749.0" font-size="11.5" fill="#2E3C42">high-risk again → <tspan font-weight="700">3 y</tspan>  ·  none → return to screening</text><rect x="30" y="801.0" width="464.0" height="170" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="30" y="801.0" width="6" height="170" rx="3" fill="#6D4AA3"/><text x="54" y="829.0" font-size="11" font-weight="700" letter-spacing="1.5" fill="#6B7B80">LARGE NON-PEDUNCULATED POLYPS (≥20 mm)</text><text x="54" y="851.0" font-size="18" font-weight="800" fill="#16252B">Site checks</text><text x="54" y="871.0" font-size="12" font-weight="700" fill="#6D4AA3">En bloc</text><text x="126" y="871.0" font-size="12" fill="#2E3C42">R0 EMR / ESD, clear margins — no site check →</text><text x="126" y="886.0" font-size="12" fill="#2E3C42">surveillance at 3 years</text><text x="54" y="907.0" font-size="12" font-weight="700" fill="#6D4AA3">Piecemeal</text><text x="126" y="907.0" font-size="12" fill="#2E3C42">(or completeness uncertain): site check at 2–6 months</text><text x="126" y="922.0" font-size="12" fill="#2E3C42">AND 18 months</text><text x="54" y="943.0" font-size="12" font-weight="700" fill="#6D4AA3">Then</text><text x="126" y="943.0" font-size="12" fill="#2E3C42">once no recurrence → surveillance at 3 years, then per</text><text x="126" y="958.0" font-size="12" fill="#2E3C42">high-risk criteria</text><rect x="506.0" y="801.0" width="464.0" height="170" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="506.0" y="801.0" width="6" height="170" rx="3" fill="#245C8C"/><text x="530.0" y="829.0" font-size="11" font-weight="700" letter-spacing="1.5" fill="#6B7B80">AFTER COLORECTAL CANCER RESECTION</text><text x="530.0" y="851.0" font-size="18" font-weight="800" fill="#16252B">Post-CRC surveillance</text><text x="530.0" y="871.0" font-size="12" font-weight="700" fill="#245C8C">Clearance</text><text x="602.0" y="871.0" font-size="12" fill="#2E3C42">complete clearing colonoscopy peri-op (if obstructing →</text><text x="602.0" y="886.0" font-size="12" fill="#2E3C42">within 3–6 months, or CT colonography)</text><text x="530.0" y="907.0" font-size="12" font-weight="700" fill="#245C8C">At 1 year</text><text x="602.0" y="907.0" font-size="12" fill="#2E3C42">surveillance colonoscopy 1 year after resection</text><text x="530.0" y="928.0" font-size="12" font-weight="700" fill="#245C8C">Then</text><text x="602.0" y="928.0" font-size="12" fill="#2E3C42">determined by findings using the same high-risk</text><text x="602.0" y="943.0" font-size="12" fill="#2E3C42">criteria (next typically 3 years)</text><rect x="30" y="985.0" width="940" height="58" rx="11" fill="#FFFDF8" stroke="#E0E6E3" stroke-width="1.2"/><rect x="30" y="985.0" width="6" height="58" rx="3" fill="#C77B20"/><text x="54" y="1011.0" font-size="12.5" font-weight="800" fill="#C77B20">Prerequisite:</text><text x="150" y="1011.0" font-size="12.5" fill="#2E3C42">all intervals assume a high-quality baseline — caecal intubation (photo-documented), adequate prep, complete polyp clearance.</text><text x="150" y="1029.0" font-size="12" fill="#2E3C42">If the baseline colonoscopy is suboptimal, repeat early rather than waiting the standard interval.</text><line x1="30" y1="1057.0" x2="970" y2="1057.0" stroke="#D7DEDC" stroke-width="1"/><text x="30" y="1076.0" font-size="10.5" fill="#7C8A8E">Source: Rutter MD et al. BSG / ACPGBI / PHE post-polypectomy and post-colorectal cancer resection surveillance guidelines. Gut 2020;69:201–223 — current UK guideline.</text><text x="30" y="1090.0" font-size="10.5" fill="#9AA6AA">Revision aid — verify against current guidance before clinical use.</text>
<text x="822" y="42" font-size="21" font-weight="800" letter-spacing="0.2" fill="#FFFFFF">Mock<tspan fill="#6FA8DC">FRCS</tspan></text><text x="822" y="60" font-size="10.5" font-weight="500" fill="#AFC7CB">mockfrcs.co.uk</text><rect x="0" y="1103" width="1000" height="46" fill="#14313A"/><text x="30" y="1132" font-size="14" font-weight="800" fill="#FFFFFF">Mock<tspan fill="#6FA8DC">FRCS</tspan></text><text x="970" y="1132" text-anchor="end" font-size="12.5" font-weight="600" fill="#AFC7CB">Revision resources &amp; realistic mock exams · mockfrcs.co.uk</text>
</svg>