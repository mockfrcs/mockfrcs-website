<svg viewBox="0 0 1000 1735" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
<rect x="0" y="0" width="1000" height="1735" fill="#F4F6F4"/>
<rect x="0" y="0" width="1000" height="108" fill="#14313A"/><rect x="0" y="108" width="250" height="4" fill="#C77B20"/><rect x="250" y="108" width="250" height="4" fill="#245C8C"/><rect x="500" y="108" width="250" height="4" fill="#15806A"/><rect x="750" y="108" width="250" height="4" fill="#6D4AA3"/><text x="30" y="46" font-size="29" font-weight="800" letter-spacing="0.3" fill="#FFFFFF">Hereditary colorectal cancer syndromes</text><text x="30" y="74" font-size="14" font-weight="500" fill="#AFC7CB">FRCS Part 1 (General Surgery) · UK practice (BSG / ACPGBI / UKCGG 2020) · gene · inheritance · phenotype · surveillance</text><text x="30" y="130" font-size="13" font-weight="800" letter-spacing="1.2" fill="#14313A">AT A GLANCE</text><rect x="30" y="142" width="940" height="26" rx="5" fill="#14313A"/><text x="40" y="160" font-size="11.5" font-weight="700" letter-spacing="0.5" fill="#FFFFFF">Syndrome</text><text x="190" y="160" font-size="11.5" font-weight="700" letter-spacing="0.5" fill="#FFFFFF">Gene(s)</text><text x="400" y="160" font-size="11.5" font-weight="700" letter-spacing="0.5" fill="#FFFFFF">Inherit.</text><text x="478" y="160" font-size="11.5" font-weight="700" letter-spacing="0.5" fill="#FFFFFF">Hallmark</text><text x="808" y="160" font-size="11.5" font-weight="700" letter-spacing="0.5" fill="#FFFFFF">CRC risk</text><rect x="30" y="168" width="940" height="26" fill="#F1F4F2"/><rect x="30" y="168" width="4" height="26" fill="#C77B20"/><text x="40" y="185" font-size="11.5" font-weight="700" fill="#16252B">FAP</text><text x="190" y="185" font-size="11.5" font-style="italic" fill="#2E3C42">APC</text><text x="400" y="185" font-size="11.5" font-weight="400" fill="#2E3C42">AD</text><text x="478" y="185" font-size="11.5" fill="#2E3C42">&gt;100 adenomas; ~100% CRC</text><text x="808" y="185" font-size="11.5" fill="#2E3C42">~100% by ~40 y</text><rect x="30" y="194" width="4" height="26" fill="#C77B20"/><text x="40" y="211" font-size="11.5" font-weight="700" fill="#16252B">MUTYH-assoc. (MAP)</text><text x="190" y="211" font-size="11.5" font-style="italic" fill="#2E3C42">MUTYH</text><text x="400" y="211" font-size="11.5" font-weight="800" fill="#BE3A2E">AR</text><text x="478" y="211" font-size="11.5" fill="#2E3C42">10s–100s adenomas + serrated</text><text x="808" y="211" font-size="11.5" fill="#2E3C42">~43–100%</text><rect x="30" y="220" width="940" height="26" fill="#F1F4F2"/><rect x="30" y="220" width="4" height="26" fill="#245C8C"/><text x="40" y="237" font-size="11.5" font-weight="700" fill="#16252B">Lynch (HNPCC)</text><text x="190" y="237" font-size="11.5" font-style="italic" fill="#2E3C42">MLH1, MSH2, MSH6, PMS2</text><text x="400" y="237" font-size="11.5" font-weight="400" fill="#2E3C42">AD</text><text x="478" y="237" font-size="11.5" fill="#2E3C42">few polyps; MSI; rapid; right-sided</text><text x="808" y="237" font-size="11.5" fill="#2E3C42">~10–47% (gene-dep.)</text><rect x="30" y="246" width="4" height="26" fill="#15806A"/><text x="40" y="263" font-size="11.5" font-weight="700" fill="#16252B">Juvenile polyposis</text><text x="190" y="263" font-size="11.5" font-style="italic" fill="#2E3C42">SMAD4 / BMPR1A</text><text x="400" y="263" font-size="11.5" font-weight="400" fill="#2E3C42">AD</text><text x="478" y="263" font-size="11.5" fill="#2E3C42">juvenile (hamartomatous) polyps</text><text x="808" y="263" font-size="11.5" fill="#2E3C42">~40–68%</text><rect x="30" y="272" width="940" height="26" fill="#F1F4F2"/><rect x="30" y="272" width="4" height="26" fill="#15806A"/><text x="40" y="289" font-size="11.5" font-weight="700" fill="#16252B">Peutz–Jeghers</text><text x="190" y="289" font-size="11.5" font-style="italic" fill="#2E3C42">STK11 / LKB1</text><text x="400" y="289" font-size="11.5" font-weight="400" fill="#2E3C42">AD</text><text x="478" y="289" font-size="11.5" fill="#2E3C42">pigmentation + SB hamartomas</text><text x="808" y="289" font-size="11.5" fill="#2E3C42">↑ (multi-organ)</text><text x="30" y="313" font-size="10.5" fill="#6B7B80">MAP is the odd one out — <tspan font-weight="700" fill="#BE3A2E">autosomal recessive</tspan> (biallelic): suspect with APC-negative polyposis or affected siblings without vertical transmission.</text><rect x="30" y="328" width="6" height="20" rx="3" fill="#C77B20"/><text x="46" y="344" font-size="13" font-weight="800" letter-spacing="1.2" fill="#C77B20">ADENOMATOUS POLYPOSIS</text><rect x="30" y="358" width="940" height="220.5" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="30" y="358" width="6" height="220.5" rx="3" fill="#C77B20"/><text x="54" y="386" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">APC · the classic polyposis</text><text x="54" y="410" font-size="18" font-weight="800" fill="#16252B">Familial adenomatous polyposis (FAP)</text><text x="54" y="430" font-size="12" font-weight="700" fill="#C77B20">Gene</text><text x="146" y="430.0" font-size="12" fill="#2E3C42">APC (5q21), tumour suppressor · autosomal dominant (~25–30% de novo)</text><text x="54" y="450.5" font-size="12" font-weight="700" fill="#C77B20">Polyps</text><text x="146" y="450.5" font-size="12" fill="#2E3C42">>100 colorectal adenomas carpeting the colon; near-100% CRC by ~35–45 y if untreated</text><text x="54" y="471.0" font-size="12" font-weight="700" fill="#C77B20">Extracolonic</text><text x="146" y="471.0" font-size="12" fill="#2E3C42">duodenal / ampullary adenomas (Spigelman), fundic-gland polyps, desmoids, osteomas, CHRPE, papillary thyroid Ca, hepatoblastoma</text><text x="54" y="491.5" font-size="12" font-weight="700" fill="#C77B20">Surveillance</text><text x="146" y="491.5" font-size="12" fill="#2E3C42">colonoscopy from age 12–14, individualised 1–3 yearly by phenotype; OGD from ~25 y</text><text x="54" y="512.0" font-size="12" font-weight="700" fill="#C77B20">Surgery</text><text x="146" y="512.0" font-size="12" fill="#2E3C42">prophylactic colectomy — colectomy + IRA / restorative proctocolectomy + IPAA / proctocolectomy + end ileostomy (choice by rectal</text><text x="146" y="527.5" font-size="12" fill="#2E3C42">polyp burden, genotype, desmoid risk)</text><text x="54" y="548.0" font-size="12" font-weight="700" fill="#C77B20">Variant</text><text x="146" y="548.0" font-size="12" fill="#2E3C42">Attenuated FAP: 10–99 adenomas, right-sided, later onset; surveillance from 18–20 y</text><rect x="30" y="590.5" width="464.0" height="231.0" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="30" y="590.5" width="6" height="231.0" rx="3" fill="#C77B20"/><text x="54" y="618.5" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">MUTYH · recessive</text><text x="54" y="642.5" font-size="18" font-weight="800" fill="#16252B">MUTYH-associated polyposis (MAP)</text><text x="54" y="662.5" font-size="12" font-weight="700" fill="#C77B20">Gene</text><text x="138" y="662.5" font-size="12" fill="#2E3C42">MUTYH (base-excision repair)</text><text x="54" y="683.0" font-size="12" font-weight="700" fill="#C77B20">Inherit.</text><text x="138" y="683.0" font-size="12" fill="#2E3C42">autosomal RECESSIVE (biallelic) — key distinction</text><text x="138" y="698.5" font-size="12" fill="#2E3C42">from FAP</text><text x="54" y="719.0" font-size="12" font-weight="700" fill="#C77B20">Polyps</text><text x="138" y="719.0" font-size="12" fill="#2E3C42">~10s–100s adenomas (overlaps AFAP) + serrated polyps;</text><text x="138" y="734.5" font-size="12" fill="#2E3C42">later onset</text><text x="54" y="755.0" font-size="12" font-weight="700" fill="#C77B20">Surveill.</text><text x="138" y="755.0" font-size="12" fill="#2E3C42">from 18–20 y; annual if surgery not done; duodenal</text><text x="138" y="770.5" font-size="12" fill="#2E3C42">surveillance</text><text x="54" y="791.0" font-size="12" font-weight="700" fill="#C77B20">Surgery</text><text x="138" y="791.0" font-size="12" fill="#2E3C42">colectomy if polyp burden unmanageable</text><rect x="506.0" y="590.5" width="464.0" height="231.0" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="506.0" y="590.5" width="6" height="231.0" rx="3" fill="#C77B20"/><text x="530.0" y="618.5" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">APC variants</text><text x="530.0" y="642.5" font-size="18" font-weight="800" fill="#16252B">Gardner &amp; Turcot</text><text x="530.0" y="662.5" font-size="12" font-weight="700" fill="#C77B20">Concept</text><text x="602.0" y="662.5" font-size="12" fill="#2E3C42">phenotypic variant of FAP (same APC) — now part of the</text><text x="602.0" y="678.0" font-size="12" fill="#2E3C42">FAP spectrum</text><text x="530.0" y="698.5" font-size="12" font-weight="700" fill="#C77B20">= FAP +</text><text x="602.0" y="698.5" font-size="12" fill="#2E3C42">osteomas (skull / mandible), epidermoid / sebaceous</text><text x="602.0" y="714.0" font-size="12" fill="#2E3C42">cysts, desmoids, dental anomalies (± CHRPE)</text><text x="530.0" y="734.5" font-size="12" font-weight="700" fill="#C77B20">Turcot</text><text x="602.0" y="734.5" font-size="12" fill="#2E3C42">CRC polyposis + CNS tumours: APC → medulloblastoma; MMR</text><text x="602.0" y="750.0" font-size="12" fill="#2E3C42">/ Lynch → glioblastoma</text><rect x="30" y="839.5" width="6" height="20" rx="3" fill="#245C8C"/><text x="46" y="855.5" font-size="13" font-weight="800" letter-spacing="1.2" fill="#245C8C">LYNCH SYNDROME / NON-POLYPOSIS</text><rect x="30" y="869.5" width="940" height="256.5" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="30" y="869.5" width="6" height="256.5" rx="3" fill="#245C8C"/><text x="54" y="897.5" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">Mismatch repair · MSI</text><text x="54" y="921.5" font-size="18" font-weight="800" fill="#16252B">Lynch syndrome (HNPCC)</text><text x="54" y="941.5" font-size="12" font-weight="700" fill="#245C8C">Genes</text><text x="146" y="941.5" font-size="12" fill="#2E3C42">MLH1, MSH2, MSH6, PMS2 (+ EPCAM deletion → MSH2 silencing) — mismatch repair · autosomal dominant</text><text x="54" y="962.0" font-size="12" font-weight="700" fill="#245C8C">Mechanism</text><text x="146" y="962.0" font-size="12" fill="#2E3C42">MMR deficiency → microsatellite instability (MSI); loss of MMR protein on IHC</text><text x="54" y="982.5" font-size="12" font-weight="700" fill="#245C8C">CRC</text><text x="146" y="982.5" font-size="12" fill="#2E3C42">right-sided, younger (~45 y), mucinous / poorly differentiated, tumour-infiltrating lymphocytes; few polyps but rapid</text><text x="146" y="998.0" font-size="12" fill="#2E3C42">adenoma–carcinoma sequence</text><text x="54" y="1018.5" font-size="12" font-weight="700" fill="#245C8C">Other Ca</text><text x="146" y="1018.5" font-size="12" fill="#2E3C42">endometrial (2nd commonest), ovarian, gastric, small bowel, urothelial (ureter / renal pelvis), pancreas, brain (Turcot / GBM),</text><text x="146" y="1034.0" font-size="12" fill="#2E3C42">sebaceous (Muir–Torre)</text><text x="54" y="1054.5" font-size="12" font-weight="700" fill="#245C8C">Surveillance</text><text x="146" y="1054.5" font-size="12" fill="#2E3C42">2-yearly colonoscopy from age 25 (MLH1 / MSH2) or 35 (MSH6 / PMS2); aspirin chemoprophylaxis (CAPP2); gynae risk-reducing surgery</text><text x="54" y="1075.0" font-size="12" font-weight="700" fill="#245C8C">Testing</text><text x="146" y="1075.0" font-size="12" fill="#2E3C42">universal MMR IHC / MSI on ALL colorectal cancers (NICE DG27)</text><text x="54" y="1095.5" font-size="12" font-weight="700" fill="#245C8C">Surgery</text><text x="146" y="1095.5" font-size="12" fill="#2E3C42">consider extended / total colectomy for CRC due to metachronous risk</text><rect x="30" y="1138.0" width="940" height="179.0" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="30" y="1138.0" width="6" height="179.0" rx="3" fill="#6D4AA3"/><text x="54" y="1166.0" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">Clinical case-finding criteria</text><text x="54" y="1190.0" font-size="18" font-weight="800" fill="#16252B">Amsterdam &amp; Bethesda criteria</text><text x="54" y="1210.0" font-size="12" font-weight="700" fill="#6D4AA3">Amsterdam I</text><text x="158" y="1210.0" font-size="12" fill="#2E3C42">(1990, ‘3-2-1’) ≥3 relatives with CRC, one a first-degree relative of the other two; ≥2 successive generations affected; ≥1</text><text x="158" y="1225.5" font-size="12" fill="#2E3C42">diagnosed &lt;50 y; FAP excluded; tumours pathologically verified</text><text x="54" y="1246.0" font-size="12" font-weight="700" fill="#6D4AA3">Amsterdam II</text><text x="158" y="1246.0" font-size="12" fill="#2E3C42">(1999) as above, but counts Lynch-associated cancers — CRC, endometrial, small bowel, ureter / renal pelvis</text><text x="54" y="1266.5" font-size="12" font-weight="700" fill="#6D4AA3">Bethesda</text><text x="158" y="1266.5" font-size="12" fill="#2E3C42">(revised 2004) selects CRC patients for MSI / IHC testing — now largely superseded by universal testing</text><text x="54" y="1291.0" font-size="11" fill="#6B7B80">Low sensitivity: ~half who meet Amsterdam carry an MMR variant, and ~half of Lynch patients do not meet it — hence the shift to universal tumour testing.</text><rect x="30" y="1335.0" width="6" height="20" rx="3" fill="#15806A"/><text x="46" y="1351.0" font-size="13" font-weight="800" letter-spacing="1.2" fill="#15806A">HAMARTOMATOUS POLYPOSIS</text><rect x="30" y="1365.0" width="464.0" height="262.0" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="30" y="1365.0" width="6" height="262.0" rx="3" fill="#15806A"/><text x="54" y="1393.0" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">SMAD4 / BMPR1A</text><text x="54" y="1417.0" font-size="18" font-weight="800" fill="#16252B">Juvenile polyposis (JPS)</text><text x="54" y="1437.0" font-size="12" font-weight="700" fill="#15806A">Genes</text><text x="134" y="1437.0" font-size="12" fill="#2E3C42">SMAD4 or BMPR1A (BMP / TGF-β pathway) · AD (~25% de</text><text x="134" y="1452.5" font-size="12" fill="#2E3C42">novo); variant found ~40–50%</text><text x="54" y="1473.0" font-size="12" font-weight="700" fill="#15806A">Criteria</text><text x="134" y="1473.0" font-size="12" fill="#2E3C42">any of: ≥5 juvenile polyps in colorectum; OR juvenile</text><text x="134" y="1488.5" font-size="12" fill="#2E3C42">polyps throughout GI tract; OR any number + family</text><text x="134" y="1504.0" font-size="12" fill="#2E3C42">history</text><text x="54" y="1524.5" font-size="12" font-weight="700" fill="#15806A">Risk</text><text x="134" y="1524.5" font-size="12" fill="#2E3C42">CRC ~40–68%; gastric cancer (esp. SMAD4)</text><text x="54" y="1545.0" font-size="12" font-weight="700" fill="#15806A">Note</text><text x="134" y="1545.0" font-size="12" fill="#2E3C42">SMAD4 overlaps hereditary haemorrhagic telangiectasia</text><text x="134" y="1560.5" font-size="12" fill="#2E3C42">(HHT)</text><text x="54" y="1581.0" font-size="12" font-weight="700" fill="#15806A">Manage</text><text x="134" y="1581.0" font-size="12" fill="#2E3C42">colonoscopy + upper-GI surveillance; surgery for</text><text x="134" y="1596.5" font-size="12" fill="#2E3C42">burden / cancer</text><rect x="506.0" y="1365.0" width="464.0" height="262.0" rx="11" fill="#FFFFFF" stroke="#E0E6E3" stroke-width="1.2"/><rect x="506.0" y="1365.0" width="6" height="262.0" rx="3" fill="#15806A"/><text x="530.0" y="1393.0" font-size="11" font-weight="700" letter-spacing="1.4" fill="#6B7B80">STK11</text><text x="530.0" y="1417.0" font-size="18" font-weight="800" fill="#16252B">Peutz–Jeghers (PJS)</text><text x="530.0" y="1437.0" font-size="12" font-weight="700" fill="#15806A">Gene</text><text x="610.0" y="1437.0" font-size="12" fill="#2E3C42">STK11 / LKB1 · autosomal dominant</text><text x="530.0" y="1457.5" font-size="12" font-weight="700" fill="#15806A">Criteria</text><text x="610.0" y="1457.5" font-size="12" fill="#2E3C42">any of: ≥2 PJS polyps; any polyps + FHx; mucocutaneous</text><text x="610.0" y="1473.0" font-size="12" fill="#2E3C42">pigmentation + FHx; polyps + characteristic</text><text x="610.0" y="1488.5" font-size="12" fill="#2E3C42">pigmentation</text><text x="530.0" y="1509.0" font-size="12" font-weight="700" fill="#15806A">Features</text><text x="610.0" y="1509.0" font-size="12" fill="#2E3C42">mucocutaneous melanin pigmentation (lips, buccal,</text><text x="610.0" y="1524.5" font-size="12" fill="#2E3C42">perioral, digits); hamartomas (arborising smooth</text><text x="610.0" y="1540.0" font-size="12" fill="#2E3C42">muscle), mainly small bowel → intussusception,</text><text x="610.0" y="1555.5" font-size="12" fill="#2E3C42">obstruction, bleeding</text><text x="530.0" y="1576.0" font-size="12" font-weight="700" fill="#15806A">Cancer</text><text x="610.0" y="1576.0" font-size="12" fill="#2E3C42">↑ risk of multiple — GI, breast, pancreas, gynae</text><line x1="30" y1="1643.0" x2="970" y2="1643.0" stroke="#D7DEDC" stroke-width="1"/><text x="30" y="1662.0" font-size="10.5" fill="#7C8A8E">Surveillance ages / intervals: BSG / ACPGBI / UKCGG hereditary CRC guideline (2020). Amsterdam I/II &amp; revised Bethesda criteria. Universal MMR testing: NICE DG27.</text><text x="30" y="1676.0" font-size="10.5" fill="#9AA6AA">Revision aid — verify against current guidance before clinical use. Duodenal / FAP upper-GI detail (Spigelman) reserved for the UGI poster.</text>
<text x="822" y="42" font-size="21" font-weight="800" letter-spacing="0.2" fill="#FFFFFF">Mock<tspan fill="#6FA8DC">FRCS</tspan></text><text x="822" y="60" font-size="10.5" font-weight="500" fill="#AFC7CB">mockfrcs.co.uk</text><rect x="0" y="1689" width="1000" height="46" fill="#14313A"/><text x="30" y="1718" font-size="14" font-weight="800" fill="#FFFFFF">Mock<tspan fill="#6FA8DC">FRCS</tspan></text><text x="970" y="1718" text-anchor="end" font-size="12.5" font-weight="600" fill="#AFC7CB">Revision resources &amp; realistic mock exams · mockfrcs.co.uk</text>
</svg>